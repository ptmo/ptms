<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Interactive Chat UI</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #F4F7F8;
            --text-main: #1C222B;
            --text-muted: #7E8796;
            --accent-primary: #5C9EAD;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.9);
            --glass-shadow: 0 12px 32px rgba(28, 34, 43, 0.04);
            --glass-shadow-hover: 0 16px 40px rgba(28, 34, 43, 0.08);
            --transition-smooth: opacity 0.04s linear, transform 0.04s linear;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            width: 100vw;
            height: 100dvh; 
            overflow: hidden; 
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
        }

        .app-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 100%;
            background-color: var(--bg-base);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.05);
        }

        .bg-blob-1 {
            position: absolute;
            top: -10%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #D6E4E2, #E8F0EE);
            border-radius: 50%;
            filter: blur(60px);
            z-index: 0;
        }

        .bg-blob-2 {
            position: absolute;
            bottom: 0;
            left: -20%;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #E6E2F0, #F4F2F8);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }

        .view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            z-index: 10;
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.35s ease;
        }

        /* --- LAYAR 1: DAFTAR OBROLAN --- */
        .list-view { transform: translateX(0); height: 100%; overflow: hidden; }

        .top-nav { padding: 20px 12px 12px; display: flex; gap: 12px; align-items: center; flex-shrink: 0; z-index: 15; }

        .search-container { flex: 1; height: 52px; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; display: flex; align-items: center; padding: 0 16px; box-shadow: var(--glass-shadow); transition: var(--transition-smooth); }
        .search-container:focus-within { box-shadow: 0 0 0 2px var(--accent-primary), var(--glass-shadow-hover); background: rgba(255, 255, 255, 0.95); }
        .search-container input { border: none; background: transparent; outline: none; width: 100%; font-family: inherit; font-size: 15px; color: var(--text-main); font-weight: 500; margin-left: 12px; }

        .settings-btn { width: 52px; height: 52px; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 50px; display: flex; justify-content: center; align-items: center; box-shadow: var(--glass-shadow); cursor: pointer; transition: var(--transition-smooth); }
        .settings-btn:hover { transform: rotate(15deg) scale(1.05); }

        .chat-list { flex: 1; min-height: 0; padding: 4px 12px 120px; overflow-y: auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; gap: 4px; z-index: 10; }
        .chat-list::-webkit-scrollbar { display: none; }

        .chat-card { display: flex; align-items: center; padding: 10px 12px; background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 16px; box-shadow: 0 4px 12px rgba(28, 34, 43, 0.02); transition: var(--transition-smooth); cursor: pointer; }
        .chat-card:hover { transform: translateY(-2px) scale(1.005); box-shadow: var(--glass-shadow-hover); background: rgba(255, 255, 255, 0.9); }

        .avatar { width: 48px; height: 48px; border-radius: 50px; margin-right: 12px; flex-shrink: 0; border: 2px solid #FFFFFF; box-shadow: 0 4px 10px rgba(0,0,0,0.05); background-size: cover; background-position: center; }

        .chat-info { flex: 1; display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
        .chat-header { display: flex; justify-content: space-between; align-items: center; }
        .chat-name { font-size: 16px; font-weight: 700; }
        .chat-time { font-size: 12px; color: var(--text-muted); font-weight: 600; }
        .chat-message { font-size: 14px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        .unread .chat-message { color: var(--text-main); font-weight: 600; }
        .unread-badge { background-color: var(--accent-primary); color: #FFFFFF; font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 50px; margin-left: 8px; }

        .floating-nav { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 290px; height: 68px; background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--glass-border); border-radius: 34px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 24px 48px rgba(0, 0, 0, 0.08); z-index: 20; padding: 0 8px; }
        .nav-item { width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #A0AEC0; transition: var(--transition-smooth); cursor: pointer; position: relative; }
        .nav-item:hover { color: var(--text-main); transform: translateY(-2px); }
        .nav-item.active { background-color: #FFFFFF; color: var(--accent-primary); box-shadow: 0 8px 24px rgba(28, 34, 43, 0.06); border: 1px solid rgba(255, 255, 255, 0.8); }
        .nav-item.active::after { content: ''; position: absolute; bottom: 6px; width: 4px; height: 4px; background-color: var(--accent-primary); border-radius: 50%; }

        /* --- LAYAR 2: RUANG OBROLAN --- */
        .chat-room-view { transform: translateX(100%); background-color: var(--bg-base); z-index: 30; }
        .chat-room-view.active { transform: translateX(0); }
        .room-header { padding: 20px 24px; display: flex; align-items: center; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); gap: 16px; z-index: 21; }
        .back-btn { width: 40px; height: 40px; border-radius: 50px; background: var(--bg-base); display: flex; justify-content: center; align-items: center; cursor: pointer; border: 1px solid var(--glass-border); transition: var(--transition-smooth); }
        .back-btn:hover { background: #E2E8F0; }
        .room-title { flex: 1; }
        .room-title h2 { font-size: 16px; font-weight: 700; }
        .room-title p { font-size: 12px; color: var(--accent-primary); font-weight: 600; }

        .messages-container {
            flex: 1; min-height: 0; padding: 24px; overflow-y: auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; gap: 16px; background-color: var(--bg-base);
            background-image: url("img/dd.png"), linear-gradient(135deg, rgba(214, 228, 226, 0.85) 0%, rgba(232, 240, 238, 0) 60%), linear-gradient(135deg, rgba(230, 226, 240, 0.9) 0%, rgba(244, 242, 248, 0.9) 100%);
            background-size: 50% auto, 100% 100%, 100% 100%; background-repeat: repeat, no-repeat, no-repeat; background-blend-mode: normal, normal, normal;
        }
        .messages-container::-webkit-scrollbar { display: none; }

        .bubble { max-width: 75%; padding: 14px 18px; font-size: 14px; line-height: 1.5; box-shadow: var(--glass-shadow); position: relative; animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(10px); }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        .bubble.received { align-self: flex-start; background: var(--glass-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--glass-border); color: var(--text-main); border-radius: 20px 20px 20px 4px; }
        .bubble.sent { align-self: flex-end; background: var(--accent-primary); color: #FFFFFF; border-radius: 20px 20px 4px 20px; box-shadow: 0 10px 24px rgba(92, 158, 173, 0.3); }
        .message-time { font-size: 10px; margin-top: 6px; display: block; opacity: 0.7; text-align: right; }

        .input-area { padding: 16px 24px 24px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--glass-border); display: flex; gap: 12px; align-items: center; }
        .input-box { flex: 1; height: 52px; background: var(--bg-base); border-radius: 20px; padding: 0 20px; border: 1px solid var(--glass-border); display: flex; align-items: center; }
        .input-box input { width: 100%; border: none; background: transparent; outline: none; font-family: inherit; font-size: 14px; color: var(--text-main); }
        .send-btn { width: 52px; height: 52px; background: var(--accent-primary); color: #FFFFFF; border-radius: 50px; display: flex; justify-content: center; align-items: center; cursor: pointer; border: none; box-shadow: 0 8px 20px rgba(92, 158, 173, 0.4); transition: var(--transition-smooth); }
        .send-btn:hover { transform: scale(1.05); }

        /* --- LAYAR 3: PROFIL SAYA --- */
        .profile-view {
            transform: translateX(100%);
            background-color: var(--bg-base);
            z-index: 35;
            display: flex;
            flex-direction: column;
        }
        
        .profile-view.active { transform: translateX(0); }

        .profile-content { flex: 1; padding: 32px 24px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; gap: 24px; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; background-color: #E2E8F0; border: 4px solid #FFFFFF; box-shadow: 0 12px 24px rgba(0,0,0,0.08); background-size: cover; background-position: center; }
        .profile-info-card { width: 100%; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 16px 24px; box-shadow: var(--glass-shadow); display: flex; flex-direction: column; }
        .info-row { display: flex; flex-direction: column; gap: 4px; padding: 12px 0; }
        .info-label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-value { font-size: 15px; color: var(--text-main); font-weight: 700; }
        .info-divider { height: 1px; background-color: var(--glass-border); width: 100%; }
        .logout-btn { width: 100%; height: 56px; background: #FFE5E5; color: #E53E3E; border-radius: 20px; border: 1px solid #FFD1D1; font-family: inherit; font-size: 16px; font-weight: 700; display: flex; justify-content: center; align-items: center; gap: 12px; cursor: pointer; box-shadow: 0 8px 16px rgba(229, 62, 62, 0.1); transition: var(--transition-smooth); margin-top: auto; }
        .logout-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(229, 62, 62, 0.2); background: #FFD1D1; }

        /* --- LAYAR PEMBLOKIR (UNAUTHORIZED ACCESS) --- */
        #unauthorizedBlocker {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100dvh;
            background-color: #FFFFFF;
            z-index: 9999;
            
            /* KUNCI PERBAIKAN: Ubah flex menjadi none agar sembunyi dari awal */
            display: none; 
            
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 24px;
        }
        #unauthorizedBlocker h2 { color: #1C222B; margin-bottom: 8px; font-size: 24px; font-weight: 700; }
        #unauthorizedBlocker p { color: #7E8796; margin-bottom: 32px; font-size: 15px; max-width: 300px; line-height: 1.5; }
        .blocker-btn { background: var(--accent-primary); color: #FFFFFF; border: none; border-radius: 20px; padding: 16px 32px; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 8px 24px rgba(92, 158, 173, 0.3); font-family: inherit; transition: 0.2s; }
        .blocker-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(92, 158, 173, 0.4); }

        /* --- LAYAR 4: TAMBAHAN KONTAK --- */
        .contact-view {
            transform: translateX(100%);
            background-color: var(--bg-base);
            z-index: 35;
            display: flex;
            flex-direction: column;
        }
        .contact-view.active { transform: translateX(0); }
        .contact-content { flex: 1; padding: 24px; display: flex; flex-direction: column; overflow-y: auto; gap: 24px; }
        .contact-add-card {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 24px; box-shadow: var(--glass-shadow); text-align: center;
        }
        .contact-list-header { font-size: 14px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: -12px; padding-left: 8px; }
        .saved-contacts-container { display: flex; flex-direction: column; gap: 8px; }
    </style>
</head>
<body>

<!-- TEMBOK KEAMANAN: Muncul paling depan jika belum login -->
<div id="unauthorizedBlocker">
    <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="#E53E3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 16px;">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
    </svg>
    <h2>Akses Ditolak</h2>
    <p>Anda harus masuk atau mendaftar terlebih dahulu untuk mengakses obrolan.</p>
    <button class="blocker-btn" onclick="window.location.href='login'">Masuk / Daftar</button>
</div>

<div class="app-container" id="mainAppContainer" style="display: none;">
    <div class="app-wrapper">
        <div class="bg-blob-1"></div>
        <div class="bg-blob-2"></div>

        <div class="view list-view" id="listView">
            <div class="top-nav">
                <div class="search-container">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7E8796" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" placeholder="Cari pesan atau kontak...">
                </div>
                <div class="settings-btn">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </div>
            </div>

            <div class="chat-list" id="chatListContainer">
            </div>

            <div class="floating-nav">
    <!-- Ikon 1: Beranda / Daftar Chat -->
    <div class="nav-item active" id="navHome" onclick="setActiveNav(this); closeProfile();">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    </div>
    
    <!-- Ikon 2: Profil Saya -->
    <div class="nav-item" id="navProfile" onclick="setActiveNav(this); openProfile();">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
        </svg>
    </div>
    
    <!-- Ikon 3: Kontak Teman / Grup -->
    <div class="nav-item" onclick="setActiveNav(this);">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
    </div>

    <!-- Ikon 4: Buku Kontak -->
    <div class="nav-item" onclick="setActiveNav(this); openContacts();">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
        </svg>
    </div>
            </div>
        </div>

        <div class="view chat-room-view" id="chatRoomView">
            <div class="room-header">
                <div class="back-btn" onclick="closeChat()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </div>
                <div class="avatar" id="activeAvatar" style="width: 44px; height: 44px; margin-right: 0;"></div>
                <div class="room-title">
                    <h2 id="activeName">Nama Kontak</h2>
                    <p>Sedang mengetik...</p>
                </div>
            </div>

            <div class="messages-container" id="messagesContainer">
            </div>

            <div class="input-area">
                <div class="input-box">
                    <input type="text" placeholder="Ketik pesan..." id="messageInput" onkeypress="handleKeyPress(event)">
                </div>
                <button class="send-btn" onclick="sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>

        <!-- LAYAR 3: PROFIL SAYA -->
        <div class="view profile-view" id="profileView">
            <div class="room-header">
                <div class="back-btn" onclick="closeProfile()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </div>
                <div class="room-title" style="text-align: center; margin-right: 40px;">
                    <h2>Profil Saya</h2>
                </div>
            </div>

            <div class="profile-content">
                <div class="profile-avatar" id="profileAvatarDisplay"></div>
                
                <div class="profile-info-card">
                    <div class="info-row">
                        <span class="info-label">Nama Akun Google</span>
                        <span class="info-value" id="profileNameDisplay">-</span>
                    </div>
                    <div class="info-divider"></div>
                    <div class="info-row">
                        <span class="info-label">Nickname Aplikasi</span>
                        <span class="info-value" id="profileNicknameDisplay">-</span>
                    </div>
                    <div class="info-divider"></div>
                    <div class="info-row">
                        <span class="info-label">Email</span>
                        <span class="info-value" id="profileEmailDisplay">-</span>
                    </div>
                </div>

                <button class="logout-btn" onclick="logoutAccount()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Keluar Akun
                </button>
            </div>
        </div>

        <!-- LAYAR 4: TAMBAHAN KONTAK -->
        <div class="view contact-view" id="contactView">
            <div class="room-header">
                <div class="back-btn" onclick="closeContacts()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </div>
                <div class="room-title" style="text-align: center; margin-right: 40px;">
                    <h2>Tambahan Kontak</h2>
                </div>
            </div>

            <div class="contact-content">
                <!-- Form Pencarian & Tambah Kontak -->
                <div class="contact-add-card">
                    <input type="text" id="newContactInput" class="auth-input" placeholder="Ketik username (@ / _ diizinkan)..." oninput="validateContactInput(this)">
                    <span id="contactErrorMsg" style="color: #E53E3E; font-size: 13px; font-weight: 600; display: none; margin-top: 12px;">Pengguna tidak ada</span>
                    <button class="auth-btn primary-btn" style="margin-top: 16px;" onclick="addNewContact()" id="addContactBtn">Tambahkan Kontak</button>
                </div>

                <!-- Daftar Kontak Disimpan -->
                <div class="contact-list-header">Daftar Kontak</div>
                <div class="saved-contacts-container" id="savedContactsList">
                    <!-- List kontak akan muncul berurutan di sini -->
                </div>
            </div>
        </div>

    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
    // IMPORT FIRESTORE WAJIB UNTUK MENCARI KONTAK
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    // 1. MIDDLEWARE: Pengecekan Akses (Tembok Keamanan)
    const sessionString = localStorage.getItem('premiumChatSession');
    let sessionValid = false;
    let sessionData = null;

    if (sessionString) {
        sessionData = JSON.parse(sessionString);
        // Cek apakah sesi masih berlaku (belum kedaluwarsa)
        if (new Date().getTime() < sessionData.expiredAt) {
            sessionValid = true;
        } else {
            // Sesi kedaluwarsa, hapus dari memori
            localStorage.removeItem('premiumChatSession');
        }
    }
    
    if (!sessionValid) {
        // JIKA TIDAK VALID: Tampilkan Tembok Keamanan
        document.getElementById('unauthorizedBlocker').style.display = 'flex';
        throw new Error("Akses ditolak: Pengguna belum login.");
    } else {
        // JIKA VALID: Sembunyikan Tembok, Munculkan Aplikasi Chat
        document.getElementById('unauthorizedBlocker').style.display = 'none';
        document.getElementById('mainAppContainer').style.display = 'flex';
    }

    // 2. VARIABEL GLOBAL (Diambil dari sesi yang valid)
    let myNickname = sessionData.nickname;
    let tempAvatarData = sessionData.avatar;
    let tempGoogleUser = { uid: sessionData.uid, displayName: sessionData.displayName, email: sessionData.email };
    let currentFriend = "";

    // 3. INISIALISASI FIREBASE & FIRESTORE
    const firebaseConfig = {
      apiKey: "AIzaSyAHQgvaa8P3XDDf8d3wDMMFMuoHTfykk2A",
      authDomain: "chat-37551.firebaseapp.com",
      projectId: "chat-37551",
      storageBucket: "chat-37551.firebasestorage.app",
      messagingSenderId: "557115133564",
      appId: "1:557115133564:web:75616cfd1d6f13087083f9"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app); // Akses database dibuka

    // 4. LOGIKA CHAT SOCKET.IO
    const socket = io("https://chat-9gbz.onrender.com");
    
    socket.on("connect", () => console.log("Terhubung ke server chat!"));

    socket.on('load_history', (history) => {
        const container = document.getElementById('messagesContainer');
        container.innerHTML = ""; 
        history.forEach(msg => {
            const type = msg.sender_nickname === myNickname ? 'sent' : 'received';
            const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            appendMessage(msg.content, time, type);
        });
    });

    socket.on('receive_message', (data) => {
        if(data.sender === currentFriend) {
            appendMessage(data.text, data.time, 'received');
        }
    });

    window.openChat = function(name, avatarUrl) {
        currentFriend = name; 
        document.getElementById('activeName').innerText = name;
        document.getElementById('activeAvatar').style.backgroundImage = `url('${avatarUrl}')`;
        document.getElementById('chatRoomView').classList.add('active');
        socket.emit('get_history', { me: myNickname, friend: currentFriend });
    }

    window.closeChat = function() {
        document.getElementById('chatRoomView').classList.remove('active');
        currentFriend = ""; 
    }

    window.sendMessage = function() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        
        if(text !== "" && currentFriend !== "") {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
            
            appendMessage(text, timeStr, 'sent');
            socket.emit('send_message', {
                sender: myNickname, recipient: currentFriend, text: text, time: timeStr
            });
            input.value = "";
        }
    }

    window.appendMessage = function(text, timeStr, type) {
        const container = document.getElementById('messagesContainer');
        const newBubble = document.createElement('div');
        newBubble.className = `bubble ${type}`;
        newBubble.innerHTML = `${text}<span class="message-time">${timeStr}</span>`;
        container.appendChild(newBubble);
        container.scrollTop = container.scrollHeight;
    }

    window.handleKeyPress = function(e) {
        if(e.key === 'Enter') sendMessage();
    }

    // 5. LOGIKA PROFIL & LOGOUT
    window.openProfile = function() {
        if (tempGoogleUser) {
            document.getElementById('profileNameDisplay').innerText = tempGoogleUser.displayName || 'Pengguna Tanpa Nama';
            document.getElementById('profileEmailDisplay').innerText = tempGoogleUser.email || '-';
            document.getElementById('profileNicknameDisplay').innerText = myNickname;
            
            const avatarArea = document.getElementById('profileAvatarDisplay');
            if(tempAvatarData) {
                avatarArea.style.backgroundImage = `url('${tempAvatarData}')`;
            }
        }
        document.getElementById('profileView').classList.add('active');
    }

    window.closeProfile = function() {
        document.getElementById('profileView').classList.remove('active');
    }

    window.logoutAccount = async function() {
        try {
            // Putuskan dari Firebase
            await signOut(auth);
            // Bersihkan memori HP
            localStorage.removeItem('premiumChatSession');
            // Lempar kembali ke halaman Login
            window.location.href = 'login';
        } catch (error) {
            console.error("Gagal keluar:", error);
            // Tetap paksa keluar memori meskipun firebase error
            localStorage.removeItem('premiumChatSession');
            window.location.href = 'login';
        }
    }

    // --- FUNGSI NAVIGASI DINAMIS ---
    window.setActiveNav = function(element) {
        // 1. Cari semua elemen yang memiliki class 'nav-item'
        const navItems = document.querySelectorAll('.nav-item');
        
        // 2. Bersihkan/hapus class 'active' dari semuanya
        navItems.forEach(item => item.classList.remove('active'));
        
        // 3. Tambahkan class 'active' hanya ke elemen yang sedang diklik
        element.classList.add('active');
    }

    window.closeProfile = function() {
        // Sembunyikan layar profil
        document.getElementById('profileView').classList.remove('active');
        
        // Kembalikan status navigasi aktif ke ikon Beranda secara paksa
        const navHome = document.getElementById('navHome');
        if (navHome) {
            window.setActiveNav(navHome);
        }
    }

    // --- LOGIKA BUKU KONTAK DINAMIS ---
    
    // Simpan daftar kontak teman di memori HP agar hemat kuota database
    let mySavedContacts = JSON.parse(localStorage.getItem('premiumContactsList')) || [];

    window.openContacts = function() {
        document.getElementById('contactView').classList.add('active');
        renderSavedContacts(); // Muat daftar kontak saat layar dibuka
    }

    window.closeContacts = function() {
        document.getElementById('contactView').classList.remove('active');
        const navHome = document.getElementById('navHome');
        if (navHome) window.setActiveNav(navHome); // Kembalikan indikator ke Beranda
    }

    window.validateContactInput = function(input) {
        // FILTER: Hanya izinkan huruf, angka, @, dan _ (Otomatis menghapus simbol lain/spasi)
        input.value = input.value.replace(/[^a-zA-Z0-9@_]/g, '');
        document.getElementById('contactErrorMsg').style.display = 'none'; // Sembunyikan error saat mengetik ulang
    }

    window.addNewContact = async function() {
        const inputEl = document.getElementById('newContactInput');
        const errorMsg = document.getElementById('contactErrorMsg');
        const btn = document.getElementById('addContactBtn');
        const targetNickname = inputEl.value.trim();

        if (!targetNickname) return;
        
        // Cek jika mencoba menambahkan diri sendiri
        if (targetNickname === myNickname) {
            errorMsg.innerText = "Tidak bisa menambahkan diri sendiri";
            errorMsg.style.display = 'block';
            return;
        }

        try {
            btn.innerText = "Mencari...";
            btn.disabled = true;

            // Minta Firebase mencari pengguna dengan nickname tersebut
            const usersRef = collection(db, "users");
            const q = query(usersRef, where("nickname", "==", targetNickname));
            const querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                // PENGGUNA TIDAK DITEMUKAN
                errorMsg.innerText = "Pengguna tidak ada";
                errorMsg.style.display = 'block';
            } else {
                // PENGGUNA DITEMUKAN!
                let foundUserData = {};
                querySnapshot.forEach((doc) => { foundUserData = doc.data(); });

                // Cegah duplikasi kontak yang sudah ada di daftar
                const isAlreadySaved = mySavedContacts.some(c => c.nickname === targetNickname);
                if (!isAlreadySaved) {
                    mySavedContacts.push({
                        nickname: targetNickname,
                        avatar: foundUserData.avatar || `https://api.dicebear.com/7.x/notionists/svg?seed=${targetNickname}`
                    });
                    
                    localStorage.setItem('premiumContactsList', JSON.stringify(mySavedContacts));
                    inputEl.value = ""; // Bersihkan kolom
                    renderSavedContacts(); // Refresh UI
                } else {
                    errorMsg.innerText = "Kontak sudah ada di daftarmu";
                    errorMsg.style.display = 'block';
                }
            }
        } catch (error) {
            console.error("Error mencari kontak:", error);
            errorMsg.innerText = "Terjadi kesalahan koneksi";
            errorMsg.style.display = 'block';
        } finally {
            btn.innerText = "Tambahkan Kontak";
            btn.disabled = false;
        }
    }

    window.renderSavedContacts = function() {
        // Ambil elemen dari kedua layar
        const contactContainer = document.getElementById('savedContactsList');
        const homeContainer = document.getElementById('chatListContainer'); 
        
        if(contactContainer) contactContainer.innerHTML = "";
        if(homeContainer) homeContainer.innerHTML = "";

        // URUTKAN KONTAK SECARA ALFABETIS (A-Z / 0-9)
        const sortedContacts = mySavedContacts.sort((a, b) => a.nickname.localeCompare(b.nickname));

        sortedContacts.forEach(contact => {
            // 1. Render untuk layar "Tambahan Kontak"
            if(contactContainer) {
                const card = document.createElement('div');
                card.className = 'chat-card';
                card.onclick = function() {
                    openChat(contact.nickname, contact.avatar);
                    closeContacts(); // Tutup layar kontak otomatis
                };
                card.innerHTML = `
                    <div class="avatar" style="background-image: url('${contact.avatar}'); width: 44px; height: 44px; margin-right: 16px;"></div>
                    <div class="chat-info" style="justify-content: center;">
                        <span class="chat-name" style="font-size: 16px;">${contact.nickname}</span>
                    </div>
                `;
                contactContainer.appendChild(card);
            }

            // 2. Render juga ke layar utama (Beranda)
            if(homeContainer) {
                const homeCard = document.createElement('div');
                homeCard.className = 'chat-card';
                homeCard.onclick = function() {
                    openChat(contact.nickname, contact.avatar);
                };
                homeCard.innerHTML = `
                    <div class="avatar" style="background-image: url('${contact.avatar}');"></div>
                    <div class="chat-info">
                        <div class="chat-header">
                            <span class="chat-name">${contact.nickname}</span>
                        </div>
                        <span class="chat-message">Klik untuk memulai obrolan</span>
                    </div>
                `;
                homeContainer.appendChild(homeCard);
            }
        });
    }

    // PENTING: Eksekusi fungsi ini segera setelah halaman selesai dimuat
    // agar layar Beranda Anda tidak kosong!
    renderSavedContacts();
</script>
</body>
</html>
