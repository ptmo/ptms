<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Premium Holographic Chat</title>
    <style>
        /* === VARIABLES & RESET === */
        :root {
            --glass-bg: rgba(25, 25, 35, 0.4);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-highlight: rgba(255, 255, 255, 0.05);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --accent: #00f2fe;
            --bezier-smooth: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body, html { width: 100%; height: 100%; background-color: #050505; overflow: hidden; color: var(--text-main); }

        /* === HOLOGRAPHIC BACKGROUND (GLOWING ORBS) === */
        .holographic-bg { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; z-index: 0; background: #0f111a; }
        .orb { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.6; animation: floatOrbs 20s infinite ease-in-out alternate; }
        .orb-1 { width: 300px; height: 300px; background: #4facfe; top: -50px; left: -100px; animation-delay: 0s; }
        .orb-2 { width: 400px; height: 400px; background: #7f00ff; bottom: -100px; right: -50px; animation-delay: -5s; }
        .orb-3 { width: 250px; height: 250px; background: #ff007f; top: 40%; left: 30%; animation-duration: 25s; }

        @keyframes floatOrbs {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 50px) scale(1.1); }
            100% { transform: translate(-20px, -40px) scale(0.9); }
        }

        /* === APP CONTAINER === */
        .app-container { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100vh; height: 100dvh; /* For iOS Safari */ background: rgba(0,0,0,0.2); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }

        /* === HEADER === */
        .glass-header { padding: calc(env(safe-area-inset-top) + 15px) 20px 15px; display: flex; align-items: center; justify-content: space-between; background: var(--glass-bg); border-bottom: 1px solid var(--glass-border); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); z-index: 10; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(45deg, #00f2fe, #4facfe); border: 2px solid rgba(255,255,255,0.8); position: relative; }
        .online-dot { position: absolute; bottom: 0; right: 0; width: 12px; height: 12px; background: #00ff88; border: 2px solid #1a1a2e; border-radius: 50%; }
        .user-details h2 { font-size: 16px; font-weight: 600; letter-spacing: 0.3px; }
        .user-details p { font-size: 12px; color: var(--accent); font-weight: 500; }
        
        .header-actions svg { width: 22px; height: 22px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; opacity: 0.8; margin-left: 15px; transition: 0.2s; }
        .header-actions svg:active { transform: scale(0.9); opacity: 1; }

        /* === CHAT AREA === */
        .chat-scroll { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth; }
        .chat-scroll::-webkit-scrollbar { display: none; } /* Hide scrollbar for clean look */

        /* === MESSAGE BUBBLES === */
        .message-wrapper { display: flex; flex-direction: column; width: 100%; animation: slideInUp 0.6s var(--bezier-smooth) forwards; opacity: 0; transform: translateY(20px); }
        .message-wrapper.me { align-items: flex-end; }
        .message-wrapper.other { align-items: flex-start; }

        .bubble { max-width: 78%; padding: 14px 18px; border-radius: 24px; position: relative; font-size: 14.5px; line-height: 1.4; letter-spacing: 0.2px; background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); transition: transform 0.3s var(--bezier-smooth); }
        .bubble::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: inherit; background: linear-gradient(180deg, var(--glass-highlight) 0%, rgba(255,255,255,0) 100%); pointer-events: none; }
        .bubble:active { transform: scale(0.97); }

        .message-wrapper.me .bubble { background: rgba(0, 242, 254, 0.15); border-color: rgba(0, 242, 254, 0.3); border-bottom-right-radius: 6px; }
        .message-wrapper.other .bubble { border-bottom-left-radius: 6px; }

        .meta-data { font-size: 10px; color: var(--text-muted); margin-top: 6px; display: flex; align-items: center; gap: 4px; padding: 0 4px; }
        .read-receipt svg { width: 12px; height: 12px; stroke: var(--accent); }

        /* Feature: System / Time separator */
        .time-separator { align-self: center; background: rgba(0,0,0,0.3); padding: 4px 12px; border-radius: 20px; font-size: 11px; color: var(--text-muted); border: 1px solid rgba(255,255,255,0.05); margin: 10px 0; backdrop-filter: blur(10px); }

        @keyframes slideInUp { to { opacity: 1; transform: translateY(0); } }

        /* === INPUT AREA === */
        .glass-input-area { padding: 10px 15px calc(env(safe-area-inset-bottom) + 15px); background: linear-gradient(to top, rgba(15, 17, 26, 0.9) 50%, rgba(15, 17, 26, 0.3)); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 12px; z-index: 10; }
        
        .btn-action { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; transition: 0.3s; }
        .btn-action svg { width: 20px; height: 20px; stroke: var(--text-main); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .btn-action:active { background: rgba(255,255,255,0.15); transform: scale(0.9); }

        .input-wrapper { flex: 1; position: relative; display: flex; align-items: center; }
        .main-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 24px; padding: 12px 20px; color: #fff; font-size: 15px; outline: none; box-shadow: inset 0 2px 10px rgba(0,0,0,0.2); transition: 0.3s; }
        .main-input:focus { border-color: rgba(0, 242, 254, 0.5); background: rgba(0,0,0,0.5); }
        .main-input::placeholder { color: var(--text-muted); }

        .btn-send { background: linear-gradient(135deg, #00f2fe, #4facfe); border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4); opacity: 0.5; pointer-events: none; transition: 0.3s; }
        .btn-send.active { opacity: 1; pointer-events: auto; transform: scale(1.05); }
        .btn-send svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; margin-left: -2px; }

    </style>
</head>
<body>

<!-- Holographic Background Elements -->
<div class="holographic-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<div class="app-container">
    
    <!-- Premium Header -->
    <header class="glass-header">
        <div class="user-info">
            <svg style="width:24px; height:24px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; margin-right:5px;"><polyline points="15 18 9 12 15 6"></polyline></svg>
            <div class="avatar">
                <div class="online-dot"></div>
            </div>
            <div class="user-details">
                <h2>Raka_Dev</h2>
                <p>System Online</p>
            </div>
        </div>
        <div class="header-actions">
            <svg viewBox="0 0 24 24"><path d="M2 12a10 10 0 1 0 20 0 10 10 0 1 0-20 0"></path><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
        </div>
    </header>

    <!-- Chat Feed Area -->
    <main class="chat-scroll" id="chatFeed">
        <div class="time-separator">Hari ini, 09:41</div>

        <div class="message-wrapper other" style="animation-delay: 0.1s;">
            <div class="bubble">UI layout baru sudah di-deploy ke environment testing. Tolong review animasinya ya.</div>
            <div class="meta-data">09:42</div>
        </div>

        <div class="message-wrapper me" style="animation-delay: 0.3s;">
            <div class="bubble">Gila, smooth banget. Transisi cubic-bezier nya berasa premium standarnya.</div>
            <div class="meta-data">
                09:45 
                <span class="read-receipt">
                    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </span>
            </div>
        </div>
        
        <div class="message-wrapper other" style="animation-delay: 0.5s;">
            <div class="bubble">Sip. Bagian backdrop-filter untuk mobile web aman? Terkadang berat di device lama.</div>
            <div class="meta-data">09:46</div>
        </div>
    </main>

    <!-- Feature-Rich Input Area -->
    <footer class="glass-input-area">
        <div class="btn-action">
            <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
        </div>
        <div class="input-wrapper">
            <input type="text" id="chatInput" class="main-input" placeholder="Type a message..." autocomplete="off">
        </div>
        <button class="btn-send" id="sendBtn">
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </footer>

</div>

<script>
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatFeed = document.getElementById('chatFeed');

    // Mengaktifkan tombol kirim hanya saat ada teks (Standar UX)
    chatInput.addEventListener('input', () => {
        if(chatInput.value.trim().length > 0) {
            sendBtn.classList.add('active');
        } else {
            sendBtn.classList.remove('active');
        }
    });

    // Fungsi menambahkan pesan baru dengan animasi
    function sendMessage() {
        const text = chatInput.value.trim();
        if(!text) return;

        // Ambil waktu saat ini
        const now = new Date();
        const timeString = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

        // Buat elemen pesan baru
        const msgWrapper = document.createElement('div');
        msgWrapper.className = 'message-wrapper me';
        msgWrapper.innerHTML = `
            <div class="bubble">${text}</div>
            <div class="meta-data">
                ${timeString}
                <span class="read-receipt">
                    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </span>
            </div>
        `;

        chatFeed.appendChild(msgWrapper);
        
        // Bersihkan input
        chatInput.value = '';
        sendBtn.classList.remove('active');

        // Auto-scroll halus ke bawah
        chatFeed.scrollTo({
            top: chatFeed.scrollHeight,
            behavior: 'smooth'
        });
    }

    // Kirim pesan saat tombol ditekan
    sendBtn.addEventListener('click', sendMessage);

    // Kirim pesan saat menekan Enter (untuk keyboard HP)
    chatInput.addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            sendMessage();
        }
    });
</script>

</body>
</html>
