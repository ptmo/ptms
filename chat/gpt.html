<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spatial Depth Chat UI</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: Inter, Arial, sans-serif;
      background: #050816;
      overflow: hidden;
      height: 100vh;
      color: white;
    }.bg-layer {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 35%),
    radial-gradient(circle at 80% 70%, rgba(0,255,255,0.08), transparent 40%),
    radial-gradient(circle at 50% 40%, rgba(128,0,255,0.08), transparent 35%);
  animation: drift 18s ease-in-out infinite alternate;
  filter: blur(20px);
  transform: scale(1.2);
}

@keyframes drift {
  from { transform: scale(1.2) translate(0,0); }
  to { transform: scale(1.3) translate(-20px, 20px); }
}

.app {
  position: relative;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  perspective: 1200px;
}

.chat-shell {
  width: min(420px, 96vw);
  height: 92vh;
  border-radius: 28px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.45);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform-style: preserve-3d;
  transition: transform 0.15s ease-out;
}

.header {
  padding: 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.title { font-size: 18px; font-weight: 600; }
.status { font-size: 12px; opacity: 0.6; }

.messages {
  flex: 1;
  padding: 16px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.bubble {
  max-width: 78%;
  padding: 12px 14px;
  border-radius: 22px;
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.08);
  animation: emerge 0.55s cubic-bezier(0.16,1,0.3,1);
  transform-origin: center;
}

.left { align-self: flex-start; background: rgba(255,255,255,0.06); }
.right { align-self: flex-end; background: rgba(255,255,255,0.14); }

@keyframes emerge {
  from { opacity: 0; transform: scale(0.82) translateZ(-80px); }
  to { opacity: 1; transform: scale(1) translateZ(0); }
}

.input-bar {
  padding: 14px;
  border-top: 1px solid rgba(255,255,255,0.08);
}

.input-wrap {
  display: flex;
  gap: 10px;
  align-items: center;
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 10px 14px;
  border: 1px solid rgba(255,255,255,0.08);
}

input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: white;
  font-size: 14px;
}

button {
  border: none;
  border-radius: 14px;
  padding: 10px 14px;
  cursor: pointer;
  background: rgba(255,255,255,0.15);
  color: white;
}

  </style>
</head>
<body>
  <div class="bg-layer"></div>
  <div class="app">
    <div class="chat-shell" id="chatShell">
      <div class="header">
        <div>
          <div class="title">Spatial Connect</div>
          <div class="status">Immersive Secure Chat</div>
        </div>
        <div>⋮</div>
      </div><div class="messages" id="messages">
    <div class="bubble left">Welcome to the holographic channel.</div>
    <div class="bubble right">This feels smooth and premium.</div>
  </div>

  <div class="input-bar">
    <div class="input-wrap">
      <input id="chatInput" placeholder="Type message..." />
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

  </div>  <script>
    const shell = document.getElementById('chatShell');

    if (window.DeviceOrientationEvent) {
      window.addEventListener('deviceorientation', e => {
        const x = (e.gamma || 0) / 8;
        const y = (e.beta || 0) / 12;
        shell.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
      });
    }

    function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;

      const msg = document.createElement('div');
      msg.className = 'bubble right';
      msg.textContent = text;

      const box = document.getElementById('messages');
      box.appendChild(msg);
      box.scrollTop = box.scrollHeight;
      input.value = '';
    }
  </script></body>
</html>
