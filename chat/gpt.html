<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spatial Premium Chat</title>
  <style>
    :root {
      --glass: rgba(255,255,255,0.08);
      --glass-strong: rgba(255,255,255,0.14);
      --border: rgba(255,255,255,0.12);
      --text-soft: rgba(255,255,255,0.7);
      --shadow: 0 24px 80px rgba(0,0,0,0.45);
      --radius-xl: 28px;
      --radius-lg: 22px;
    }* { box-sizing: border-box; margin:0; padding:0; }

body {
  height: 100vh;
  overflow: hidden;
  font-family: Inter, system-ui, sans-serif;
  background: #060913;
  color: white;
}

.ambient {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 15% 20%, rgba(99,102,241,.22), transparent 35%),
    radial-gradient(circle at 85% 70%, rgba(34,211,238,.18), transparent 35%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.05), transparent 45%);
  filter: blur(40px);
  animation: floatAura 18s ease-in-out infinite alternate;
  transform: scale(1.2);
}

@keyframes floatAura {
  from { transform: scale(1.15) translate(0,0); }
  to { transform: scale(1.28) translate(-20px, 18px); }
}

.app {
  position: relative;
  z-index: 2;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  padding: 16px;
  perspective: 1600px;
}

.shell {
  width: min(430px, 100%);
  height: 94vh;
  border-radius: var(--radius-xl);
  background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.03));
  backdrop-filter: blur(28px) saturate(160%);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform-style: preserve-3d;
  transition: transform .15s ease-out;
  position: relative;
}

.glow-line {
  position: absolute;
  top: 0;
  left: 12%;
  width: 76%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.5), transparent);
}

.header {
  padding: 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.meta h1 { font-size: 18px; font-weight: 600; }
.meta p { font-size: 12px; color: var(--text-soft); margin-top: 3px; }

.actions {
  width: 38px;
  height: 38px;
  border-radius: 14px;
  background: rgba(255,255,255,0.06);
  display: grid;
  place-items: center;
  border: 1px solid rgba(255,255,255,0.08);
}

.messages {
  flex: 1;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow-y: auto;
}

.bubble {
  max-width: 78%;
  padding: 14px 16px;
  border-radius: 24px;
  line-height: 1.45;
  font-size: 14px;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 12px 30px rgba(0,0,0,0.18);
  animation: rise .6s cubic-bezier(.16,1,.3,1);
  backdrop-filter: blur(18px);
}

.left {
  align-self: flex-start;
  background: rgba(255,255,255,0.05);
}

.right {
  align-self: flex-end;
  background: rgba(255,255,255,0.14);
}

@keyframes rise {
  from { opacity: 0; transform: translateY(20px) scale(.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.composer {
  padding: 16px;
  border-top: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.02);
}

.bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 22px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.08);
}

input {
  flex: 1;
  border: none;
  background: transparent;
  color: white;
  outline: none;
  font-size: 14px;
}

input::placeholder { color: rgba(255,255,255,0.45); }

.send {
  width: 42px;
  height: 42px;
  border-radius: 16px;
  border: none;
  background: linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,.08));
  color: white;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

  </style>
</head>
<body>
  <div class="ambient"></div>  <div class="app">
    <div class="shell" id="shell">
      <div class="glow-line"></div><div class="header">
    <div class="meta">
      <h1>Spatial Connect</h1>
      <p>Encrypted • Premium Layer</p>
    </div>
    <div class="actions">⋮</div>
  </div>

  <div class="messages" id="messages">
    <div class="bubble left">Your immersive communication layer is active.</div>
    <div class="bubble right">Now this feels refined, elegant, and worthy.</div>
  </div>

  <div class="composer">
    <div class="bar">
      <input id="chatInput" placeholder="Write with intention..." />
      <button class="send" onclick="sendMessage()">➜</button>
    </div>
  </div>
</div>

  </div>  <script>
    const shell = document.getElementById('shell');

    if (window.DeviceOrientationEvent) {
      window.addEventListener('deviceorientation', e => {
        const x = (e.gamma || 0) / 10;
        const y = (e.beta || 0) / 14;
        shell.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
      });
    }

    function sendMessage() {
      const input = document.getElementById('chatInput');
      const box = document.getElementById('messages');
      const text = input.value.trim();
      if (!text) return;

      const msg = document.createElement('div');
      msg.className = 'bubble right';
      msg.textContent = text;
      box.appendChild(msg);
      box.scrollTop = box.scrollHeight;
      input.value = '';
    }
  </script></body>
</html>
