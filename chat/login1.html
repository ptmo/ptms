<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Premium Holographic Login</title>
    <style>
        /* === VARIABLES & RESET === */
        :root {
            --glass-bg: rgba(25, 25, 35, 0.4);
            --glass-card: rgba(20, 22, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-highlight: rgba(255, 255, 255, 0.05);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --accent: #00f2fe;
            --bezier-smooth: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background-color: #050505; overflow: hidden; color: var(--text-main); display: flex; justify-content: center; align-items: center; }

        /* === HOLOGRAPHIC BACKGROUND === */
        .holographic-bg { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; z-index: 0; background: #0f111a; }
        .orb { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.6; animation: floatOrbs 20s infinite ease-in-out alternate; }
        .orb-1 { width: 350px; height: 350px; background: #4facfe; top: -100px; left: -100px; animation-delay: 0s; }
        .orb-2 { width: 450px; height: 450px; background: #7f00ff; bottom: -150px; right: -100px; animation-delay: -5s; }
        .orb-3 { width: 250px; height: 250px; background: #00f2fe; top: 40%; left: 20%; animation-duration: 25s; }

        @keyframes floatOrbs {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 50px) scale(1.1); }
            100% { transform: translate(-20px, -40px) scale(0.9); }
        }

        /* === LOGIN CONTAINER === */
        .login-wrapper { position: relative; z-index: 1; width: 100%; max-width: 400px; padding: 20px; animation: fadeUp 0.8s var(--bezier-smooth) forwards; opacity: 0; transform: translateY(30px); }
        
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        .glass-panel { background: var(--glass-card); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 30px; padding: 40px 30px; box-shadow: var(--glass-shadow); position: relative; overflow: hidden; }
        .glass-panel::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); }

        /* === LOGO & BRANDING === */
        .brand-header { text-align: center; margin-bottom: 35px; }
        .brand-icon { width: 60px; height: 60px; border-radius: 20px; background: linear-gradient(135deg, #00f2fe, #4facfe); margin: 0 auto 15px; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 25px rgba(0, 242, 254, 0.4); }
        .brand-icon svg { width: 32px; height: 32px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        
        .brand-header h1 { font-size: 24px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 5px; }
        .brand-header p { font-size: 13px; color: var(--text-muted); }

        /* === FORM INPUTS === */
        .input-group { margin-bottom: 15px; }
        .glass-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 16px; padding: 16px 20px; color: #fff; font-size: 14px; outline: none; box-shadow: inset 0 2px 10px rgba(0,0,0,0.2); transition: 0.3s; }
        .glass-input:focus { border-color: rgba(0, 242, 254, 0.5); background: rgba(0,0,0,0.5); box-shadow: inset 0 2px 10px rgba(0,0,0,0.2), 0 0 15px rgba(0, 242, 254, 0.1); }
        .glass-input::placeholder { color: var(--text-muted); }

        .forgot-link { display: block; text-align: right; font-size: 12px; color: var(--accent); text-decoration: none; margin-top: 10px; font-weight: 500; }

        /* === PRIMARY BUTTON === */
        .btn-primary { width: 100%; padding: 16px; border-radius: 16px; background: linear-gradient(135deg, #00f2fe, #4facfe); border: none; color: #fff; font-size: 15px; font-weight: 600; letter-spacing: 0.5px; margin-top: 20px; box-shadow: 0 8px 20px rgba(0, 242, 254, 0.3); cursor: pointer; transition: 0.3s var(--bezier-smooth); position: relative; overflow: hidden; }
        .btn-primary:active { transform: scale(0.97); box-shadow: 0 4px 10px rgba(0, 242, 254, 0.2); }

        /* === DIVIDER === */
        .divider { display: flex; align-items: center; text-align: center; margin: 25px 0; color: var(--text-muted); font-size: 12px; font-weight: 500; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--glass-border); }
        .divider span { padding: 0 10px; }

        /* === GOOGLE LOGIN BUTTON === */
        .btn-google { width: 100%; padding: 14px 16px; border-radius: 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); color: #fff; font-size: 14px; font-weight: 600; display: flex; justify-content: center; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s var(--bezier-smooth); position: relative; }
        .btn-google:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.1); }
        .btn-google .g-logo { width: 20px; height: 20px; }

        /* Loading Spinner */
        .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; position: absolute; right: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-google.loading .spinner { display: block; }
        .btn-google.loading span, .btn-google.loading svg.g-logo { opacity: 0.5; }

        /* === FOOTER TEXT === */
        .footer-text { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 25px; }
        .footer-text a { color: #fff; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>

<!-- Holographic Background Elements -->
<div class="holographic-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<div class="login-wrapper">
    <div class="glass-panel">
        
        <!-- Branding -->
        <div class="brand-header">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path><path d="M12 15l-4-4h8z" fill="#fff" stroke="none"></path></svg>
            </div>
            <h1>Welcome Back</h1>
            <p>Sign in to access your secure network</p>
        </div>

        <!-- Form Inputs -->
        <div class="input-group">
            <input type="email" class="glass-input" placeholder="Email address" autocomplete="off">
        </div>
        <div class="input-group">
            <input type="password" class="glass-input" placeholder="Password">
            <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button class="btn-primary">Sign In</button>

        <!-- Divider -->
        <div class="divider">
            <span>OR CONTINUE WITH</span>
        </div>

        <!-- Google Premium Button -->
        <button class="btn-google" id="googleBtn" onclick="simulateGoogleLogin()">
            <!-- Official Google 'G' SVG Path -->
            <svg class="g-logo" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            <span>Sign in with Google</span>
            <div class="spinner"></div>
        </button>

        <!-- Footer -->
        <div class="footer-text">
            Don't have an account? <a href="#">Request access</a>
        </div>

    </div>
</div>

<script>
    // Animasi simulasi loading untuk tombol Google
    function simulateGoogleLogin() {
        const btn = document.getElementById('googleBtn');
        btn.classList.add('loading');
        
        // Simulasi proses redirect/auth (2.5 detik)
        setTimeout(() => {
            btn.classList.remove('loading');
            // Biasanya di sini Anda redirect ke halaman utama
            // window.location.href = "halaman-utama.html";
            alert("Login Google Berhasil! Mengalihkan ke Halaman Utama...");
        }, 2500);
    }
</script>

</body>
</html>
