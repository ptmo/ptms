<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Web3 Explorer</title>
    <link rel="stylesheet" href="style.css">
<style>
    :root {
    --bg-abyss: #070709;
    --glass-bg: rgba(20, 20, 25, 0.4);
    --glass-border: rgba(255, 255, 255, 0.05);
    --glass-hover: rgba(0, 255, 204, 0.15);
    --text-main: #f8f9fa;
    --text-muted: #8b949e;
    --accent-cyan: #00ffcc;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

body {
    background-color: var(--bg-abyss);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    overflow-x: hidden;
    /* Pencahayaan radial cyber-minimalist */
    background-image: radial-gradient(circle at 50% 0%, #121c22 0%, var(--bg-abyss) 60%);
    perspective: 1000px; /* Diperlukan untuk efek 3D Tilt */
}

.explorer-dashboard { width: 100%; max-width: 1100px; }

.dashboard-header h1 { font-size: 1.4rem; display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; }
.pulse-dot { width: 8px; height: 8px; background: var(--accent-cyan); border-radius: 50%; box-shadow: 0 0 12px var(--accent-cyan); animation: pulse 2s infinite ease-in-out; }

/* 1. Bento Box Grid System */
.bento-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 160px;
    gap: 1.25rem;
}

/* 5. Dark Glassmorphism */
.bento-card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: border-color 0.4s ease, box-shadow 0.4s ease, transform 0.1s; /* Transform cepat untuk giroskop */
    transform-style: preserve-3d;
}

.bento-card:hover {
    border-color: var(--glass-hover);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.card-visualizer { grid-column: span 2; grid-row: span 2; padding: 0; overflow: hidden; justify-content: flex-start; }
.card-wide { grid-column: span 2; }

/* Typografi */
.label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; transform: translateZ(20px); }
.value { font-size: 3rem; font-weight: 700; transform: translateZ(30px); }
.value .unit { font-size: 1rem; color: var(--text-muted); font-weight: 400; }
.gradient-text { background: linear-gradient(90deg, #fff, var(--accent-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

/* 4. Smart Hash Pill UX */
.smart-pill-container { margin-top: auto; transform: translateZ(25px); }
.hash-pill {
    display: inline-flex;
    align-items: center;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px;
    padding: 0.4rem 0.5rem 0.4rem 1.2rem;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
}
.hash-pill:hover { border-color: var(--accent-cyan); }
.hash-text { font-family: monospace; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; transition: color 0.3s; }
.hash-pill:hover .hash-text { color: #fff; }

.copy-btn {
    background: rgba(255,255,255,0.05);
    border: none;
    color: var(--accent-cyan);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-left: 10px;
    cursor: pointer;
    transition: background 0.3s, transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
}
.hash-pill:hover .copy-btn { background: rgba(0, 255, 204, 0.2); transform: scale(1.1); }

/* Animasi Ripple Copy */
.ripple {
    position: absolute; background: rgba(0, 255, 204, 0.4); border-radius: 50%;
    transform: scale(0); animation: rippleEffect 0.6s linear; pointer-events: none;
}

/* Canvas & Tooltip */
.canvas-container { position: relative; width: 100%; height: 100%; }
#nodeCanvas { width: 100%; height: 100%; cursor: crosshair; }
.card-header { position: absolute; top: 1.5rem; left: 1.5rem; z-index: 2; pointer-events: none; }

.glass-tooltip {
    position: absolute; background: rgba(5, 5, 8, 0.8); border: 1px solid var(--accent-cyan);
    border-radius: 12px; padding: 1rem; width: 180px; backdrop-filter: blur(10px);
    opacity: 0; transform: translate(-50%, -120%) scale(0.9);
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: none; z-index: 10;
}
.glass-tooltip.show { opacity: 1; transform: translate(-50%, -120%) scale(1); }
.tt-head { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; margin-bottom: 8px; }
.badge { font-size: 0.6rem; background: rgba(0,255,204,0.15); color: var(--accent-cyan); padding: 2px 6px; border-radius: 4px; }
.tt-hash { font-family: monospace; font-size: 0.75rem; color: var(--text-muted); }

@keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); box-shadow: 0 0 15px var(--accent-cyan); } }
@keyframes rippleEffect { to { transform: scale(4); opacity: 0; } }

/* Mobile Responsiveness (Otomatis beralih ke Stack Vertikal) */
@media (max-width: 900px) {
    .bento-grid { grid-template-columns: repeat(2, 1fr); }
    .card-visualizer, .card-wide { grid-column: span 2; }
}
@media (max-width: 600px) {
    body { padding: 1rem; }
    .bento-grid { display: flex; flex-direction: column; }
    .bento-card { min-height: 140px; transform: none !important; /* Nonaktifkan tilt 3D berat di HP lama */ }
    .card-visualizer { min-height: 250px; }
    .value { font-size: 2.5rem; }
    .hash-text { max-width: 150px; }
    }
</style>
</head>
<body>

    <div class="explorer-dashboard">
        <header class="dashboard-header">
            <h1>L2 Explorer <span class="pulse-dot"></span></h1>
        </header>

        <main class="bento-grid">
            <!-- Card 1: Canvas Visualizer (Spans 2 columns) -->
            <div class="bento-card card-visualizer tilt-effect">
                <div class="card-header">
                    <span class="label">Live Network Nodes</span>
                </div>
                <div class="canvas-container">
                    <canvas id="nodeCanvas"></canvas>
                    <div id="nodeTooltip" class="glass-tooltip">
                        <div class="tt-head"><span id="tt-block">#0</span> <span class="badge">Finalized</span></div>
                        <div class="tt-body">
                            <div>Tx: <span id="tt-tx">0</span></div>
                            <div class="tt-hash" id="tt-hash">0x...</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Card 2: Live TPS (LERP Animated) -->
            <div class="bento-card tilt-effect">
                <span class="label">Live TPS</span>
                <h2 class="value gradient-text" id="tps-value">0</h2>
            </div>

            <!-- Card 3: Gas Fee (LERP Animated) -->
            <div class="bento-card tilt-effect">
                <span class="label">Avg Gas Fee</span>
                <h2 class="value" id="gas-value">0.00 <span class="unit">Gwei</span></h2>
            </div>

            <!-- Card 4: Smart Hash Pill UX -->
            <div class="bento-card card-wide tilt-effect">
                <span class="label">Latest Contract Deployed</span>
                <div class="smart-pill-container">
                    <div class="hash-pill" id="latest-hash">
                        <span class="hash-text">0x71C95911E9a5D33751bA502B6D4413B2A</span>
                        <button class="copy-btn" onclick="copyHash(this)">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
    // === 3. ANIMASI LERP UNTUK DATA (Angka Smooth) ===
    const lerp = (start, end, factor) => start + (end - start) * factor;
    
    let currentTps = 0, targetTps = 4210;
    let currentGas = 0, targetGas = 0.002;
    const tpsEl = document.getElementById("tps-value");
    const gasEl = document.getElementById("gas-value");

    function updateNumbers() {
        currentTps = lerp(currentTps, targetTps, 0.05);
        currentGas = lerp(currentGas, targetGas, 0.05);
        
        tpsEl.innerText = Math.floor(currentTps).toLocaleString();
        gasEl.innerHTML = `${currentGas.toFixed(4)} <span class="unit">Gwei</span>`;
        
        requestAnimationFrame(updateNumbers);
    }
    updateNumbers();

    // Simulasi data masuk (Fluktuasi angka)
    setInterval(() => { targetTps = 4000 + Math.random() * 500; }, 3000);
    setInterval(() => { targetGas = 0.001 + Math.random() * 0.003; }, 4000);

    // === 2. VISUALISASI BLOK BERBASIS NODE (CANVAS) ===
    const canvas = document.getElementById("nodeCanvas");
    const ctx = canvas.getContext("2d");
    const tooltip = document.getElementById("nodeTooltip");
    
    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let nodes = [];
    const nodeSpacing = 100;

    class NodeBlock {
        constructor(index) {
            this.targetX = canvas.width - 50 - (index * nodeSpacing);
            this.x = this.targetX + 100; // Mulai dari kanan (masuk layar)
            this.y = canvas.height / 2 + 20;
            this.radius = 0;
            this.targetRadius = 6;
            this.data = {
                id: Math.floor(Math.random() * 90000) + 10000,
                tx: Math.floor(Math.random() * 300),
                hash: "0x" + Math.random().toString(16).substr(2, 8) + "..."
            };
        }
        update() {
            this.x = lerp(this.x, this.targetX, 0.08); // Pergerakan garis yang soft
            this.radius = lerp(this.radius, this.targetRadius, 0.1);
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.shadowBlur = 10; ctx.shadowColor = "#00ffcc";
            ctx.fillStyle = "#00ffcc"; ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    function animateNodes() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Gambar Garis Penghubung
        ctx.beginPath();
        ctx.strokeStyle = "rgba(0, 255, 204, 0.2)";
        ctx.lineWidth = 2;
        nodes.forEach((n, i) => {
            n.update();
            if (i === 0) ctx.moveTo(n.x, n.y);
            else ctx.lineTo(n.x, n.y);
        });
        ctx.stroke();
        
        // Gambar Titik Node
        nodes.forEach(n => n.draw());
        requestAnimationFrame(animateNodes);
    }

    for(let i=0; i<6; i++) nodes.push(new NodeBlock(i));
    animateNodes();

    // Tambah blok baru tiap 3 detik (Simulasi WebSocket)
    setInterval(() => {
        nodes.forEach(n => n.targetX -= nodeSpacing);
        nodes.unshift(new NodeBlock(0));
        if (nodes.length > 8) nodes.pop(); // Hapus dari memori
    }, 3000);

    // Interaksi Hover Canvas
    canvas.addEventListener("mousemove", (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        let found = false;

        nodes.forEach(n => {
            if (Math.hypot(n.x - mx, n.y - my) < 20) {
                found = true;
                n.targetRadius = 10;
                document.getElementById("tt-block").innerText = `#${n.data.id}`;
                document.getElementById("tt-tx").innerText = n.data.tx;
                document.getElementById("tt-hash").innerText = n.data.hash;
                tooltip.style.left = `${n.x}px`; tooltip.style.top = `${n.y}px`;
                tooltip.classList.add("show");
            } else {
                n.targetRadius = 6;
            }
        });
        if (!found) tooltip.classList.remove("show");
    });

    // === EFEK KEDALAMAN (TILT & GIROSKOP) ===
    const cards = document.querySelectorAll('.tilt-effect');
    
    // PC: Mouse Tilt
    document.addEventListener("mousemove", (e) => {
        if(window.innerWidth < 900) return; // Matikan di HP (gunakan giroskop)
        const xAxis = (window.innerWidth / 2 - e.pageX) / 40;
        const yAxis = (window.innerHeight / 2 - e.pageY) / 40;
        cards.forEach(card => card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`);
    });

    // Mobile: Gyroscope Tilt (Device Orientation)
    if (window.DeviceOrientationEvent) {
        window.addEventListener('deviceorientation', (e) => {
            if(window.innerWidth >= 900) return;
            // Batasi rotasi agar tidak terlalu ekstrem
            const tiltX = Math.max(-10, Math.min(10, e.beta - 45)) / 2; // Ponsel biasanya digenggam miring 45deg
            const tiltY = Math.max(-10, Math.min(10, e.gamma)) / 2;
            cards.forEach(card => card.style.transform = `rotateY(${tiltY}deg) rotateX(${-tiltX}deg)`);
        });
    }
});

// === 4. PENANGANAN HASH CERDAS (UX RIPPLE COPY) ===
function copyHash(btn) {
    const pill = btn.closest('.hash-pill');
    const text = pill.querySelector('.hash-text').innerText;
    
    // Salin ke Clipboard
    navigator.clipboard.writeText(text);

    // Animasi Ripple Soft
    const ripple = document.createElement("span");
    ripple.classList.add("ripple");
    
    const rect = btn.getBoundingClientRect();
    const size = Math.max(pill.clientWidth, pill.clientHeight);
    ripple.style.width = ripple.style.height = `${size}px`;
    ripple.style.left = `${rect.left - pill.getBoundingClientRect().left - size/2 + rect.width/2}px`;
    ripple.style.top = `${rect.top - pill.getBoundingClientRect().top - size/2 + rect.height/2}px`;
    
    pill.appendChild(ripple);
    
    // Ubah Ikon Sementara (Visual Feedback)
    const oldIcon = btn.innerHTML;
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00ffcc" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
    
    setTimeout(() => {
        ripple.remove();
        btn.innerHTML = oldIcon;
    }, 600);
                      }
    </script>
</body>
</html>
