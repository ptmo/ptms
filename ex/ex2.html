<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Web3 Explorer</title>
    <!-- Menggunakan Ethers.js versi 6 via CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.11.1/ethers.umd.min.js"></script>
<style>
    :root {
        --bg-abyss: #070709;
        --glass-bg: rgba(20, 20, 25, 0.4);
        --glass-border: rgba(255, 255, 255, 0.05);
        --glass-hover: rgba(0, 255, 204, 0.15);
        --text-main: #f8f9fa;
        --text-muted: #8b949e;
        --accent-cyan: #00ffcc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
        background-color: var(--bg-abyss);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 2rem 1rem;
        overflow-x: hidden;
        /* Pencahayaan radial cyber-minimalist */
        background-image: radial-gradient(circle at 50% 0%, #121c22 0%, var(--bg-abyss) 60%);
        perspective: 1000px;
    }

    .explorer-dashboard { width: 100%; max-width: 1100px; }

    .dashboard-header h1 { font-size: 1.4rem; display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; }
    .pulse-dot { width: 8px; height: 8px; background: var(--accent-cyan); border-radius: 50%; box-shadow: 0 0 12px var(--accent-cyan); animation: pulse 2s infinite ease-in-out; }

    /* === 1. BENTO BOX GRID SYSTEM (TATA LETAK 1-2-1) === */
    .bento-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr); /* 2 Kolom Murni */
        gap: 1.25rem;
    }

    /* Penempatan Kartu Spesifik */
    .card-visualizer { grid-column: span 2; min-height: 260px; padding: 0 !important; overflow: hidden; justify-content: flex-start !important; }
    .card-tps { grid-column: span 1; }
    .card-gas { grid-column: span 1; }
    .card-feed { grid-column: span 2; }

    /* 5. Dark Glassmorphism */
    .bento-card {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        transition: border-color 0.4s ease, box-shadow 0.4s ease, transform 0.1s;
        transform-style: preserve-3d;
    }

    .bento-card:hover {
        border-color: var(--glass-hover);
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    /* Typografi */
    .label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; transform: translateZ(20px); }
    .value { font-size: 2.8rem; font-weight: 700; transform: translateZ(30px); }
    .value .unit { font-size: 1rem; color: var(--text-muted); font-weight: 400; }
    .gradient-text { background: linear-gradient(90deg, #fff, var(--accent-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* Canvas & Tooltip */
    .canvas-container { position: relative; width: 100%; height: 100%; }
    #nodeCanvas { width: 100%; height: 100%; cursor: crosshair; }
    .card-header { position: absolute; top: 1.5rem; left: 1.5rem; z-index: 2; pointer-events: none; }

    .glass-tooltip {
        position: absolute; background: rgba(5, 5, 8, 0.8); border: 1px solid var(--accent-cyan);
        border-radius: 12px; padding: 1rem; width: 180px; backdrop-filter: blur(10px);
        opacity: 0; transform: translate(-50%, -120%) scale(0.9);
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: none; z-index: 10;
    }
    .glass-tooltip.show { opacity: 1; transform: translate(-50%, -120%) scale(1); }
    .tt-head { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; margin-bottom: 8px; }
    .badge { font-size: 0.6rem; background: rgba(0,255,204,0.15); color: var(--accent-cyan); padding: 2px 6px; border-radius: 4px; }
    .tt-hash { font-family: monospace; font-size: 0.75rem; color: var(--text-muted); }

    @keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); box-shadow: 0 0 15px var(--accent-cyan); } }

    /* === 6. LIVE TRANSACTION FEED (DYNAMIC & TALL) === */
    .card-header-feed {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
        transform: translateZ(20px);
    }

    .live-indicator { width: 8px; height: 8px; background: var(--accent-cyan); border-radius: 50%; box-shadow: 0 0 10px var(--accent-cyan); animation: pulse 1.5s infinite ease-in-out; }

    .tx-feed-container {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        overflow: hidden;
        /* Tinggi diekspansi untuk menampung 10 transaksi dengan sangat lega */
        height: 600px; 
        position: relative;
        transform: translateZ(25px);
    }

    /* Desain Baris Transaksi */
    .tx-row {
        display: flex; justify-content: space-between; align-items: center;
        background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.04);
        padding: 0.7rem 1.2rem; border-radius: 12px;
        animation: slideInDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .tx-info { display: flex; flex-direction: column; gap: 4px; }
    .tx-hash-link { font-family: monospace; font-size: 0.85rem; color: var(--accent-cyan); text-decoration: none; letter-spacing: 0.5px; transition: text-shadow 0.3s; }
    .tx-hash-link:hover { text-shadow: 0 0 10px rgba(0, 255, 204, 0.5); }
    .tx-time { font-size: 0.7rem; color: var(--text-muted); }
    .tx-amount { font-family: monospace; font-weight: 600; font-size: 0.9rem; color: #fff; }

    @keyframes slideInDown { 0% { opacity: 0; transform: translateY(-20px); } 100% { opacity: 1; transform: translateY(0); } }
    .tx-row.fade-out { animation: fadeOutDown 0.4s ease forwards; }
    @keyframes fadeOutDown { to { opacity: 0; transform: translateY(20px); } }

    /* === Mobile Responsiveness (Grid Tetap Dipertahankan) === */
    @media (max-width: 600px) {
        body { padding: 1rem; }
        .bento-grid { gap: 1rem; }
        .bento-card { transform: none !important; }
        .card-visualizer { min-height: 200px; }
        
        /* Mengecilkan font agar kartu TPS dan Gas Fee tetap sejajar di HP */
        .value { font-size: 1.8rem; } 
        .tx-feed-container { height: 600px; } 
        
        /* Mencegah Hash bertumpuk di HP kecil */
        .tx-hash-link { font-size: 0.75rem; }
        .tx-row { padding: 0.6rem 0.8rem; }
    }

    /* === 7. OMNI-SEARCH & MARKET DATA BAR === */
    .top-dashboard-section {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        margin-bottom: 2rem;
        width: 100%;
        transform-style: preserve-3d;
    }

    /* Market Panel */
    .market-data-panel {
        display: flex;
        justify-content: flex-start;
        gap: 2rem;
        padding: 0 0.5rem;
        transform: translateZ(10px);
    }

    .market-item {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .m-label {
        font-size: 0.65rem;
        color: var(--text-muted);
        letter-spacing: 1.5px;
    }

    .m-value {
        font-size: 1.1rem;
        font-weight: 600;
        font-family: monospace;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .m-change.positive { color: var(--accent-cyan); font-size: 0.8rem; background: rgba(0, 255, 204, 0.1); padding: 2px 6px; border-radius: 4px; }
    .sync-active { color: #f5a623; animation: blink 1.5s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* Omni Search Bar */
    .search-container {
        width: 100%;
        transform: translateZ(20px);
    }

    .search-wrapper {
        position: relative;
        width: 100%;
        height: 60px;
        background: rgba(10, 10, 15, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        backdrop-filter: blur(10px);
        overflow: hidden;
        transition: all 0.3s ease;
    }

    /* Efek menyala saat form pencarian diklik */
    .search-wrapper:focus-within {
        border-color: var(--accent-cyan);
        box-shadow: 0 0 20px rgba(0, 255, 204, 0.2), inset 0 0 10px rgba(0, 255, 204, 0.1);
    }

    .search-icon {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        width: 20px;
        height: 20px;
        color: var(--text-muted);
        transition: color 0.3s;
    }

    .search-wrapper:focus-within .search-icon { color: var(--accent-cyan); }

    .omni-search {
        width: 100%;
        height: 100%;
        background: transparent;
        border: none;
        padding: 0 20px 0 55px;
        color: #fff;
        font-size: 1rem;
        font-family: monospace;
        outline: none;
    }

    .omni-search::placeholder {
        color: rgba(255, 255, 255, 0.3);
        font-family: 'Inter', sans-serif;
    }

    /* Efek Scanner Laser saat mencari data */
    .scan-line {
        position: absolute;
        left: -100%;
        top: 0;
        width: 50%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(0, 255, 204, 0.4), transparent);
        pointer-events: none;
        opacity: 0;
    }

    .search-wrapper.scanning .scan-line {
        opacity: 1;
        animation: sciFiScan 1.2s cubic-bezier(0.86, 0, 0.07, 1) infinite;
    }

    @keyframes sciFiScan {
        0% { left: -50%; }
        100% { left: 100%; }
    }

    /* Responsivitas Mobile untuk Top Bar */
    @media (max-width: 600px) {
        .market-data-panel {
            flex-wrap: wrap; /* Agar data turun ke bawah jika layar sempit */
            gap: 1rem;
        }
        .search-wrapper { height: 50px; }
        .omni-search { font-size: 0.85rem; padding-left: 45px; }
        .search-icon { left: 15px; width: 18px; }
    }

    .m-change.positive { color: var(--accent-cyan); font-size: 0.8rem; background: rgba(0, 255, 204, 0.1); padding: 2px 6px; border-radius: 4px; transition: all 0.3s; }
    
    /* Tambahkan baris ini untuk animasi harga turun */
    .m-change.negative { color: #ff4444; font-size: 0.8rem; background: rgba(255, 68, 68, 0.1); padding: 2px 6px; border-radius: 4px; transition: all 0.3s; }

    /* === DETAIL TRANSAKSI & BADGES === */
.tx-hash-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

/* KELOMPOK BADGE BARU: Menjaga badge tetap sejajar dan berjarak */
.badge-group {
    display: flex;
    align-items: center;
    gap: 6px; /* Jarak agar tidak nempel */
}

.tx-block {
    font-size: 0.65rem;
    color: var(--text-muted);
    background: rgba(255, 255, 255, 0.05);
    padding: 3px 6px;
    border-radius: 4px;
    letter-spacing: 0.5px;
    white-space: nowrap; /* Mencegah teks hancur ke bawah di HP */
    border: 1px solid transparent; /* Samakan tinggi kotak */
}

.tx-details {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
}

/* Badge (Pill) untuk Jenis Transaksi */
.tx-badge {
    font-size: 0.65rem;
    font-weight: 600;
    padding: 3px 6px;
    border-radius: 4px; /* Disamakan dengan tx-block (4px) */
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border: 1px solid transparent;
    white-space: nowrap; /* Mencegah teks hancur ke bawah di HP */
}

/* Warna Spesifik Berdasarkan Jenis Transaksi */
.type-send { background: rgba(0, 255, 136, 0.1); color: #00ff88; border-color: rgba(0, 255, 136, 0.2); }
.type-deploy { background: rgba(187, 102, 255, 0.1); color: #bb66ff; border-color: rgba(187, 102, 255, 0.2); }
.type-claim { background: rgba(255, 170, 0, 0.1); color: #ffaa00; border-color: rgba(255, 170, 0, 0.2); }
.type-approve { background: rgba(0, 204, 255, 0.1); color: #00ccff; border-color: rgba(0, 204, 255, 0.2); }
.type-call { background: rgba(139, 148, 158, 0.1); color: var(--text-muted); border-color: rgba(139, 148, 158, 0.2); }
</style>
</head>
<body>

    <div class="explorer-dashboard">
        <header class="dashboard-header">
            <h1>L2 Explorer <span class="pulse-dot"></span></h1>
        </header>

        <!-- === TOP DATA BAR & SEARCH === -->
        <div class="top-dashboard-section tilt-effect">
            
            <!-- Market Data LED Panel -->
            <div class="market-data-panel">
                <div class="market-item">
                    <span class="m-label">NATIVE TOKEN (ETH)</span>
                    <span class="m-value">
                        <span id="market-price-val">$0.00</span> 
                        <span class="m-change positive" id="market-change">0.0%</span>
                    </span>
                </div>
                <div class="market-item">
                    <span class="m-label">MARKET CAP</span>
                    <span class="m-value" id="market-cap-val">$0</span>
                </div>
                <div class="market-item">
                    <span class="m-label">L1 SYNC STATUS</span>
                    <span class="m-value sync-active" id="sync-status">Batching...</span>
                </div>
            </div>

            <!-- Omni-Search Bar -->
            <div class="search-container">
                <div class="search-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" class="omni-search" placeholder="Search by Txn Hash / Block / Address / ENS..." id="searchInput">
                    <div class="scan-line"></div> <!-- Efek Scanner Sci-Fi -->
                </div>
            </div>
            
        </div>

        <main class="bento-grid">
            <!-- Card 1: Canvas Visualizer (Full Width) -->
            <div class="bento-card card-visualizer tilt-effect">
                <div class="card-header">
                    <span class="label">Live Network Nodes</span>
                </div>
                <div class="canvas-container">
                    <canvas id="nodeCanvas"></canvas>
                    <div id="nodeTooltip" class="glass-tooltip">
                        <div class="tt-head"><span id="tt-block">#0</span> <span class="badge">Finalized</span></div>
                        <div class="tt-body">
                            <div>Tx: <span id="tt-tx">0</span></div>
                            <div class="tt-hash" id="tt-hash">0x...</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Card 2: Live TPS (Half Width) -->
            <div class="bento-card card-tps tilt-effect">
                <span class="label">Live TPS</span>
                <h2 class="value gradient-text" id="tps-value">0</h2>
            </div>

            <!-- Card 3: Gas Fee (Half Width) -->
            <div class="bento-card card-gas tilt-effect">
                <span class="label">Avg Gas Fee</span>
                <h2 class="value" id="gas-value">0.00 <span class="unit">Gwei</span></h2>
            </div>

            <!-- Card 4: Live Transaction Feed (Full Width, Very Tall) -->
            <div class="bento-card card-feed tilt-effect">
                <div class="card-header-feed">
                    <span class="label">Live Transactions</span>
                    <div class="live-indicator"></div>
                </div>
                
                <div class="tx-feed-container" id="tx-feed">
                    <!-- 10 Baris transaksi akan bergulir di sini -->
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
    // =====================================================================
    // 1. INISIALISASI WEB3 & PROVIDER (ETHERS.JS V6)
    // =====================================================================
    // Menggunakan Base Mainnet WSS publik sebagai contoh jaringan L2.
    // Untuk production, ganti dengan WSS dari Alchemy, Infura, atau QuickNode Anda sendiri.
    const RPC_URL = "wss://base-rpc.publicnode.com"; 
    const provider = new ethers.WebSocketProvider(RPC_URL);

    // =====================================================================
    // 2. ELEMEN DOM GLOBAL
    // =====================================================================
    const tpsEl = document.getElementById("tps-value");
    const gasEl = document.getElementById("gas-value");
    const txFeed = document.getElementById("tx-feed");
    const blockLabel = document.getElementById("tt-block");
    const txLabel = document.getElementById("tt-tx");
    const hashLabel = document.getElementById("tt-hash");
    
    // Status Sinkronisasi
    const syncStatusEl = document.querySelector(".sync-active");

    // =====================================================================
    // 3. ANIMASI LERP UNTUK DATA ANGKA (SMOOTH NUMBER TRANSITION)
    // =====================================================================
    const lerp = (start, end, factor) => start + (end - start) * factor;
    
    let currentTps = 0, targetTps = 0;
    let currentGas = 0, targetGas = 0;

    function animateNumbers() {
        // Interpolasi pergerakan angka agar tidak melompat kasar
        currentTps = lerp(currentTps, targetTps, 0.05);
        currentGas = lerp(currentGas, targetGas, 0.05);
        
        // Render ke UI
        tpsEl.innerText = Math.floor(currentTps).toLocaleString();
        gasEl.innerHTML = `${currentGas.toFixed(4)} <span class="unit">Gwei</span>`;
        
        requestAnimationFrame(animateNumbers);
    }
    animateNumbers();

    // =====================================================================
    // 4. CANVAS NODE VISUALIZER ENGINE
    // =====================================================================
    const canvas = document.getElementById("nodeCanvas");
    const ctx = canvas.getContext("2d");
    const tooltip = document.getElementById("nodeTooltip");
    
    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    let nodes = [];
    const nodeSpacing = 120; // Jarak antar blok/node

    class NodeBlock {
        constructor(index, blockData) {
            this.targetX = canvas.width - 60 - (index * nodeSpacing);
            this.x = this.targetX + 150; // Posisi awal dari luar layar (kanan) untuk efek slide-in
            this.y = canvas.height / 2 + 10;
            this.radius = 0; // Mulai dari 0 untuk efek pop-up
            this.targetRadius = 6;
            this.data = blockData; // Menyimpan data Ethers.js asli
        }

        update() {
            // Pergerakan Node yang sangat smooth
            this.x = lerp(this.x, this.targetX, 0.06);
            this.radius = lerp(this.radius, this.targetRadius, 0.1);
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.shadowBlur = 12; 
            ctx.shadowColor = "#00ffcc";
            ctx.fillStyle = "#00ffcc"; 
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    function renderCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 1. Gambar Garis Koneksi antar Node
        ctx.beginPath();
        ctx.strokeStyle = "rgba(0, 255, 204, 0.25)";
        ctx.lineWidth = 2;
        nodes.forEach((n, i) => {
            n.update();
            if (i === 0) ctx.moveTo(n.x, n.y);
            else ctx.lineTo(n.x, n.y);
        });
        ctx.stroke();
        
        // 2. Gambar Bulatan Node di atas garis
        nodes.forEach(n => n.draw());
        requestAnimationFrame(renderCanvas);
    }
    renderCanvas(); // Mulai loop render kanvas

    // Logika Hover/Tooltip pada Canvas
    canvas.addEventListener("mousemove", (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        let found = false;

        nodes.forEach(n => {
            // Hitbox deteksi hover (radius 25px)
            if (Math.hypot(n.x - mx, n.y - my) < 25) {
                found = true;
                n.targetRadius = 10; // Perbesar node yang di-hover
                
                // Update isi tooltip dengan data blok asli
                blockLabel.innerText = `#${n.data.number}`;
                txLabel.innerText = n.data.txCount;
                hashLabel.innerText = `${n.data.hash.substring(0, 10)}...`;
                
                // Posisikan tooltip
                tooltip.style.left = `${n.x}px`; 
                tooltip.style.top = `${n.y}px`;
                tooltip.classList.add("show");
            } else {
                n.targetRadius = 6; // Kembalikan ke ukuran normal
            }
        });
        if (!found) tooltip.classList.remove("show");
    });

    // =====================================================================
    // 5. PENARIKAN DATA BLOCKCHAIN (REAL-TIME LOGIC)
    // =====================================================================

    // Fungsi memperbarui Gas Fee
    async function fetchNetworkMacroData() {
        try {
            const feeData = await provider.getFeeData();
            const gasPriceGwei = ethers.formatUnits(feeData.gasPrice, "gwei");
            targetGas = parseFloat(gasPriceGwei); // Update target LERP
            
            if(syncStatusEl) {
                syncStatusEl.innerText = "Synced";
                syncStatusEl.style.color = "#00ffcc";
            }
        } catch (error) {
            console.error("Gagal mengambil Gas:", error);
            if(syncStatusEl) {
                syncStatusEl.innerText = "Reconnecting...";
                syncStatusEl.style.color = "#ff4444";
            }
        }
    }

    // Fungsi memunculkan transaksi di Live Feed dengan Deteksi Tipe (EVM Asli)
    // Sekarang menerima objek 'tx' secara utuh dan 'blockNumber'
    function spawnLiveTransactionUI(tx, blockNumber) {
        // 1. Format Hash Transaksi
        const shortHash = `${tx.hash.substring(0, 8)}...${tx.hash.substring(tx.hash.length - 6)}`;
        
        // 2. Konversi Value (Nominal ETH/L2 Token)
        const amountEth = ethers.formatEther(tx.value);
        const displayAmount = parseFloat(amountEth) > 0 
            ? `<span style="color:#fff;">${parseFloat(amountEth).toFixed(4)} ETH</span>` 
            : ``; // Kosongkan nominal jika 0, fokus ke Badge

        // 3. LOGIKA DETEKSI JENIS TRANSAKSI (EVM)
        let txType = "Contract Call";
        let badgeClass = "type-call";

        if (tx.to === null) {
            // Jika tujuan (to) adalah null, ini pasti pembuatan smart contract baru
            txType = "Deploy Contract";
            badgeClass = "type-deploy";
        } else if (tx.data === "0x") {
            // Jika data payload kosong ("0x") dan value > 0, ini murni kirim ETH antar wallet
            txType = "Send ETH";
            badgeClass = "type-send";
        } else {
            // Jika ada payload data, kita baca 4-byte pertama (Function Selector)
            const selector = tx.data.substring(0, 10);
            
            // Mencocokkan dengan Function Selector standar industri (ERC20/DeFi)
            switch (selector) {
                case "0xa9059cbb": // transfer(address,uint256)
                    txType = "Transfer";
                    badgeClass = "type-send";
                    break;
                case "0x095ea7b3": // approve(address,uint256)
                    txType = "Approve";
                    badgeClass = "type-approve";
                    break;
                case "0x4e71d92d": // claim() - Umum di banyak protokol
                case "0x34e19907": // claimTokens()
                case "0xb460af94": // claimRewards()
                    txType = "Claim";
                    badgeClass = "type-claim";
                    break;
                case "0x38ed1739": // swapExactTokensForTokens (DEX)
                case "0x7ff36ab5": // swapExactETHForTokens
                    txType = "Swap";
                    badgeClass = "type-claim";
                    break;
                default:
                    txType = "Contract Call";
                    badgeClass = "type-call";
            }
        }

        // 4. Bangun Elemen Baris UI
        const row = document.createElement("div");
        row.className = "tx-row";
        row.innerHTML = `
            <div class="tx-info">
                <a href="#" class="tx-hash-link">${shortHash}</a>
                <span class="tx-time">Just now</span>
            </div>
            <div class="tx-details">
                <!-- Bungkus kedua badge di sini agar sejajar dan berjarak -->
                <div class="badge-group">
                    <span class="tx-block">Block #${blockNumber}</span>
                    <span class="tx-badge ${badgeClass}">${txType}</span>
                </div>
                <div class="tx-amount">${displayAmount}</div>
            </div>
        `;

        txFeed.prepend(row);

        // Batasi maksimal 10 transaksi di layar agar DOM tidak lambat
        if (txFeed.children.length > 10) {
            const lastTx = txFeed.lastElementChild;
            lastTx.classList.add("fade-out");
            setTimeout(() => { if (lastTx.parentNode) lastTx.remove(); }, 400);
        }
    }

    // Fungsi memproses Blok Baru
    async function processNewBlock(blockNumber) {
        try {
            // Ambil data blok beserta detail transaksinya (true)
            const block = await provider.getBlock(blockNumber, true);
            
            if (block && block.prefetchedTransactions) {
                const txCount = block.prefetchedTransactions.length;
                
                // Estimasi kasar TPS (Tx Count dibagi estimasi block time L2 ~2 detik)
                targetTps = Math.floor(txCount / 2); 

                // 1. Dorong node lama ke kiri, masukkan node baru ke array Canvas
                nodes.forEach(n => n.targetX -= nodeSpacing);
                nodes.unshift(new NodeBlock(0, {
                    number: block.number,
                    hash: block.hash,
                    txCount: txCount
                }));
                // Batasi memori canvas maksimal 8 node
                if (nodes.length > 8) nodes.pop();

                // 2. Ambil 3-5 transaksi teratas dari blok ini untuk di-render ke Live Feed
                const displayTxs = block.prefetchedTransactions.slice(0, 4);
                displayTxs.forEach((tx, index) => {
                    setTimeout(() => {
                        // Pass objek 'tx' secara utuh dan 'block.number'
                        spawnLiveTransactionUI(tx, block.number); 
                    }, index * 400);
                });
            }
        } catch (error) {
            console.error(`Gagal memproses blok #${blockNumber}`, error);
        }
    }

    // Inisialisasi awal saat halaman dimuat
    fetchNetworkMacroData();
    provider.getBlockNumber().then(latestBlock => {
        // Render blok terakhir secara instan agar canvas tidak kosong saat pertama dibuka
        processNewBlock(latestBlock); 
    });

    // EVENT LISTENER: Berjalan otomatis setiap kali Node L2 mencetak blok baru
    provider.on("block", (blockNumber) => {
        console.log("Block Mined:", blockNumber);
        fetchNetworkMacroData(); // Perbarui gas fee
        processNewBlock(blockNumber); // Perbarui canvas dan tx feed
    });


    // =====================================================================
    // 6. EFEK KEDALAMAN (TILT 3D) & GIROSKOP MOBILE
    // =====================================================================
    const cards = document.querySelectorAll('.tilt-effect');
    
    // PC: Mouse Tilt
    document.addEventListener("mousemove", (e) => {
        if(window.innerWidth < 900) return; 
        const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
        const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
        cards.forEach(card => card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`);
    });

    // Mobile: Giroskop
    if (window.DeviceOrientationEvent) {
        window.addEventListener('deviceorientation', (e) => {
            if(window.innerWidth >= 900) return;
            const tiltX = Math.max(-10, Math.min(10, e.beta - 45)) / 2;
            const tiltY = Math.max(-10, Math.min(10, e.gamma)) / 2;
            cards.forEach(card => card.style.transform = `rotateY(${tiltY}deg) rotateX(${-tiltX}deg)`);
        });
    }

    // =====================================================================
    // 7. INTERAKSI OMNI-SEARCH BAR
    // =====================================================================
    const searchInput = document.getElementById('searchInput');
    const searchWrapper = document.querySelector('.search-wrapper');

    if(searchInput) {
        searchInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const query = this.value.trim();
                if (query) {
                    searchWrapper.classList.add('scanning');
                    searchInput.blur(); 
                    
                    setTimeout(() => {
                        searchWrapper.classList.remove('scanning');
                        // Logika pencarian asli bisa ditambahkan di sini, contoh:
                        // window.open(`https://basescan.org/search?q=${query}`, '_blank');
                    }, 1200);
                }
            }
        });
    }

});

// 8. FUNGSI COPY HASH (BERADA DI LUAR DOMContentLoaded AGAR BISA DIPANGGIL ONCLICK)
// =====================================================================
window.copyHash = function(btn) {
    const pill = btn.closest('.hash-pill');
    const text = pill.querySelector('.hash-text').innerText;
    
    navigator.clipboard.writeText(text);

    // Animasi Ripple
    const ripple = document.createElement("span");
    ripple.classList.add("ripple");
    
    const rect = btn.getBoundingClientRect();
    const size = Math.max(pill.clientWidth, pill.clientHeight);
    ripple.style.width = ripple.style.height = `${size}px`;
    ripple.style.left = `${rect.left - pill.getBoundingClientRect().left - size/2 + rect.width/2}px`;
    ripple.style.top = `${rect.top - pill.getBoundingClientRect().top - size/2 + rect.height/2}px`;
    
    pill.appendChild(ripple);
    
    const oldIcon = btn.innerHTML;
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00ffcc" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
    
    setTimeout(() => {
        ripple.remove();
        btn.innerHTML = oldIcon;
    }, 600);
};

        // =====================================================================
    // 9. DYNAMIC MARKET DATA (COINGECKO API)
    // =====================================================================
    const priceEl = document.getElementById('market-price-val');
    const changeEl = document.getElementById('market-change');
    const marketCapEl = document.getElementById('market-cap-val');

    // Fungsi untuk menyingkat angka besar (contoh: 400.000.000.000 menjadi $400B)
    function formatMarketCap(num) {
        if (num >= 1e12) return '$' + (num / 1e12).toFixed(2) + 'T'; // Trillion
        if (num >= 1e9) return '$' + (num / 1e9).toFixed(2) + 'B';  // Billion
        if (num >= 1e6) return '$' + (num / 1e6).toFixed(2) + 'M';  // Million
        return '$' + num.toLocaleString();
    }

    async function fetchLiveMarketData() {
        try {
            // Kita gunakan ID 'ethereum' untuk contoh native L2 gas token. 
            // Jika token Anda Solana, ganti 'ethereum' menjadi 'solana'.
            const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd&include_market_cap=true&include_24hr_change=true');
            const data = await response.json();
            
            const coinData = data.ethereum; // Pastikan ini sesuai dengan ID di URL
            const currentPrice = coinData.usd;
            const priceChange24h = coinData.usd_24h_change;
            const marketCap = coinData.usd_market_cap;

            // 1. Update Harga Token
            priceEl.innerText = `$${currentPrice.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            
            // 2. Update Market Cap
            marketCapEl.innerText = formatMarketCap(marketCap);

            // 3. Update Persentase & Warna (Naik/Turun)
            changeEl.innerText = `${priceChange24h > 0 ? '+' : ''}${priceChange24h.toFixed(2)}%`;
            
            if (priceChange24h < 0) {
                changeEl.classList.remove('positive');
                changeEl.classList.add('negative');
            } else {
                changeEl.classList.remove('negative');
                changeEl.classList.add('positive');
            }

        } catch (error) {
            console.error("Gagal mengambil data market CoinGecko:", error);
            // Opsional: Jika API gagal/terkena rate limit, biarkan nilai terakhir yang tampil
        }
    }

    // Tarik data saat web pertama kali dibuka
    fetchLiveMarketData();
    
    // Perbarui data harga setiap 60 detik (1 menit)
    // Jangan dibuat terlalu cepat (misal 1 detik) karena API publik akan langsung memblokir IP Anda (Rate Limit).
    setInterval(fetchLiveMarketData, 60000);

// 7. OMNI-SEARCH ENGINE (SMART ROUTING)
// =====================================================================
document.addEventListener("DOMContentLoaded", () => {
    const searchInput = document.getElementById('searchInput');
    const searchWrapper = document.querySelector('.search-wrapper');

    // Fungsi deteksi jenis input menggunakan RegEx
    function getSearchType(query) {
        // Deteksi Transaction Hash: Dimulai dengan 0x, diikuti 64 karakter hex
        if (/^0x([A-Fa-f0-9]{64})$/.test(query)) {
            return 'tx';
        }
        // Deteksi Wallet / Contract Address: Dimulai dengan 0x, diikuti 40 karakter hex
        else if (/^0x([A-Fa-f0-9]{40})$/.test(query)) {
            return 'address';
        }
        // Deteksi Block Number: Hanya berisi angka
        else if (/^\d+$/.test(query)) {
            return 'block';
        }
        // Deteksi ENS Domain: Diakhiri dengan .eth
        else if (/.*\.eth$/.test(query)) {
            return 'ens';
        }
        // Jika tidak dikenali
        return 'unknown';
    }

    if (searchInput && searchWrapper) {
        searchInput.addEventListener('keypress', function (e) {
            // Eksekusi saat user menekan tombol Enter
            if (e.key === 'Enter') {
                const query = this.value.trim();
                
                if (query) {
                    // 1. Nyalakan Animasi Scanner Sci-Fi
                    searchWrapper.classList.add('scanning');
                    searchInput.blur(); // Hilangkan fokus keyboard agar UI rapi
                    
                    // 2. Analisis Input
                    const searchType = getSearchType(query);
                    
                    // 3. Jeda 1 detik untuk memutar animasi UI yang "mahal"
                    setTimeout(() => {
                        searchWrapper.classList.remove('scanning');
                        
                        // 4. Routing URL (Contoh mengarahkan ke BaseScan, sesuaikan dengan chain Anda)
                        let targetUrl = '';
                        const baseUrl = 'https://basescan.org';

                        switch (searchType) {
                            case 'tx':
                                targetUrl = `${baseUrl}/tx/${query}`;
                                break;
                            case 'address':
                                targetUrl = `${baseUrl}/address/${query}`;
                                break;
                            case 'block':
                                targetUrl = `${baseUrl}/block/${query}`;
                                break;
                            case 'ens':
                                targetUrl = `${baseUrl}/enslookup-search?search=${query}`;
                                break;
                            default:
                                alert('Format tidak dikenali! Harap masukkan Tx Hash, Address, atau Block Number yang valid.');
                                searchInput.focus();
                                return;
                        }

                        // Buka hasil pencarian di tab baru
                        window.open(targetUrl, '_blank');
                        
                        // Bersihkan kolom pencarian setelah sukses
                        searchInput.value = '';

                    }, 1000); // Durasi animasi scanner 1 detik
                }
            }
        });
    }
});
