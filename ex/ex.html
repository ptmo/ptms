<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Search SPA Component</title>
    <!-- WAJIB: Ethers.js agar provider.getTransaction dll bisa berjalan -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.11.1/ethers.umd.min.js"></script>
    <style>
        :root {
            --bg-abyss: #070709;
            --glass-bg: rgba(20, 20, 25, 0.4);
            --glass-border: rgba(255, 255, 255, 0.05);
            --accent-cyan: #00ffcc;
            --text-main: #f8f9fa;
            --text-muted: #8b949e;
        }

        body {
            background-color: var(--bg-abyss);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 800px; }

        /* === 1. CSS SEARCH BAR & SCANNER === */
        .search-wrapper {
            position: relative;
            width: 100%;
            height: 60px;
            background: rgba(10, 10, 15, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 2rem;
        }
        
        .omni-search {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            padding: 0 20px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        /* Animasi Garis Scanner */
        .scan-line {
            position: absolute;
            left: -100%; top: 0;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 204, 0.4), transparent);
            pointer-events: none; opacity: 0;
        }
        .search-wrapper.scanning .scan-line {
            opacity: 1;
            animation: sciFiScan 1s cubic-bezier(0.86, 0, 0.07, 1) infinite;
        }
        @keyframes sciFiScan { 0% { left: -50%; } 100% { left: 100%; } }

        /* === 2. CSS BENTO PANEL SPA === */
        .bento-grid {
            display: grid; /* Default-nya grid, JS akan merubahnya ke 'none' saat disembunyikan */
            gap: 1rem;
        }

        .bento-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(10px);
        }

        .label { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; }
        .value { font-size: 1.5rem; word-break: break-all; margin: 10px 0; }
        
        /* Badge & Tombol */
        .tx-badge { font-size: 0.7rem; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; border: 1px solid transparent; }
        .type-call { background: rgba(139, 148, 158, 0.1); color: var(--text-muted); }
        .type-deploy { background: rgba(187, 102, 255, 0.1); color: #bb66ff; }
        
        .back-btn {
            margin-top: 1.5rem; padding: 10px 20px;
            background: rgba(0,255,204,0.1); border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan); border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- === SEARCH BAR KOMPONEN === -->
    <div class="search-wrapper">
        <input type="text" class="omni-search" placeholder="Cari Tx Hash / Address / Block / ENS..." id="searchInput">
        <div class="scan-line"></div>
    </div>

    <!-- === PANEL 1: DASHBOARD (Tampil Awal) === -->
    <main class="bento-grid" id="panel-dashboard">
        <div class="bento-card">
            <span class="label">Home Dashboard</span>
            <p style="margin-top: 10px; color: var(--text-muted);">Coba masukkan Hash Transaksi, Alamat Dompet, atau Nomor Blok di atas lalu tekan Enter.</p>
        </div>
    </main>

    <!-- === PANEL 2: TX DETAIL === -->
    <main class="bento-grid" id="panel-tx-detail" style="display: none;">
        <div class="bento-card">
            <span class="label">Transaction Found</span>
            <h2 class="value" id="detail-tx-hash">0x...</h2>
            <div style="margin-top: 1rem; display: flex; flex-direction: column; gap: 10px;">
                <div><span class="label">Status:</span> <span id="detail-tx-status">...</span></div>
                <div><span class="label">Block:</span> <span id="detail-tx-block">...</span></div>
                <div><span class="label">Value:</span> <span id="detail-tx-value">...</span></div>
            </div>
            <button class="back-btn" onclick="goHome()">Kembali ke Dashboard</button>
        </div>
    </main>

    <!-- === PANEL 3: ADDRESS DETAIL === -->
    <main class="bento-grid" id="panel-address-detail" style="display: none;">
        <div class="bento-card">
            <div style="display: flex; gap: 10px; align-items: center;">
                <span class="tx-badge" id="detail-address-type">Wallet</span>
                <span class="label">Address Found</span>
            </div>
            <h2 class="value" id="detail-address-hash">0x...</h2>
            <div>
                <span class="label">Balance:</span>
                <span id="detail-address-balance" style="font-size: 1.2rem; color: var(--accent-cyan);">0.00 ETH</span>
            </div>
            <button class="back-btn" onclick="goHome()">Kembali ke Dashboard</button>
        </div>
    </main>

    <!-- === PANEL 4: BLOCK DETAIL === -->
    <main class="bento-grid" id="panel-block-detail" style="display: none;">
        <div class="bento-card">
            <span class="label">Block Data</span>
            <h2 class="value" id="detail-block-number">#0</h2>
            <div style="margin-top: 1rem; display: flex; flex-direction: column; gap: 10px;">
                <div><span class="label">Hash:</span> <span id="detail-block-hash">...</span></div>
                <div><span class="label">Tx Count:</span> <span id="detail-block-txcount">0</span></div>
                <div><span class="label">Time:</span> <span id="detail-block-time">...</span></div>
            </div>
            <button class="back-btn" onclick="goHome()">Kembali ke Dashboard</button>
        </div>
    </main>

</div>

<script>
    // 1. Fungsi kembali ke Dashboard (Terkait atribut onclick pada tombol)
    window.goHome = function() {
        document.getElementById('panel-tx-detail').style.display = 'none';
        document.getElementById('panel-address-detail').style.display = 'none';
        document.getElementById('panel-block-detail').style.display = 'none';
        document.getElementById('panel-dashboard').style.display = 'grid'; // Kembalikan ke format grid
    }

    document.addEventListener("DOMContentLoaded", () => {
        // 2. Deklarasi Provider Wajib (Agar provider.getTransaction dkk tidak error)
        const RPC_URL = "wss://base-rpc.publicnode.com"; 
        const provider = new ethers.WebSocketProvider(RPC_URL);

        // ==========================================
        // SCRIPT OMNI-SEARCH ENGINE (PASANGAN JS ANDA)
        // ==========================================
        const searchInput = document.getElementById('searchInput');
        const searchWrapper = document.querySelector('.search-wrapper');

        function getSearchType(query) {
            if (/^0x([A-Fa-f0-9]{64})$/.test(query)) return 'tx';
            if (/^0x([A-Fa-f0-9]{40})$/.test(query)) return 'address';
            if (/^\d+$/.test(query)) return 'block';
            if (/.*\.eth$/.test(query)) return 'ens';
            return 'unknown';
        }

        searchInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const query = this.value.trim();
                if (query) {
                    searchWrapper.classList.add('scanning');
                    searchInput.blur();
                    
                    const searchType = getSearchType(query);

                    setTimeout(async () => {
                        searchWrapper.classList.remove('scanning');
                        
                        const pDash = document.getElementById('panel-dashboard');
                        const pTx = document.getElementById('panel-tx-detail');
                        const pAddr = document.getElementById('panel-address-detail');
                        const pBlock = document.getElementById('panel-block-detail');

                        pDash.style.display = 'none'; pTx.style.display = 'none'; pAddr.style.display = 'none'; pBlock.style.display = 'none';

                        switch (searchType) {
                            case 'tx':
                                pTx.style.display = 'grid';
                                document.getElementById('detail-tx-hash').innerText = "Loading...";
                                try {
                                    const txData = await provider.getTransaction(query);
                                    const txReceipt = await provider.getTransactionReceipt(query);
                                    if(!txData) throw new Error("Not Found");
                                    document.getElementById('detail-tx-hash').innerText = query;
                                    document.getElementById('detail-tx-status').innerText = txReceipt && txReceipt.status === 1 ? "Success" : "Failed / Pending";
                                    document.getElementById('detail-tx-status').style.color = txReceipt && txReceipt.status === 1 ? "#00ffcc" : "#ff4444";
                                    document.getElementById('detail-tx-block').innerText = txData.blockNumber;
                                    document.getElementById('detail-tx-value').innerText = `${ethers.formatEther(txData.value)} ETH`;
                                } catch (e) { document.getElementById('detail-tx-hash').innerText = "Transaction Not Found."; }
                                break;

                            case 'ens':
                            case 'address':
                                pAddr.style.display = 'grid';
                                document.getElementById('detail-address-hash').innerText = "Resolving...";
                                try {
                                    let targetAddr = query;
                                    if(searchType === 'ens') {
                                        targetAddr = await provider.resolveName(query);
                                        if(!targetAddr) throw new Error("ENS Not Found");
                                    }
                                    document.getElementById('detail-address-hash').innerText = targetAddr;
                                    const isContract = (await provider.getCode(targetAddr)) !== "0x";
                                    const badge = document.getElementById('detail-address-type');
                                    badge.innerText = isContract ? "Contract" : "Wallet";
                                    badge.className = isContract ? "tx-badge type-deploy" : "tx-badge type-call";
                                    const bal = await provider.getBalance(targetAddr);
                                    document.getElementById('detail-address-balance').innerText = `${parseFloat(ethers.formatEther(bal)).toFixed(4)} ETH`;
                                } catch (e) { document.getElementById('detail-address-hash').innerText = "Address Not Found"; }
                                break;

                            case 'block':
                                pBlock.style.display = 'grid';
                                document.getElementById('detail-block-number').innerText = "Loading...";
                                try {
                                    const bData = await provider.getBlock(parseInt(query), false);
                                    if(!bData) throw new Error("Block Not Found");
                                    document.getElementById('detail-block-number').innerText = `#${bData.number}`;
                                    document.getElementById('detail-block-hash').innerText = bData.hash;
                                    document.getElementById('detail-block-txcount').innerText = bData.transactions.length;
                                    document.getElementById('detail-block-time').innerText = new Date(bData.timestamp * 1000).toLocaleString();
                                } catch (e) { document.getElementById('detail-block-number').innerText = "Block Not Found"; }
                                break;
                                
                            default:
                                alert('Format tidak valid. Harap masukkan Hash, Address, atau Block.');
                                pDash.style.display = 'grid';
                        }
                        searchInput.value = '';
                    }, 1000); 
                }
            }
        });
    });
</script>
</body>
</html>
