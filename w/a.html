<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Apple Vs Android</title>
  <style>
    :root {
      --bg-dark: #0f0f13;
      --apple-glow: #1c1c22;
      --android-glow: #15261b;
      --glass-bg: rgba(0, 0, 0, 0.65);
      --glass-border: rgba(255, 255, 255, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg-dark);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      /* KUNCI SCROLL: Hapus overflow hidden dan ubah height menjadi min-height */
      overflow-x: hidden; 
      display: flex;
      flex-direction: column;
      min-height: 100vh; 
    }

    /* --- CLASS BANTUAN UNTUK GAMBAR/IKON --- */
    .icon-sm { width: 1.2em; height: 1.2em; vertical-align: middle; margin: 0 2px; }
    .icon-md { width: 1.5em; height: 1.5em; vertical-align: middle; margin: 0 4px; }
    
    .device-img {
      display: block;
      margin: 0 auto 15px auto;
      width: clamp(80px, 12vw, 120px); 
      height: auto;
      filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.25));
    }

    /* --- DASHBOARD HEADER --- */
    header {
      width: 100%; 
      padding: 20px 15px; 
      z-index: 100; 
      display: flex; 
      flex-direction: column;
      align-items: center; 
      gap: 15px; 
      /* KUNCI TATA LETAK: Relative membuat header mendorong konten di bawahnya */
      position: relative; 
    }

    .connection-badge {
      background: rgba(255, 193, 7, 0.2); border: 1px solid rgba(255, 193, 7, 0.5);
      color: #ffc107; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem;
      font-weight: bold; letter-spacing: 1px; display: flex; align-items: center; gap: 8px;
      transition: all 0.3s ease;
    }
    .connection-badge.connected {
      background: rgba(46, 204, 113, 0.2); border: 1px solid rgba(46, 204, 113, 0.5); color: #2ecc71;
    }
    .connection-badge .dot {
      width: 8px; height: 8px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor;
    }

    .dashboard-header {
      text-align: center; background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      padding: clamp(15px, 3vw, 25px); border-radius: 20px;
      border: 1px solid var(--glass-border); width: 100%; max-width: 900px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .dashboard-header h1 {
      font-size: clamp(1.2rem, 4vw, 2.2rem); color: #ffffff;
      text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
      display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.3;
    }
    .dashboard-header .status { font-size: clamp(0.9rem, 2.5vw, 1.4rem); font-weight: 800; transition: color 0.4s ease; }
    
    .rules {
      font-size: clamp(0.7rem, 2vw, 1rem); font-weight: bold; color: #bbbbbb; 
      background: rgba(255, 255, 255, 0.05); padding: 10px 15px; border-radius: 12px;
      display: flex; flex-direction: column; gap: 10px; align-items: center;
    }
    .rule-item { display: flex; align-items: center; text-align: center; }

    /* --- LAYOUT UTAMA --- */
    main.war-container { 
      flex: 1; /* Akan mengisi sisa layar ke bawah */
      display: flex; 
      width: 100%; 
      /* Memberikan batas minimal tinggi agar jika di-scroll, form tidak gepeng */
      min-height: 600px; 
      position: relative; 
    }

    .faction {
      transition: flex-basis 1s cubic-bezier(0.25, 1, 0.5, 1); 
      display: flex; 
      flex-direction: column;
      justify-content: center; 
      align-items: center; 
      position: relative; 
      overflow: hidden;
      padding-top: 20px;
      padding-bottom: 120px; /* Sisakan ruang di bawah untuk daftar History */
    }
    
    .apple { flex-basis: 50%; background: radial-gradient(circle at center, var(--apple-glow) 0%, #000000 100%); border-right: 1px solid rgba(255,255,255,0.1); }
    .android { flex-basis: 50%; background: radial-gradient(circle at center, var(--android-glow) 0%, #000000 100%); }

    .score-group { text-align: center; z-index: 10; padding: 0 10px; }
    .faction h2 { font-size: clamp(1.2rem, 3.5vw, 2.5rem); letter-spacing: 1px; opacity: 0.9; margin-bottom: 5px; display: flex; align-items: center; justify-content: center;}
    .score { font-size: clamp(2.5rem, 8vw, 6rem); font-weight: 900; text-shadow: 0 5px 25px rgba(0,0,0,0.6); line-height: 1; }
    .total-coins {
      margin-top: 15px; font-size: clamp(0.9rem, 2vw, 1.2rem); font-weight: 600; background: rgba(0, 0, 0, 0.5);
      padding: 8px 20px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5); display: inline-block;
    }

    .divider {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 20; transition: left 1s cubic-bezier(0.25, 1, 0.5, 1); pointer-events: none;
    }
    .vs-badge {
      background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border: 2px solid rgba(255,255,255,0.3); padding: clamp(10px, 3vw, 20px) clamp(15px, 4vw, 30px);
      border-radius: 50px; font-size: clamp(1.2rem, 4vw, 2rem); font-weight: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    /* --- FLOATING TEXT & HISTORY --- */
    .floating-text {
      position: absolute; font-size: clamp(1.5rem, 4vw, 2.5rem); font-weight: bold; color: #fff;
      text-shadow: 0 0 15px rgba(255,255,255,0.9); pointer-events: none; z-index: 30;
      animation: floatUp 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; display: flex; flex-direction: column; align-items: center;
    }
    .floating-text span.user { font-size: 0.4em; color: #f1c40f; text-shadow: none; margin-bottom: 5px; }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      50% { transform: translateY(-50px) scale(1.2); opacity: 1; }
      100% { transform: translateY(-120px) scale(1.4); opacity: 0; }
    }

    .history-list {
      position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 300px; display: flex; flex-direction: column; gap: 8px; z-index: 15;
    }

    .history-item {
      display: flex; align-items: center; background: rgba(20, 20, 25, 0.6); backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 6px 12px; position: relative; overflow: hidden;
      animation: slideInDown 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; transform-origin: top center;
    }
    .history-item.apple-style { border-left: 4px solid #ff4d4d; box-shadow: 0 4px 15px rgba(255, 77, 77, 0.15); }
    .history-item.android-style { border-left: 4px solid #2ecc71; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.15); }
    .hist-avatar { width: clamp(28px, 4vw, 35px); height: clamp(28px, 4vw, 35px); border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.2); z-index: 2; }
    .hist-info { margin-left: 10px; text-align: left; z-index: 2; flex: 1; min-width: 0; }
    .hist-name { font-size: clamp(0.7rem, 2.5vw, 0.85rem); font-weight: bold; color: #ffffff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hist-gift-count { font-size: 0.65rem; color: #aaaaaa; }
    .hist-badge { font-size: clamp(1rem, 3vw, 1.3rem); z-index: 2; margin-left: 5px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
    .hist-bg-icon { position: absolute; right: 0px; top: 50%; transform: translateY(-50%) rotate(-15deg); font-size: 3rem; opacity: 0.08; z-index: 1; pointer-events: none; }

    @keyframes slideInDown { 0% { opacity: 0; max-height: 0; transform: translateY(-20px) scale(0.9); margin-bottom: 0; padding-top: 0; padding-bottom: 0; border-width: 0; } 100% { opacity: 1; max-height: 60px; transform: translateY(0) scale(1); } }
    @keyframes fadeOutUp { 0% { opacity: 1; max-height: 60px; } 100% { opacity: 0; max-height: 0; transform: translateY(20px); margin-bottom: 0; padding-top: 0; padding-bottom: 0; border-width: 0; } }

    /* --- RESPONSIVE LAYOUT (PC & MOBILE) --- */
    @media screen and (min-width: 769px) {
      .rules { flex-direction: row; gap: 20px; }
    }

    @media screen and (max-width: 768px) {
      .score-group h2 { font-size: 1.1rem; white-space: nowrap; }
      #panel-apple .score-group { padding-right: 20px; }
      #panel-android .score-group { padding-left: 20px; }
      .vs-badge { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; padding: 0; margin: 0; font-size: 1rem; line-height: normal; }
    }
  </style>
</head>
<body>

  <header>
    <div class="connection-badge" id="api-status">
      <div class="dot"></div>
      <span id="api-text">Menunggu Koneksi Webcast...</span>
    </div>

    <div class="dashboard-header">
      <h1><img src="img/war.png" alt="war" class="icon-md"> PERANG OS: APPLE VS ANDROID</h1>
      <div class="status" id="war-status">STATUS: MENCARI DOMINASI!</div>
      
      <div class="rules">
        <div class="rule-item">
          <img src="img/apple.png" alt="Apple" class="icon-md"> Apple: Mawar <img src="img/rose.png" alt="Mawar" class="icon-sm"> / Kacamata DJ <img src="img/glass.png" alt="Kacamata DJ" class="icon-sm">
        </div>
        <div class="rule-item">
          <img src="img/android.png" alt="Android" class="icon-md"> Android: Kerucut Es Krim <img src="img/es.png" alt="Es" class="icon-sm"> / Mahkota Naga <img src="img/naga1.png" alt="Naga" class="icon-sm">
        </div>
      </div>
    </div>
  </header>

  <main class="war-container">
    <div class="faction apple" id="panel-apple">
      <img src="img/iphone.png" alt="iPhone" class="device-img">
      <div class="score-group">
        <h2>TIM APPLE <img src="img/apple.png" alt="Apple" class="icon-md"></h2>
        <div class="score" id="score-apple">50.0%</div>
        <div class="total-coins">Total: <span id="total-apple">0</span> Point</div>
      </div>
      <div class="history-list" id="history-apple"></div>
    </div>

    <div class="divider"><div class="vs-badge">VS</div></div>

    <div class="faction android" id="panel-android">
      <img src="img/samsung.png" alt="Samsung" class="device-img">
      <div class="score-group">
        <h2>TIM ANDROID <img src="img/android.png" alt="Android" class="icon-md"></h2>
        <div class="score" id="score-android">50.0%</div>
        <div class="total-coins">Total: <span id="total-android">0</span> Point</div>
      </div>
      <div class="history-list" id="history-android"></div>
    </div>
  </main>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>

  <script>
    const GAME_CONFIG = {
        baseWeight: 2000,
        minClampPercent: 15,
        maxClampPercent: 85,
        maxHistoryItems: 5
    };

    const GIFT_DICTIONARY = {
        "Rose": { faction: "apple", value: 1, icon: "img/rose.png" },
        "Mawar": { faction: "apple", value: 1, icon: "img/rose.png" },
        "DJ Glasses": { faction: "apple", value: 500, icon: "img/glass.png" },
        "Kacamata DJ": { faction: "apple", value: 500, icon: "img/glass.png" },

        "Ice Cream Cone": { faction: "android", value: 1, icon: "img/es.png" },
        "Kerucut Es Krim": { faction: "android", value: 1, icon: "img/es.png" },
        "Dragon Crown": { faction: "android", value: 500, icon: "img/naga.png" },
        "Mahkota Naga": { faction: "android", value: 500, icon: "img/naga.png" }
    };
    
    let appleCoins = 0;
    let androidCoins = 0;

    const DOM = {
        panelApple: document.getElementById('panel-apple'),
        panelAndroid: document.getElementById('panel-android'),
        textApple: document.getElementById('score-apple'),
        textAndroid: document.getElementById('score-android'),
        labelTotalApple: document.getElementById('total-apple'),
        labelTotalAndroid: document.getElementById('total-android'),
        statusText: document.getElementById('war-status'),
        divider: document.querySelector('.divider'),
        historyApple: document.getElementById('history-apple'),
        historyAndroid: document.getElementById('history-android')
    };

    function addHistoryItem(faction, username, avatarUrl, iconUrl, giftName, count) {
        const list = faction === 'apple' ? DOM.historyApple : DOM.historyAndroid;
        const item = document.createElement('div');
        
        item.className = `history-item ${faction}-style`;
        item.innerHTML = `
            <img src="${avatarUrl}" class="hist-avatar" alt="ava">
            <div class="hist-info">
                <div class="hist-name">@${username}</div>
                <div class="hist-gift-count">Mengirim ${count}x ${giftName}</div>
            </div>
            <div class="hist-badge">
                <img src="${iconUrl}" alt="gift" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <div class="hist-bg-icon">
                <img src="${iconUrl}" alt="gift-bg" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
        `;

        list.prepend(item);

        if (list.children.length > GAME_CONFIG.maxHistoryItems) {
            const lastItem = list.lastElementChild;
            lastItem.style.animation = 'fadeOutUp 0.4s ease forwards';
            setTimeout(() => {
                if (lastItem.parentNode) lastItem.remove();
            }, 400); 
        }
    }

    function processGift(faction, amount, iconUrl, username, avatarUrl, giftName, count) {
        if (faction === 'apple') {
            appleCoins += amount;
            createFloatingText(DOM.panelApple, `+${amount} <img src="${iconUrl}" style="width: 1.2em; vertical-align: middle;">`, username);
            addHistoryItem('apple', username, avatarUrl, iconUrl, giftName, count);
        } else if (faction === 'android') {
            androidCoins += amount;
            createFloatingText(DOM.panelAndroid, `+${amount} <img src="${iconUrl}" style="width: 1.2em; vertical-align: middle;">`, username);
            addHistoryItem('android', username, avatarUrl, iconUrl, giftName, count);
        }
        
        // Kalkulasi wajib di dalam fungsi processGift
        let totalAppleWeight = GAME_CONFIG.baseWeight + appleCoins;
        let totalAndroidWeight = GAME_CONFIG.baseWeight + androidCoins;
        let totalWeight = totalAppleWeight + totalAndroidWeight;

        let applePercent = (totalAppleWeight / totalWeight) * 100;
        let androidPercent = 100 - applePercent;

        if (applePercent < GAME_CONFIG.minClampPercent) {
            applePercent = GAME_CONFIG.minClampPercent;
            androidPercent = GAME_CONFIG.maxClampPercent;
        } else if (androidPercent < GAME_CONFIG.minClampPercent) {
            androidPercent = GAME_CONFIG.minClampPercent;
            applePercent = GAME_CONFIG.maxClampPercent;
        }

        DOM.panelApple.style.flexBasis = `${applePercent}%`;
        DOM.panelAndroid.style.flexBasis = `${androidPercent}%`;
        DOM.divider.style.left = `${applePercent}%`;

        DOM.textApple.innerText = `${applePercent.toFixed(1)}%`;
        DOM.textAndroid.innerText = `${androidPercent.toFixed(1)}%`;
        
        DOM.labelTotalApple.innerText = appleCoins.toLocaleString('id-ID');
        DOM.labelTotalAndroid.innerText = androidCoins.toLocaleString('id-ID');

        updateWarStatus();
    }

    function updateWarStatus() {
        if (appleCoins > androidCoins) {
            DOM.statusText.innerHTML = "STATUS: <img src='img/apple.png' alt='Apple' style='width: 1.2em; height: 1.2em; vertical-align: middle; margin-right: 0.2em;'> APPLE MENDOMINASI!";
            DOM.statusText.style.color = "#ff6b6b"; 
        } else if (androidCoins > appleCoins) {
            DOM.statusText.innerHTML = "STATUS: <img src='img/android.png' alt='Android' style='width: 1.2em; height: 1.2em; vertical-align: middle; margin-right: 0.2em;'> ANDROID MENGAMBIL ALIH!";
            DOM.statusText.style.color = "#2ecc71"; 
        } else {
            DOM.statusText.innerHTML = "STATUS: <img src='img/war.png' alt='War' style='width: 1.2em; height: 1.2em; vertical-align: middle; margin-right: 0.2em;'> PERTEMPURAN SEIMBANG";
            DOM.statusText.style.color = "#ffffff";
        }
    }

    function createFloatingText(panel, text, username) {
        const floatEl = document.createElement('div');
        floatEl.classList.add('floating-text');
        
        floatEl.innerHTML = `<span class="user">@${username}</span>${text}`;

        const randomX = Math.floor(Math.random() * 40) + 30; 
        const randomY = Math.floor(Math.random() * 20) + 40; 
        floatEl.style.left = `${randomX}%`;
        floatEl.style.top = `${randomY}%`;

        panel.appendChild(floatEl);
        setTimeout(() => floatEl.remove(), 1500);
    }

    window.handleTikTokEvent = function(giftName, giftCount, username, avatarUrl) {
        const validGift = GIFT_DICTIONARY[giftName];
        
        if (validGift) {
            const totalValue = validGift.value * giftCount;
            const finalAvatar = avatarUrl || 'https://ui-avatars.com/api/?name=' + username + '&background=random';
            
            processGift(validGift.faction, totalValue, validGift.icon, username, finalAvatar, giftName, giftCount);
        }
    };

    window.setConnected = function(username) {
        const badge = document.getElementById('api-status');
        badge.classList.add('connected');
        document.getElementById('api-text').innerText = `Live Terhubung: @${username}`;
    };

    /* =========================================
       KONEKSI KE SERVER NODE.JS (SOCKET.IO)
       ========================================= */
    const socket = io("http://localhost:3000");

    socket.on("tiktok_connected", (username) => {
        window.setConnected(username);
    });

    socket.on("new_gift", (data) => {
        window.handleTikTokEvent(data.giftName, data.count, data.username, data.avatarUrl);
    });

  </script>
</body>
</html>
