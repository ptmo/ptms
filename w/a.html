<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>OBS Web3 Live Overlay</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* CSS SAMA SEPERTI SEBELUMNYA, SESUAIKAN DENGAN ASETMU */
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; }
        #overlay-container { position: absolute; bottom: 50px; left: 50px; width: 450px; }
        
        .gift-alert {
            padding: 15px; margin-top: 10px; border-radius: 10px; color: white;
            font-weight: bold; opacity: 0; transform: translateY(50px);
            animation: slideUpFade 0.5s forwards; display: flex; align-items: center; gap: 15px;
        }

        .profil-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid white; }
        
        .tier-common { background: rgba(0, 0, 0, 0.7); border: 1px solid #fff; }
        .tier-legend { background: linear-gradient(45deg, #1e3c72, #2a5298); border: 2px solid #00ffff; box-shadow: 0 0 15px #00ffff; }
        .tier-mythic { background: linear-gradient(45deg, #b8860b, #ffd700); border: 2px solid #ff8c00; box-shadow: 0 0 30px #ffd700; color: #000; }

        @keyframes slideUpFade { to { opacity: 1; transform: translateY(0); } }
        .fade-out { animation: fadeOutDown 0.5s forwards !important; }
        @keyframes fadeOutDown { to { opacity: 0; transform: translateY(50px); } }
    </style>
</head>
<body>

    <div id="overlay-container"></div>

    <script>
        // Inisialisasi koneksi WebSockets ke Backend
        const socket = io();
        const overlayContainer = document.getElementById('overlay-container');

        // Dengarkan event 'giftMasukRealtime' dari server Node.js
        socket.on('giftMasukRealtime', (giftData) => {
            
            const alertBox = document.createElement('div');
            let iconAtauEfek = "";
            let keteranganTier = "";

            // Logika Tiering Profesional berbasis coinValue asli dari TikTok
            if (giftData.coinValue >= 1000) {
                alertBox.className = 'gift-alert tier-mythic';
                iconAtauEfek = "🐋 ₿";
                keteranganTier = "SULTAN PAUS!";
            } else if (giftData.coinValue >= 100) {
                alertBox.className = 'gift-alert tier-legend';
                iconAtauEfek = "🦈 ♦";
                keteranganTier = "LEGEND HIU!";
            } else {
                alertBox.className = 'gift-alert tier-common';
                iconAtauEfek = "🎁";
                keteranganTier = `Kirim ${giftData.giftName}`;
            }

            // Tampilkan foto profil asli dari audiens (diambil dari URL TikTok)
            alertBox.innerHTML = `
                <img src="${giftData.profilePic}" class="profil-img">
                <div>
                    <strong>${giftData.username}</strong><br>
                    ${keteranganTier} (${giftData.coinValue} Koin)
                </div>
                <span style="font-size: 2em; margin-left: auto;">${iconAtauEfek}</span>
            `;

            overlayContainer.appendChild(alertBox);

            // Bersihkan dari layar setelah 5 detik
            setTimeout(() => {
                alertBox.classList.add('fade-out');
                setTimeout(() => alertBox.remove(), 500);
            }, 5000);
        });
    </script>
</body>
</html>
