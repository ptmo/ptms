<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Farming Pro: OS War - LIVE</title>
  <style>
    :root {
      --bg-dark: #0f0f13;
      --apple-glow: #1c1c22;
      --android-glow: #15261b;
      --glass-bg: rgba(0, 0, 0, 0.65);
      --glass-border: rgba(255, 255, 255, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg-dark);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh; /* Dikunci penuh satu layar tanpa scroll */
    }

    /* --- DASHBOARD HEADER --- */
    header {
      width: 100%;
      padding: 15px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      position: absolute; /* Mengambang di atas konten utama */
      top: 0;
    }

    .connection-badge {
      background: rgba(255, 193, 7, 0.2);
      border: 1px solid rgba(255, 193, 7, 0.5);
      color: #ffc107;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
    }
    
    .connection-badge.connected {
      background: rgba(46, 204, 113, 0.2);
      border: 1px solid rgba(46, 204, 113, 0.5);
      color: #2ecc71;
    }

    .connection-badge .dot {
      width: 8px; height: 8px; border-radius: 50%; background: currentColor;
      box-shadow: 0 0 8px currentColor;
    }

    .dashboard-header {
      text-align: center;
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: clamp(10px, 3vw, 20px) clamp(15px, 4vw, 40px);
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      width: 100%;
      max-width: 900px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .dashboard-header h1 {
      font-size: clamp(1.2rem, 4vw, 2.2rem);
      margin-bottom: 5px;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    .dashboard-header .status {
      font-size: clamp(0.9rem, 2.5vw, 1.4rem);
      font-weight: 800;
      margin-bottom: 8px;
      transition: color 0.4s ease;
    }

    .dashboard-header .rules {
      font-size: clamp(0.7rem, 2vw, 1rem);
      color: #bbbbbb;
      background: rgba(255, 255, 255, 0.05);
      padding: 6px 12px;
      border-radius: 10px;
      display: inline-block;
    }

    /* --- LAYOUT UTAMA --- */
    main.war-container {
      flex: 1;
      display: flex;
      width: 100vw;
      height: 100%;
      position: relative;
    }

    .faction {
      transition: flex-basis 1s cubic-bezier(0.25, 1, 0.5, 1); 
      display: flex;
      flex-direction: column;
      justify-content: center; /* Memastikan konten persis di tengah */
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .apple { flex-basis: 50%; background: radial-gradient(circle at center, var(--apple-glow) 0%, #000000 100%); border-right: 1px solid rgba(255,255,255,0.1); }
    .android { flex-basis: 50%; background: radial-gradient(circle at center, var(--android-glow) 0%, #000000 100%); }

    .content { text-align: center; z-index: 10; padding: 0 10px; }
    .faction h2 { font-size: clamp(1.2rem, 3.5vw, 2.5rem); letter-spacing: 1px; opacity: 0.9; margin-bottom: 10px; }
    .score { font-size: clamp(2.5rem, 8vw, 6rem); font-weight: 900; text-shadow: 0 5px 25px rgba(0,0,0,0.6); line-height: 1; }

    .total-coins {
      margin-top: 15px; font-size: clamp(0.9rem, 2vw, 1.5rem); font-weight: 600;
      background: rgba(0, 0, 0, 0.5); padding: 8px 20px; border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
      display: inline-block;
    }

    .divider {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 20; transition: left 1s cubic-bezier(0.25, 1, 0.5, 1); pointer-events: none;
    }

    .vs-badge {
      background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border: 2px solid rgba(255,255,255,0.3); padding: clamp(10px, 3vw, 20px) clamp(15px, 4vw, 30px);
      border-radius: 50px; font-size: clamp(1.2rem, 4vw, 2rem); font-weight: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    /* --- ANIMASI FLOATING TEXT --- */
    .floating-text {
      position: absolute; font-size: clamp(1.5rem, 4vw, 2.5rem); font-weight: bold;
      color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.9); pointer-events: none;
      animation: floatUp 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      display: flex; flex-direction: column; align-items: center;
    }
    .floating-text span.user { font-size: 0.4em; color: #f1c40f; text-shadow: none; margin-bottom: 5px; }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      50% { transform: translateY(-50px) scale(1.2); opacity: 1; }
      100% { transform: translateY(-120px) scale(1.4); opacity: 0; }
    }
  </style>
</head>
<body>

  <header>
    <div class="connection-badge" id="api-status">
      <div class="dot"></div>
      <span id="api-text">Menunggu Koneksi Webcast...</span>
    </div>

    <div class="dashboard-header">
      <h1>⚔️ Perang OS: Apple vs Android</h1>
      <div class="status" id="war-status">STATUS: MENCARI DOMINASI!</div>
      <div class="rules">🍎 Kubu Apple: Mawar / Kacamata DJ <br> 🤖 Kubu Android: Kerucut Es Krim / Mahkota Naga</div>
    </div>
  </header>

  <main class="war-container">
    <div class="faction apple" id="panel-apple">
      <div class="content">
        <h2>TIM APPLE 🍎</h2>
        <div class="score" id="score-apple">50.0%</div>
        <div class="total-coins">Total: <span id="total-apple">0</span> Koin</div>
      </div>
    </div>

    <div class="divider"><div class="vs-badge">VS</div></div>

    <div class="faction android" id="panel-android">
      <div class="content">
        <h2>TIM ANDROID 🤖</h2>
        <div class="score" id="score-android">50.0%</div>
        <div class="total-coins">Total: <span id="total-android">0</span> Koin</div>
      </div>
    </div>
  </main>

  <script>
    /* =========================================
       1. GAME CONFIGURATION & DICTIONARY
       ========================================= */
    const GAME_CONFIG = {
        baseWeight: 2000,
        minClampPercent: 15,
        maxClampPercent: 85
    };

    // Dictionary Pemetaan Gift TikTok
    const GIFT_DICTIONARY = {
        "Rose": { faction: "apple", value: 1, emoji: "🌹" },
        "Mawar": { faction: "apple", value: 1, emoji: "🌹" },
        "DJ Glasses": { faction: "apple", value: 199, emoji: "🕶️" },
        "Kacamata DJ": { faction: "apple", value: 199, emoji: "🕶️" },

        "Ice Cream Cone": { faction: "android", value: 1, emoji: "🍦" },
        "Kerucut Es Krim": { faction: "android", value: 1, emoji: "🍦" },
        "Dragon Crown": { faction: "android", value: 299, emoji: "👑" },
        "Mahkota Naga": { faction: "android", value: 299, emoji: "👑" }
    };

    /* =========================================
       2. STATE & DOM ELEMENTS
       ========================================= */
    let appleCoins = 0;
    let androidCoins = 0;

    const DOM = {
        panelApple: document.getElementById('panel-apple'),
        panelAndroid: document.getElementById('panel-android'),
        textApple: document.getElementById('score-apple'),
        textAndroid: document.getElementById('score-android'),
        labelTotalApple: document.getElementById('total-apple'),
        labelTotalAndroid: document.getElementById('total-android'),
        statusText: document.getElementById('war-status'),
        divider: document.querySelector('.divider')
    };

    /* =========================================
       3. CORE ENGINE LOGIC
       ========================================= */
    function processGift(faction, amount, emoji, username) {
        if (faction === 'apple') {
            appleCoins += amount;
            createFloatingText(DOM.panelApple, `+${amount} ${emoji}`, username);
        } else if (faction === 'android') {
            androidCoins += amount;
            createFloatingText(DOM.panelAndroid, `+${amount} ${emoji}`, username);
        }

        let totalAppleWeight = GAME_CONFIG.baseWeight + appleCoins;
        let totalAndroidWeight = GAME_CONFIG.baseWeight + androidCoins;
        let totalWeight = totalAppleWeight + totalAndroidWeight;

        let applePercent = (totalAppleWeight / totalWeight) * 100;
        let androidPercent = 100 - applePercent;

        if (applePercent < GAME_CONFIG.minClampPercent) {
            applePercent = GAME_CONFIG.minClampPercent;
            androidPercent = GAME_CONFIG.maxClampPercent;
        } else if (androidPercent < GAME_CONFIG.minClampPercent) {
            androidPercent = GAME_CONFIG.minClampPercent;
            applePercent = GAME_CONFIG.maxClampPercent;
        }

        DOM.panelApple.style.flexBasis = `${applePercent}%`;
        DOM.panelAndroid.style.flexBasis = `${androidPercent}%`;
        DOM.divider.style.left = `${applePercent}%`;

        DOM.textApple.innerText = `${applePercent.toFixed(1)}%`;
        DOM.textAndroid.innerText = `${androidPercent.toFixed(1)}%`;
        
        DOM.labelTotalApple.innerText = appleCoins.toLocaleString('id-ID');
        DOM.labelTotalAndroid.innerText = androidCoins.toLocaleString('id-ID');

        updateWarStatus();
    }

    function updateWarStatus() {
        if (appleCoins > androidCoins) {
            DOM.statusText.innerText = "STATUS: 🍎 APPLE MENDOMINASI!";
            DOM.statusText.style.color = "#ff6b6b"; 
        } else if (androidCoins > appleCoins) {
            DOM.statusText.innerText = "STATUS: 🤖 ANDROID MENGAMBIL ALIH!";
            DOM.statusText.style.color = "#2ecc71"; 
        } else {
            DOM.statusText.innerText = "STATUS: ⚔️ PERTEMPURAN SEIMBANG";
            DOM.statusText.style.color = "#ffffff";
        }
    }

    function createFloatingText(panel, text, username) {
        const floatEl = document.createElement('div');
        floatEl.classList.add('floating-text');
        
        floatEl.innerHTML = `<span class="user">@${username}</span>${text}`;

        const randomX = Math.floor(Math.random() * 40) + 30; 
        const randomY = Math.floor(Math.random() * 20) + 50; 
        floatEl.style.left = `${randomX}%`;
        floatEl.style.top = `${randomY}%`;

        panel.appendChild(floatEl);
        setTimeout(() => floatEl.remove(), 1500);
    }

    /* =========================================
       4. API INTERFACE (Jembatan ke TikTok)
       ========================================= */
    // FUNGSI INI ADALAH SATU-SATUNYA PINTU MASUK DATA DARI SERVER
    window.handleTikTokEvent = function(giftName, giftCount, username) {
        const validGift = GIFT_DICTIONARY[giftName];
        
        if (validGift) {
            const totalValue = validGift.value * giftCount;
            processGift(validGift.faction, totalValue, validGift.emoji, username);
        }
    };

    // Fungsi untuk mengubah status indikator UI saat server backend terhubung ke TikTok
    window.setConnected = function(username) {
        const badge = document.getElementById('api-status');
        badge.classList.add('connected');
        document.getElementById('api-text').innerText = `Live Terhubung: @${username}`;
    };

  </script>
</body>
</html>
