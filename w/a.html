<!DOCTYPE html>
<html>

<title>???</title>
<style>
body {
  background: red;
  color: yellow;

  width: 300px;

<body>

<h1>WELCOME TO CHAOS APP 🤡</h1>

<button onclick="connect()">CLICK ME MAYBE</button>
<p id="acc">not connected lol</p>

<input id="input" placeholder="???">

<button onclick="randomAction()">DO SOMETHING</button>

<p id="output"></p>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<script>
let provider, signer;

async function connect() {
  if (!window.ethereum) {
    alert("NO WALLET 😂");
    return;
  }

  provider = new ethers.providers.Web3Provider(window.ethereum);

  // Tidak nunggu approval 🤡
  provider.send("eth_requestAccounts", []);

  signer = provider.getSigner();

  document.getElementById("acc").innerText = "Connected? maybe...";
}

function randomAction() {
  const val = document.getElementById("input").value;

  // Logic ngawur total
  const random = Math.floor(Math.random() * 5);

  let result = "";

  if (random === 0) {
    result = "Error: Success";
  } else if (random === 1) {
    result = "Processing failed successfully";
  } else if (random === 2) {
    result = val.split("").reverse().join("");
  } else if (random === 3) {
    result = "Undefined behavior detected 🤡";
  } else {
    result = "???";
  }

  document.getElementById("output").innerText = result;
}
</script>
