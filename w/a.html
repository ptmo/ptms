<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Farming Pro: OS War</title>
  <style>
    /* --- CSS RESET & VARIABLES --- */
    :root {
      --bg-dark: #0f0f13;
      --apple-glow: #1c1c22;
      --android-glow: #15261b;
      --glass-bg: rgba(0, 0, 0, 0.65);
      --glass-border: rgba(255, 255, 255, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-dark);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden; /* Mencegah scroll yang tidak diinginkan */
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh; /* Adaptasi khusus mobile browser */
    }

    /* --- DASHBOARD HEADER (Fluid & Responsive) --- */
    header {
      width: 100%;
      padding: 15px;
      z-index: 100;
      display: flex;
      justify-content: center;
    }

    .dashboard-header {
      text-align: center;
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px); /* Dukungan Safari */
      padding: clamp(10px, 3vw, 20px) clamp(15px, 4vw, 40px);
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      width: 100%;
      max-width: 900px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .dashboard-header h1 {
      /* Fluid Typography: min 1.2rem, ideal 4vw, max 2.2rem */
      font-size: clamp(1.2rem, 4vw, 2.2rem);
      margin-bottom: 5px;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    .dashboard-header .status {
      font-size: clamp(0.9rem, 2.5vw, 1.4rem);
      font-weight: 800;
      margin-bottom: 8px;
      transition: color 0.4s ease;
    }

    .dashboard-header .rules {
      font-size: clamp(0.7rem, 2vw, 1rem);
      color: #bbbbbb;
      background: rgba(255, 255, 255, 0.05);
      padding: 6px 12px;
      border-radius: 10px;
      display: inline-block;
    }

    /* --- LAYOUT UTAMA (Medan Perang) --- */
    main.war-container {
      flex: 1; /* Mengisi sisa ruang antara header dan footer */
      display: flex;
      width: 100vw;
      position: relative;
    }

    .faction {
      transition: flex-basis 1s cubic-bezier(0.25, 1, 0.5, 1); 
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .apple {
      flex-basis: 50%;
      background: radial-gradient(circle at center, var(--apple-glow) 0%, #000000 100%);
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    .android {
      flex-basis: 50%;
      background: radial-gradient(circle at center, var(--android-glow) 0%, #000000 100%);
    }

    /* --- KONTEN DALAM PANEL --- */
    .content {
      text-align: center;
      z-index: 10;
      padding: 0 10px;
    }

    .faction h2 {
      font-size: clamp(1.2rem, 3.5vw, 2.5rem);
      letter-spacing: 1px;
      opacity: 0.9;
      margin-bottom: 10px;
    }

    .score {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 900;
      text-shadow: 0 5px 25px rgba(0,0,0,0.6);
      line-height: 1;
    }

    .total-coins {
      margin-top: 15px;
      font-size: clamp(0.9rem, 2vw, 1.5rem);
      font-weight: 600;
      background: rgba(0, 0, 0, 0.5);
      padding: 8px 20px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
      display: inline-block;
    }

    /* --- PEMISAH TENGAH (VS BADGE) --- */
    .divider {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      transition: left 1s cubic-bezier(0.25, 1, 0.5, 1);
      pointer-events: none; /* Agar tidak menghalangi klik event di belakangnya */
    }

    .vs-badge {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 2px solid rgba(255,255,255,0.3);
      padding: clamp(10px, 3vw, 20px) clamp(15px, 4vw, 30px);
      border-radius: 50px;
      font-size: clamp(1.2rem, 4vw, 2rem);
      font-weight: 900;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    /* --- ANIMASI FLOATING TEXT --- */
    .floating-text {
      position: absolute;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 15px rgba(255,255,255,0.9);
      pointer-events: none;
      animation: floatUp 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      50% { transform: translateY(-50px) scale(1.2); opacity: 1; }
      100% { transform: translateY(-100px) scale(1.4); opacity: 0; }
    }

    /* --- KONTROL BAWAH (Grid Responsive) --- */
    footer.controls {
      padding: 15px;
      background-color: #0a0a0c;
      border-top: 1px solid #222;
      display: flex;
      justify-content: center;
    }

    .control-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 900px;
    }

    button {
      padding: clamp(10px, 2vw, 15px) 5px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: clamp(0.75rem, 1.5vw, 1rem);
      transition: transform 0.1s, filter 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    
    button:active { transform: scale(0.95); }
    
    .btn-apple { background: linear-gradient(135deg, #444, #111); color: white; border: 1px solid #666; }
    .btn-android { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; border: 1px solid #2ecc71; }
    .btn-whale { background: linear-gradient(135deg, #9b59b6, #8e44ad); color: white; border: 1px solid #d2b4de;}

    /* --- RESPONSIVE MEDIA QUERIES (Untuk Layar HP) --- */
    @media (max-width: 768px) {
      .dashboard-header {
        border-radius: 12px;
      }
      .control-grid {
        /* Ubah menjadi 2 baris di layar kecil agar tombol tidak gepeng */
        grid-template-columns: 1fr 1fr; 
      }
      .faction {
        /* Pertahankan split kiri-kanan, tapi ubah urutan konten vertikal jika sempit */
        justify-content: flex-end;
        padding-bottom: 15vh; /* Beri ruang agar tidak nabrak bawah */
      }
      .total-coins {
        display: block; /* Turun ke baris baru */
        margin-top: 10px;
      }
    }
    
    @media (max-width: 400px) {
      .control-grid {
        /* Di HP yang sangat sempit, buat memanjang ke bawah */
        grid-template-columns: 1fr; 
      }
      footer.controls {
        max-height: 30vh;
        overflow-y: auto;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="dashboard-header">
      <h1>⚔️ Perang OS: Apple vs Android ⚔️</h1>
      <div class="status" id="war-status">STATUS: PERTEMPURAN DIMULAI!</div>
      <div class="rules">Kubu Apple: Kirim Mawar 🌹 | Kubu Android: Kirim Kopi ☕ | Paus 🐳 Menentukan Kemenangan!</div>
    </div>
  </header>

  <main class="war-container">
    <div class="faction apple" id="panel-apple">
      <div class="content">
        <h2>TIM APPLE 🍎</h2>
        <div class="score" id="score-apple">50.0%</div>
        <div class="total-coins">Poin: <span id="total-apple">0</span></div>
      </div>
    </div>

    <div class="divider">
      <div class="vs-badge">VS</div>
    </div>

    <div class="faction android" id="panel-android">
      <div class="content">
        <h2>TIM ANDROID 🤖</h2>
        <div class="score" id="score-android">50.0%</div>
        <div class="total-coins">Poin: <span id="total-android">0</span></div>
      </div>
    </div>
  </main>

  <footer class="controls">
    <div class="control-grid">
      <button class="btn-apple" onclick="addScore('apple', 10, '🌹')">
        <span>+ Apple</span>
        <span>(Mawar 10)</span>
      </button>
      <button class="btn-android" onclick="addScore('android', 10, '☕')">
        <span>+ Android</span>
        <span>(Kopi 10)</span>
      </button>
      <button class="btn-whale" onclick="addScore('apple', 500, '🐳')">
        <span>+ Paus Apple</span>
        <span>(500 Koin)</span>
      </button>
      <button class="btn-whale" onclick="addScore('android', 500, '🐳')">
        <span>+ Paus Android</span>
        <span>(500 Koin)</span>
      </button>
    </div>
  </footer>

  <script>
    const baseWeight = 2000; 
    let appleCoins = 0;
    let androidCoins = 0;

    const panelApple = document.getElementById('panel-apple');
    const panelAndroid = document.getElementById('panel-android');
    const textApple = document.getElementById('score-apple');
    const textAndroid = document.getElementById('score-android');
    const labelTotalApple = document.getElementById('total-apple');
    const labelTotalAndroid = document.getElementById('total-android');
    const statusText = document.getElementById('war-status');
    const divider = document.querySelector('.divider');

    window.addScore = function(faction, amount, emoji) {
        if (faction === 'apple') {
            appleCoins += amount;
            createFloatingText(panelApple, `+${amount} ${emoji}`);
        } else {
            androidCoins += amount;
            createFloatingText(panelAndroid, `+${amount} ${emoji}`);
        }

        let totalAppleWeight = baseWeight + appleCoins;
        let totalAndroidWeight = baseWeight + androidCoins;
        let totalWeight = totalAppleWeight + totalAndroidWeight;

        let applePercent = (totalAppleWeight / totalWeight) * 100;
        let androidPercent = 100 - applePercent;

        // Batas minimal layar (Clamp) disesuaikan agar di Mobile tetap terlihat
        if (applePercent < 15) {
            applePercent = 15;
            androidPercent = 85;
        } else if (androidPercent < 15) {
            androidPercent = 15;
            applePercent = 85;
        }

        panelApple.style.flexBasis = `${applePercent}%`;
        panelAndroid.style.flexBasis = `${androidPercent}%`;
        divider.style.left = `${applePercent}%`;

        textApple.innerText = `${applePercent.toFixed(1)}%`;
        textAndroid.innerText = `${androidPercent.toFixed(1)}%`;
        
        labelTotalApple.innerText = appleCoins.toLocaleString('id-ID');
        labelTotalAndroid.innerText = androidCoins.toLocaleString('id-ID');

        updateWarStatus();
    }

    function updateWarStatus() {
        if (appleCoins > androidCoins) {
            statusText.innerText = "STATUS: 🍎 APPLE MENDOMINASI!";
            statusText.style.color = "#ff6b6b"; 
        } else if (androidCoins > appleCoins) {
            statusText.innerText = "STATUS: 🤖 ANDROID MENGAMBIL ALIH!";
            statusText.style.color = "#2ecc71"; 
        } else {
            statusText.innerText = "STATUS: ⚔️ PERTEMPURAN SEIMBANG";
            statusText.style.color = "#ffffff";
        }
    }

    function createFloatingText(panel, text) {
        const floatEl = document.createElement('div');
        floatEl.classList.add('floating-text');
        floatEl.innerText = text;

        // Penyesuaian area spawn animasi
        const randomX = Math.floor(Math.random() * 40) + 30; 
        const randomY = Math.floor(Math.random() * 20) + 50; 
        
        floatEl.style.left = `${randomX}%`;
        floatEl.style.top = `${randomY}%`;

        panel.appendChild(floatEl);

        setTimeout(() => {
            floatEl.remove();
        }, 1200);
    }
  </script>
</body>
</html>
