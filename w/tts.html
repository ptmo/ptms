<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Premium Wordscapes - Flawless Logic</title>
  <style>
    :root {
      --bg-dark: #0a0a0c;
      --panel-bg: rgba(20, 20, 25, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent-glow: #00e5ff;
      --text-main: #ffffff;
      --success-color: #2ecc71;
      --error-color: #ff3366;
      --cell-bg: rgba(255, 255, 255, 0.05);
      --cell-border: rgba(255, 255, 255, 0.2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }

    body {
      background: radial-gradient(circle at center, #1a1a24 0%, var(--bg-dark) 100%);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden;
      touch-action: none;
    }

    header { width: 100%; padding: 20px; text-align: center; z-index: 10; }
    h1 { font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
    .level-text { font-size: 0.9rem; color: #aaa; margin-top: 5px; }

    /* Layout Grid yang presisi di tengah */
    .grid-container {
      flex: 1; display: flex; justify-content: center; align-items: center; width: 100%; padding: 10px;
    }
    
    .crossword-grid {
      display: grid; gap: 8px; 
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }
    
    .cell {
      width: clamp(35px, 10vw, 55px); height: clamp(35px, 10vw, 55px);
      border-radius: 10px; font-size: clamp(1.2rem, 5vw, 1.8rem); font-weight: 800;
      display: flex; justify-content: center; align-items: center;
      transition: all 0.3s ease; opacity: 0; transform: scale(0.5);
    }
    
    .cell.active { 
      background: var(--cell-bg); border: 2px solid var(--cell-border); 
      box-shadow: inset 0 0 15px rgba(0,0,0,0.6), 0 4px 10px rgba(0,0,0,0.2); 
      opacity: 1; transform: scale(1); 
    }
    
    .cell.revealed { 
      background: rgba(0, 229, 255, 0.15); border-color: var(--accent-glow); 
      color: var(--accent-glow); text-shadow: 0 0 10px var(--accent-glow); 
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.2); 
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
    }

    /* Teks Pratinjau (Preview Word) */
    .preview-word {
      height: 40px; font-size: 1.6rem; font-weight: 900; letter-spacing: 5px;
      color: #f1c40f; text-shadow: 0 0 15px rgba(241, 196, 15, 0.6);
      display: flex; justify-content: center; align-items: center; z-index: 10; margin-bottom: 30px;
    }
    .preview-word.wrong { color: var(--error-color); text-shadow: 0 0 15px var(--error-color); animation: shake 0.4s ease; }

    /* Area Lingkaran Swipe */
    .wheel-container {
      position: relative; width: 280px; height: 280px; margin-bottom: 50px;
      border-radius: 50%; background: var(--panel-bg); backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border); box-shadow: 0 15px 35px rgba(0,0,0,0.6);
      display: flex; justify-content: center; align-items: center; z-index: 10;
    }
    
    .letter-node {
      position: absolute; width: 65px; height: 65px; border-radius: 50%;
      background: linear-gradient(145deg, #2a2a35, #1a1a24); border: 2px solid rgba(255,255,255,0.05);
      display: flex; justify-content: center; align-items: center;
      font-size: 2rem; font-weight: 900; color: white; cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4); transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .letter-node.selected { 
      transform: scale(1.15); border-color: var(--accent-glow); 
      color: var(--accent-glow); box-shadow: 0 0 25px rgba(0, 229, 255, 0.5); 
    }

    #swipe-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }

    /* Layar Menang */
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 100;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
    }
    .overlay.show { opacity: 1; pointer-events: auto; }
    .overlay h2 { font-size: 3rem; color: var(--success-color); margin-bottom: 30px; text-shadow: 0 0 25px var(--success-color); }
    .btn-next { padding: 15px 45px; font-size: 1.2rem; font-weight: 900; color: #000; background: var(--accent-glow); border: none; border-radius: 40px; cursor: pointer; box-shadow: 0 0 25px rgba(0, 229, 255, 0.5); transition: all 0.2s; }
    .btn-next:active { transform: scale(0.95); }

    /* Animasi Premium */
    @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 70% { transform: scale(1.15); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-12px); } 40%, 80% { transform: translateX(12px); } }
  </style>
</head>

/* =========================================
       0. CRYPTOGRAPHIC ENGINE (Standar Keamanan)
       ========================================= */
    function getCryptoRandom() {
        const array = new Uint32Array(1);
        window.crypto.getRandomValues(array);
        return array[0] / (0xFFFFFFFF + 1);
    }

    function cryptoShuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex > 0) {
            randomIndex = Math.floor(getCryptoRandom() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    const MASTER_DICTIONARY = RAW_DICTIONARY_STRING.split(',');

    /* =========================================
       2. DYNAMIC ANAGRAM ALGORITHM 
       Mencari kata tersembunyi secara otomatis!
       ========================================= */
    // Mengecek apakah "testWord" bisa disusun dari "availableLetters"
    function canFormWord(testWord, availableLetters) {
        let tempLetters = [...availableLetters];
        for (let i = 0; i < testWord.length; i++) {
            let char = testWord[i];
            let idx = tempLetters.indexOf(char);
            if (idx === -1) return false; 
            tempLetters.splice(idx, 1); 
        }
        return true;
    }

    function generateDynamicPool() {
        // 1. Pilih "Seed Word" (Kata Induk) dengan panjang 4-6 huruf
        const seedCandidates = MASTER_DICTIONARY.filter(w => w.length >= 4 && w.length <= 6);
        const seedIndex = Math.floor(getCryptoRandom() * seedCandidates.length);
        const seedWord = seedCandidates[seedIndex];
        
        // 2. Pecah menjadi huruf-huruf untuk ditaruh di roda
        const wheelLetters = seedWord.split('');

        // 3. Pindai SELURUH KAMUS (Real-time) untuk mencari kata turunan (minimal 3 huruf)
        const discoveredWords = [];
        for (let i = 0; i < MASTER_DICTIONARY.length; i++) {
            let dictWord = MASTER_DICTIONARY[i];
            // Tambahan keamanan: pastikan huruf pertama dan lainnya cocok tanpa duplikat berlebih
            if (dictWord.length >= 3 && dictWord.length <= wheelLetters.length) {
                if (canFormWord(dictWord, wheelLetters)) {
                    discoveredWords.push(dictWord);
                }
            }
        }

        return {
            letters: cryptoShuffle(wheelLetters), 
            words: discoveredWords 
        };
    }

    /* =========================================
       3. CROSSWORD GENERATOR 
       ========================================= */
    function canPlace(grid, word, x, y, dir) {
      if (x < 0 || y < 0 || (dir === 'H' && x + word.length > 15) || (dir === 'V' && y + word.length > 15)) return false;

      for (let i = 0; i < word.length; i++) {
        let cx = dir === 'H' ? x + i : x;
        let cy = dir === 'H' ? y : y + i;
        if (grid[cy][cx] !== ' ' && grid[cy][cx] !== word[i]) return false;

        if (dir === 'H') {
          if (grid[cy][cx] === ' ') {
            if (cy > 0 && grid[cy-1][cx] !== ' ') return false;
            if (cy < 14 && grid[cy+1][cx] !== ' ') return false;
          }
        } else {
          if (grid[cy][cx] === ' ') {
            if (cx > 0 && grid[cy][cx-1] !== ' ') return false;
            if (cx < 14 && grid[cy][cx+1] !== ' ') return false;
          }
        }
      }
      
      if (dir === 'H') {
        if (x > 0 && grid[y][x-1] !== ' ') return false; 
        if (x + word.length < 15 && grid[y][x + word.length] !== ' ') return false; 
      } else {
        if (y > 0 && grid[y-1][x] !== ' ') return false; 
        if (y + word.length < 15 && grid[y + word.length][x] !== ' ') return false; 
      }
      return true;
    }

    function placeWord(grid, word, x, y, dir) {
      for (let i = 0; i < word.length; i++) {
        let cx = dir === 'H' ? x + i : x; let cy = dir === 'H' ? y : y + i;
        grid[cy][cx] = word[i];
      }
    }

    function buildCrossword(wordList) {
      // Prioritaskan kata terpanjang terlebih dahulu
      let words = [...wordList].sort((a,b) => b.length - a.length); 
      let grid = Array(15).fill(null).map(() => Array(15).fill(' '));
      let placements = [];

      let startX = 7; let startY = 7;
      placeWord(grid, words[0], startX, startY, 'H');
      placements.push({ word: words[0], x: startX, y: startY, dir: 'H' });

      for (let i = 1; i < words.length; i++) {
        let placed = false; let word = words[i];
        
        for (let j = 0; j < placements.length && !placed; j++) {
          let p = placements[j];
          for (let k = 0; k < word.length && !placed; k++) {
            for (let l = 0; l < p.word.length && !placed; l++) {
              if (word[k] === p.word[l]) {
                let nx = p.dir === 'H' ? p.x + l : p.x - k;
                let ny = p.dir === 'H' ? p.y - k : p.y + l;
                let ndir = p.dir === 'H' ? 'V' : 'H';

                if (canPlace(grid, word, nx, ny, ndir)) {
                  placeWord(grid, word, nx, ny, ndir);
                  placements.push({ word, x: nx, y: ny, dir: ndir });
                  placed = true;
                }
              }
            }
          }
        }
      }

      let minX = 15, maxX = 0, minY = 15, maxY = 0;
      placements.forEach(p => {
        minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
        maxX = Math.max(maxX, p.dir === 'H' ? p.x + p.word.length - 1 : p.x);
        maxY = Math.max(maxY, p.dir === 'V' ? p.y + p.word.length - 1 : p.y);
      });

      let width = maxX - minX + 1; let height = maxY - minY + 1;

      // Filter: Harus muat di grid maks 6x6 dan minimal ada 3 kata silang
      if (width <= 6 && height <= 6 && placements.length >= 3) {
        placements.forEach(p => { p.x -= minX; p.y -= minY; });
        return { placements, cols: width, rows: height };
      }
      return null;
    }

    function generateRandomLevelData() {
      let maxRetries = 200;
      let bestGrid = null;
      let bestPool = null;

      while (maxRetries > 0) {
        // PERUBAHAN: Tarik kata murni acak tanpa setingan
        let dynamicPool = generateDynamicPool();
        
        let shuffledWords = cryptoShuffle([...dynamicPool.words]);
        let gridData = buildCrossword(shuffledWords);
        
        if (gridData && gridData.placements.length >= 3) {
            if (!bestGrid || gridData.placements.length > bestGrid.placements.length) {
                bestPool = dynamicPool;
                bestGrid = { letters: bestPool.letters, words: gridData.placements, cols: gridData.cols, rows: gridData.rows };
            }
            if (gridData.placements.length === dynamicPool.words.length) break; 
        }
        maxRetries--;
      }
      
      // Jika RNG apes setelah 200x percobaan, fallback ke kata yang pasti jalan
      return bestGrid || { cols: 4, rows: 4, letters: ['P','A','L','U'], words: [{word:"PALU", x:0, y:1, dir:"H"}, {word:"PULA", x:0, y:1, dir:"V"}, {word:"UAP", x:3, y:0, dir:"V"}] };
    }

    /* =========================================
       4. AUDIO ENGINE & RENDERER
       ========================================= */
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); }

    function playTone(freq, type, duration, vol = 0.1) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type; 
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const Sound = {
      hover: (index) => playTone(300 + (index * 50), 'sine', 0.15, 0.05),
      success: () => { playTone(523.25, 'sine', 0.2); setTimeout(() => playTone(659.25, 'sine', 0.4), 100); },
      wrong: () => playTone(150, 'square', 0.2, 0.03),
      win: () => { [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.4), i * 120)); }
    };

    let currentLevelNum = 1;
    let currentLevelData = null;
    let guessedWords = [];
    let selectedNodes = [];
    let isDrawing = false;
    let mousePos = { x: 0, y: 0 };

    const DOM = {
      grid: document.getElementById('grid'),
      wheel: document.getElementById('wheel'),
      canvas: null, ctx: null,
      preview: document.getElementById('preview'),
      overlay: document.getElementById('overlay'),
      levelDisplay: document.getElementById('level-display')
    };

    function loadLevel() {
      currentLevelData = generateRandomLevelData(); 
      DOM.levelDisplay.innerText = `Level ${currentLevelNum}`;
      guessedWords = [];
      
      DOM.grid.style.gridTemplateColumns = `repeat(${currentLevelData.cols}, 1fr)`;
      DOM.grid.style.gridTemplateRows = `repeat(${currentLevelData.rows}, 1fr)`;
      DOM.grid.innerHTML = '';
      
      const cells = {};
      for (let y = 0; y < currentLevelData.rows; y++) {
        for (let x = 0; x < currentLevelData.cols; x++) {
          const div = document.createElement('div');
          div.className = 'cell'; div.id = `cell-${x}-${y}`;
          DOM.grid.appendChild(div); cells[`${x}-${y}`] = div;
        }
      }

      currentLevelData.words.forEach(w => {
        let cx = w.x, cy = w.y;
        for (let i = 0; i < w.word.length; i++) {
          const cell = cells[`${cx}-${cy}`];
          cell.classList.add('active'); cell.dataset.letter = w.word[i];
          if (w.dir === 'H') cx++; else cy++;
        }
      });

      DOM.wheel.innerHTML = '<canvas id="swipe-canvas"></canvas>';
      DOM.canvas = document.getElementById('swipe-canvas');
      DOM.ctx = DOM.canvas.getContext('2d');
      resizeCanvas();

      let lettersToRender = [...currentLevelData.letters];
      const totalLetters = lettersToRender.length;
      const radius = 95; 
      
      lettersToRender.forEach((char, i) => {
        const angle = (i / totalLetters) * (2 * Math.PI) - (Math.PI / 2); 
        const x = 140 + radius * Math.cos(angle) - 32.5; 
        const y = 140 + radius * Math.sin(angle) - 32.5;

        const node = document.createElement('div');
        node.className = 'letter-node'; node.innerText = char;
        node.style.left = `${x}px`; node.style.top = `${y}px`;
        node.dataset.char = char; node.dataset.id = i;
        DOM.wheel.appendChild(node);
      });
    }

    /* =========================================
       5. SWIPE / DRAG CONTROLS
       ========================================= */
    function resizeCanvas() { DOM.canvas.width = DOM.wheel.clientWidth; DOM.canvas.height = DOM.wheel.clientHeight; }
    window.addEventListener('resize', resizeCanvas);

    function getMousePos(e) {
      const rect = DOM.canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function drawLine() {
      DOM.ctx.clearRect(0, 0, DOM.canvas.width, DOM.canvas.height);
      if (selectedNodes.length === 0) return;

      DOM.ctx.beginPath(); DOM.ctx.lineCap = 'round'; DOM.ctx.lineJoin = 'round';
      DOM.ctx.lineWidth = 14; DOM.ctx.strokeStyle = '#00e5ff';
      DOM.ctx.shadowBlur = 20; DOM.ctx.shadowColor = '#00e5ff';

      selectedNodes.forEach((node, index) => {
        const x = node.offsetLeft + 32.5; const y = node.offsetTop + 32.5;
        if (index === 0) DOM.ctx.moveTo(x, y); else DOM.ctx.lineTo(x, y);
      });
      if (isDrawing) DOM.ctx.lineTo(mousePos.x, mousePos.y);
      DOM.ctx.stroke();
    }

    function updatePreview() {
      DOM.preview.innerText = selectedNodes.map(n => n.dataset.char).join('');
      DOM.preview.className = 'preview-word';
    }

    function checkCollision(pos) {
      document.querySelectorAll('.letter-node').forEach(node => {
        const nx = node.offsetLeft + 32.5; const ny = node.offsetTop + 32.5;
        if (Math.hypot(pos.x - nx, pos.y - ny) < 38 && !selectedNodes.includes(node)) {
          selectedNodes.push(node); node.classList.add('selected');
          Sound.hover(selectedNodes.length); updatePreview();
        }
      });
    }

    function startDrag(e) {
      initAudio(); isDrawing = true; selectedNodes = [];
      document.querySelectorAll('.letter-node').forEach(n => n.classList.remove('selected'));
      mousePos = getMousePos(e); checkCollision(mousePos); drawLine();
    }

    function moveDrag(e) {
      if (!isDrawing) return;
      e.preventDefault(); 
      mousePos = getMousePos(e); checkCollision(mousePos); drawLine();
    }

    function endDrag() {
      if (!isDrawing) return;
      isDrawing = false; DOM.ctx.clearRect(0, 0, DOM.canvas.width, DOM.canvas.height); 
      
      const word = DOM.preview.innerText;
      validateWord(word);
      
      selectedNodes.forEach(n => n.classList.remove('selected')); selectedNodes = [];
      setTimeout(() => { if(DOM.preview.innerText === word) DOM.preview.innerText = ''; }, 1000);
    }

    DOM.wheel.addEventListener('mousedown', startDrag);
    DOM.wheel.addEventListener('touchstart', startDrag, {passive: false});
    window.addEventListener('mousemove', moveDrag);
    window.addEventListener('touchmove', moveDrag, {passive: false});
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchend', endDrag);

    /* =========================================
       6. GAME VALIDATION
       ========================================= */
    function validateWord(guessedWord) {
      if (!guessedWord) return;
      const validTarget = currentLevelData.words.find(w => w.word === guessedWord);

      if (validTarget && !guessedWords.includes(guessedWord)) {
        guessedWords.push(guessedWord); Sound.success();
        let cx = validTarget.x, cy = validTarget.y;
        for (let i = 0; i < validTarget.word.length; i++) {
          const cell = document.getElementById(`cell-${cx}-${cy}`);
          cell.innerText = validTarget.word[i]; cell.classList.add('revealed');
          if (validTarget.dir === 'H') cx++; else cy++;
        }
        if (guessedWords.length === currentLevelData.words.length) {
          setTimeout(() => { Sound.win(); DOM.overlay.classList.add('show'); }, 800);
        }
      } else {
        DOM.preview.classList.add('wrong'); Sound.wrong();
      }
    }

    function nextLevel() {
      DOM.overlay.classList.remove('show');
      currentLevelNum++;
      loadLevel(); 
    }

    window.onload = () => loadLevel();
  </script>
</body>
</html>
