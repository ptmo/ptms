<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Chat UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0B0E14; /* Hitam pekat elegan */
            --bg-surface: #151A23; /* Abu-abu kebiruan gelap */
            --text-main: #FFFFFF;
            --text-muted: #8B95A5;
            --accent-mist: #82DACC; /* Toska pucat berkabut */
            --glass-bg: rgba(21, 26, 35, 0.6);
            --glass-border: rgba(255, 255, 255, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
        }

        /* Simulasi Layar HP */
        .mobile-frame {
            width: 390px;
            height: 844px;
            background: radial-gradient(circle at top left, #1A2230 0%, var(--bg-deep) 100%);
            border-radius: 48px;
            position: relative;
            overflow: hidden;
            border: 1px solid #2A3241;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
        }

        /* Header Eksklusif */
        .header {
            padding: 40px 24px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .profile-pic {
            width: 44px;
            height: 44px;
            border-radius: 16px; /* Bukan bulat sempurna, lebih modern */
            background-color: var(--bg-surface);
            border: 1px solid var(--accent-mist);
            background-image: url('https://api.dicebear.com/7.x/notionists/svg?seed=Felix');
            background-size: cover;
        }

        /* Daftar Obrolan */
        .chat-list {
            flex: 1;
            padding: 10px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-list::-webkit-scrollbar {
            display: none; /* Menyembunyikan scrollbar agar bersih */
        }

        .chat-card {
            display: flex;
            align-items: center;
            padding: 16px;
            background-color: var(--bg-surface);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
            border: 1px solid transparent;
        }

        .chat-card:hover {
            transform: translateY(-2px);
            background-color: #1A202C;
            border-color: var(--glass-border);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            background-color: #2A3241;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-name {
            font-size: 16px;
            font-weight: 600;
        }

        .chat-time {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .chat-message {
            font-size: 14px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        /* Status Belum Dibaca */
        .unread .chat-message {
            color: var(--text-main);
            font-weight: 500;
        }

        .unread-badge {
            background-color: var(--accent-mist);
            color: var(--bg-deep);
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: auto;
        }

        /* Navigasi Kapsul Melayang (Glassmorphism) */
        .floating-nav {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: 64px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .nav-item {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-item.active {
            background-color: var(--accent-mist);
            color: var(--bg-deep);
            box-shadow: 0 0 15px rgba(130, 218, 204, 0.4);
        }
    </style>
</head>
<body>

    <div class="mobile-frame">
        <div class="header">
            <h1>Pesan</h1>
            <div class="profile-pic"></div>
        </div>

        <div class="chat-list">
            <div class="chat-card unread">
                <div class="avatar" style="background-image: url('https://api.dicebear.com/7.x/avataaars/svg?seed=Nala'); background-size: cover;"></div>
                <div class="chat-info">
                    <div class="chat-header">
                        <span class="chat-name">Arisan Project</span>
                        <span class="chat-time">09:41</span>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <span class="chat-message">Desain UI/UX sudah selesai ya!</span>
                        <span class="unread-badge">2</span>
                    </div>
                </div>
            </div>

            <div class="chat-card">
                <div class="avatar" style="background-image: url('https://api.dicebear.com/7.x/avataaars/svg?seed=Budi'); background-size: cover;"></div>
                <div class="chat-info">
                    <div class="chat-header">
                        <span class="chat-name">Dimas Pratama</span>
                        <span class="chat-time">Kemarin</span>
                    </div>
                    <span class="chat-message">Oke, nanti malam kita bahas logikanya.</span>
                </div>
            </div>

            <div class="chat-card">
                <div class="avatar" style="background-image: url('https://api.dicebear.com/7.x/avataaars/svg?seed=Sari'); background-size: cover;"></div>
                <div class="chat-info">
                    <div class="chat-header">
                        <span class="chat-name">Tim Frontend</span>
                        <span class="chat-time">Senin</span>
                    </div>
                    <span class="chat-message">Deployment di Render aman.</span>
                </div>
            </div>
        </div>

        <div class="floating-nav">
            <div class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            </div>
            <div class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            </div>
            <div class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"></path><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"></path><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"></path></svg>
            </div>
        </div>
    </div>

</body>
</html>
