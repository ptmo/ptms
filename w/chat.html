<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Light Chat UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #F4F7F8; /* Abu-abu sangat muda/bersih */
            --text-main: #1C222B;
            --text-muted: #7E8796;
            --accent-primary: #5C9EAD; /* Teal lembut berkelas */
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.9);
            --glass-shadow: 0 12px 32px rgba(28, 34, 43, 0.04);
            --glass-shadow-hover: 0 16px 40px rgba(28, 34, 43, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #E2E8F0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
        }

        /* Simulasi Layar HP */
        .mobile-frame {
            width: 390px;
            height: 844px;
            background-color: var(--bg-base);
            border-radius: 48px;
            position: relative;
            overflow: hidden;
            border: 8px solid #FFFFFF;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        /* Ornamen Latar Belakang untuk menghidupkan efek Glassmorphism */
        .bg-blob-1 {
            position: absolute;
            top: -50px;
            right: -50px;
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #D6E4E2, #E8F0EE);
            border-radius: 50%;
            filter: blur(40px);
            z-index: -1;
        }

        .bg-blob-2 {
            position: absolute;
            bottom: 100px;
            left: -80px;
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #E6E2F0, #F4F2F8);
            border-radius: 50%;
            filter: blur(50px);
            z-index: -1;
        }

        /* Top Navbar: Pencarian & Pengaturan */
        .top-nav {
            padding: 40px 24px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 10;
        }

        /* Glassmorphism Input Pencarian */
        .search-container {
            flex: 1;
            height: 52px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            box-shadow: var(--glass-shadow);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .search-container:focus-within {
            box-shadow: 0 0 0 2px var(--accent-primary), var(--glass-shadow-hover);
            background: rgba(255, 255, 255, 0.9);
        }

        .search-container svg {
            color: var(--text-muted);
            margin-right: 12px;
        }

        .search-container input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            font-family: inherit;
            font-size: 15px;
            color: var(--text-main);
            font-weight: 500;
        }

        .search-container input::placeholder {
            color: #9CA3AF;
            font-weight: 400;
        }

        /* Tombol Pengaturan */
        .settings-btn {
            width: 52px;
            height: 52px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: var(--glass-shadow);
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .settings-btn:hover {
            transform: rotate(15deg) scale(1.05);
            background: rgba(255, 255, 255, 0.9);
        }

        /* Daftar Obrolan */
        .chat-list {
            flex: 1;
            padding: 10px 24px 100px; /* Padding bawah ekstra untuk area floating nav */
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 10;
        }

        .chat-list::-webkit-scrollbar {
            display: none;
        }

        /* Kartu Obrolan Glassmorphism */
        .chat-card {
            display: flex;
            align-items: center;
            padding: 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
        }

        .chat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--glass-shadow-hover);
            background: rgba(255, 255, 255, 0.85);
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            background-color: #E2E8F0;
            margin-right: 16px;
            flex-shrink: 0;
            border: 2px solid #FFFFFF;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .chat-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-name {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .chat-time {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .chat-message {
            font-size: 14px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 190px;
            font-weight: 500;
        }

        /* Status Belum Dibaca */
        .unread .chat-message {
            color: var(--text-main);
            font-weight: 600;
        }

        .unread-badge {
            background-color: var(--accent-primary);
            color: #FFFFFF;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 10px;
            margin-left: auto;
            box-shadow: 0 4px 12px rgba(92, 158, 173, 0.4);
        }

        /* Navigasi Bawah (Bottom Nav Glassmorphism) */
        .floating-nav {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 290px;
            height: 68px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 34px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.08);
            z-index: 20;
            padding: 0 8px;
        }

        .nav-item {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #A0AEC0;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
            position: relative;
        }

        .nav-item:hover {
            color: var(--text-main);
            transform: translateY(-2px);
        }

        .nav-item.active {
            background-color: #FFFFFF;
            color: var(--accent-primary);
            box-shadow: 0 8px 24px rgba(28, 34, 43, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* Indikator titik di bawah ikon aktif */
        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 6px;
            width: 4px;
            height: 4px;
            background-color: var(--accent-primary);
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="mobile-frame">
        <div class="bg-blob-1"></div>
        <div class="bg-blob-2"></div>

        <div class="top-nav">
            <div class="search-container">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" placeholder="Cari pesan atau kontak...">
            </div>
            <div class="settings-btn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </div>
        </div>

        <div class="chat-list">
            <div class="chat-card unread">
                <div class="avatar" style="background-image: url('https://api.dicebear.com/7.x/notionists/svg?seed=Felix'); background-size: cover;"></div>
                <div class="chat-info">
                    <div class="chat-header">
                        <span class="chat-name">Tim Desain UI</span>
                        <span class="chat-time">09:41</span>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <span class="chat-message">Transisi glassmorphism sudah oke.</span>
                        <span class="unread-badge">3</span>
                    </div>
                </div>
            </div>

            <div class="chat-card">
                <div class="avatar" style="background-image: url('https://api.dicebear.com/7.x/notionists/svg?seed=Aneka'); background-size: cover;"></div>
                <div class="chat-info">
                    <div class="chat-header">
                        <span class="chat-name">Dian Sastro</span>
                        <span class="chat-time">Kemarin</span>
                    </div>
                    <span class="chat-message">Invoice bulan ini saya transfer ya.</span>
                </div>
            </div>

            <div class="chat-card">
                <div class="avatar" style="background-image: url('https://api.dicebear.com/7.x/notionists/svg?seed=Bima'); background-size: cover;"></div>
                <div class="chat-info">
                    <div class="chat-header">
                        <span class="chat-name">Grup Node.js ID</span>
                        <span class="chat-time">Senin</span>
                    </div>
                    <span class="chat-message">Ada yang pernah deploy WebSockets?</span>
                </div>
            </div>
            
            <div class="chat-card">
                <div class="avatar" style="background-image: url('https://api.dicebear.com/7.x/notionists/svg?seed=Lara'); background-size: cover;"></div>
                <div class="chat-info">
                    <div class="chat-header">
                        <span class="chat-name">Client Baru</span>
                        <span class="chat-time">12 Apr</span>
                    </div>
                    <span class="chat-message">Bisa tolong buatkan prototype E-Wallet?</span>
                </div>
            </div>
        </div>

        <div class="floating-nav">
            <div class="nav-item active">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            </div>
            <div class="nav-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            </div>
            <div class="nav-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"></path><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"></path><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"></path></svg>
            </div>
        </div>
    </div>

</body>
</html>
