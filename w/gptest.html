<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Feed UI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: Helvetica, Arial, sans-serif;
      background:#f0f2f5;
      color:#050505;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:24px;
    }.phone {
  width:390px;
  min-height:844px;
  background:#fff;
  border-radius:32px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.18);
  border:1px solid rgba(0,0,0,.06);
}

.topbar {
  padding:18px 16px 12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#fff;
  position:sticky;
  top:0;
  z-index:10;
}

.logo {
  font-size:34px;
  font-weight:700;
  color:#1877f2;
  letter-spacing:-1px;
}

.actions { display:flex; gap:10px; }

.circle-btn {
  width:38px;
  height:38px;
  border-radius:50%;
  background:#e4e6eb;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
}

.composer {
  display:flex;
  gap:12px;
  padding:12px 16px;
  border-top:1px solid #dddfe2;
  border-bottom:8px solid #f0f2f5;
  align-items:center;
}

.avatar {
  width:42px;
  height:42px;
  border-radius:50%;
  background:linear-gradient(135deg,#cfd9df,#e2ebf0);
  flex-shrink:0;
}

.input {
  flex:1;
  border:1px solid #ccd0d5;
  border-radius:24px;
  padding:12px 16px;
  color:#65676b;
  font-size:15px;
}

.stories {
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:14px 12px;
  background:#fff;
  border-bottom:8px solid #f0f2f5;
}

.story {
  min-width:110px;
  height:190px;
  border-radius:16px;
  background:linear-gradient(180deg,rgba(0,0,0,.2),rgba(0,0,0,.65)), linear-gradient(135deg,#8ec5fc,#e0c3fc);
  position:relative;
  padding:12px;
  color:#fff;
  font-size:13px;
  font-weight:600;
}

.story .small-avatar {
  width:36px;
  height:36px;
  border-radius:50%;
  border:3px solid #1877f2;
  background:#fff;
  margin-bottom:auto;
}

.post {
  background:#fff;
  border-bottom:8px solid #f0f2f5;
  padding:14px 16px;
}

.post-head {
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:10px;
}

.meta strong { font-size:15px; }
.meta div { font-size:12px; color:#65676b; }

.post-text {
  font-size:15px;
  line-height:1.45;
  margin-bottom:12px;
}

.post-image {
  height:240px;
  border-radius:14px;
  background:linear-gradient(135deg,#d9afd9,#97d9e1);
}

.stats {
  display:flex;
  justify-content:space-between;
  color:#65676b;
  font-size:13px;
  margin:12px 0;
}

.post-actions {
  display:flex;
  justify-content:space-around;
  border-top:1px solid #dddfe2;
  padding-top:10px;
  color:#65676b;
  font-size:14px;
}

.post-actions div { display:flex; gap:6px; align-items:center; }

  </style>
</head>
<body>
  <div class="phone">
    <div class="topbar">
      <div class="logo">facebook</div>
      <div class="actions">
        <div class="circle-btn"><i class="fa-solid fa-plus"></i></div>
        <div class="circle-btn"><i class="fa-solid fa-magnifying-glass"></i></div>
        <div class="circle-btn"><i class="fa-brands fa-facebook-messenger"></i></div>
      </div>
    </div><div class="composer">
  <div class="avatar"></div>
  <div class="input">What's on your mind?</div>
</div>

<div class="stories">
  <div class="story"><div class="small-avatar"></div>Create Story</div>
  <div class="story"><div class="small-avatar"></div>Arif Studio</div>
  <div class="story"><div class="small-avatar"></div>Putramas Official</div>
</div>

<div class="post">
  <div class="post-head">
    <div class="avatar"></div>
    <div class="meta"><strong>Creative Builder</strong><div>2 hrs · 🌍</div></div>
  </div>
  <div class="post-text">Building interfaces is not just coding — it's shaping perception through pixels.</div>
  <div class="post-image"></div>
  <div class="stats"><span>1.2K Likes</span><span>184 Comments</span></div>
  <div class="post-actions">
    <div><i class="fa-regular fa-thumbs-up"></i> Like</div>
    <div><i class="fa-regular fa-comment"></i> Comment</div>
    <div><i class="fa-solid fa-share"></i> Share</div>
  </div>
</div>

  </div>
</body>
</html>
