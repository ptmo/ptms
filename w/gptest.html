<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallet UI Showcase</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at top right, #1b2142, #090b14 55%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }.phone {
  width: 390px;
  height: 820px;
  border-radius: 34px;
  background: rgba(18, 22, 40, 0.92);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  box-shadow: 0 30px 80px rgba(0,0,0,0.55);
  overflow: hidden;
  position: relative;
}

.header {
  padding: 26px 24px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7f5cff, #00d4ff);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
}

.bell {
  width: 44px;
  height: 44px;
  border-radius: 16px;
  background: rgba(255,255,255,0.06);
}

.balance-card {
  margin: 12px 20px;
  padding: 24px;
  border-radius: 28px;
  background: linear-gradient(145deg, #7a5cff, #4d7dff 70%, #1fd6ff);
  position: relative;
  overflow: hidden;
  box-shadow: 0 18px 40px rgba(85,110,255,0.35);
}

.balance-card::after {
  content: "";
  position: absolute;
  width: 220px;
  height: 220px;
  background: rgba(255,255,255,0.12);
  border-radius: 50%;
  top: -90px;
  right: -70px;
}

.label { font-size: 14px; opacity: 0.85; }
.amount {
  font-size: 38px;
  font-weight: 800;
  margin: 10px 0 20px;
  letter-spacing: -1px;
}

.mini-row {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  opacity: 0.95;
}

.actions {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  padding: 22px 20px;
}

.action {
  background: rgba(255,255,255,0.05);
  border-radius: 22px;
  padding: 16px 8px;
  text-align: center;
}

.icon {
  width: 46px;
  height: 46px;
  margin: 0 auto 10px;
  border-radius: 16px;
  background: linear-gradient(145deg, rgba(255,255,255,0.18), rgba(255,255,255,0.05));
}

.action span { font-size: 12px; opacity: 0.9; }

.section {
  padding: 8px 20px;
}

.section h3 {
  font-size: 18px;
  margin-bottom: 14px;
}

.transaction {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.tx-icon {
  width: 44px;
  height: 44px;
  border-radius: 16px;
  background: rgba(255,255,255,0.07);
}

.tx-title { font-weight: 600; }
.tx-sub { font-size: 12px; opacity: 0.65; }
.tx-amount { font-weight: 700; }

.nav {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 16px 26px 24px;
  display: flex;
  justify-content: space-between;
  background: rgba(12,15,28,0.95);
  border-top: 1px solid rgba(255,255,255,0.06);
}

.nav-dot {
  width: 46px;
  height: 46px;
  border-radius: 16px;
  background: rgba(255,255,255,0.06);
}

.nav-dot.active {
  background: linear-gradient(135deg, #7f5cff, #00d4ff);
}

  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <div class="avatar">M</div>
      <div class="bell"></div>
    </div><div class="balance-card">
  <div class="label">Total Balance</div>
  <div class="amount">$128,450.90</div>
  <div class="mini-row">
    <span>+12.8% this month</span>
    <span>•••• 2048</span>
  </div>
</div>

<div class="actions">
  <div class="action"><div class="icon"></div><span>Send</span></div>
  <div class="action"><div class="icon"></div><span>Receive</span></div>
  <div class="action"><div class="icon"></div><span>Invest</span></div>
  <div class="action"><div class="icon"></div><span>More</span></div>
</div>

<div class="section">
  <h3>Recent Activity</h3>
  <div class="transaction">
    <div class="left">
      <div class="tx-icon"></div>
      <div>
        <div class="tx-title">Crypto Deposit</div>
        <div class="tx-sub">2 mins ago</div>
      </div>
    </div>
    <div class="tx-amount">+$4,250</div>
  </div>

  <div class="transaction">
    <div class="left">
      <div class="tx-icon"></div>
      <div>
        <div class="tx-title">Card Payment</div>
        <div class="tx-sub">Today</div>
      </div>
    </div>
    <div class="tx-amount">-$220</div>
  </div>

  <div class="transaction">
    <div class="left">
      <div class="tx-icon"></div>
      <div>
        <div class="tx-title">Transfer</div>
        <div class="tx-sub">Yesterday</div>
      </div>
    </div>
    <div class="tx-amount">-$980</div>
  </div>
</div>

<div class="nav">
  <div class="nav-dot active"></div>
  <div class="nav-dot"></div>
  <div class="nav-dot"></div>
  <div class="nav-dot"></div>
</div>

  </div>
</body>
  </html>
