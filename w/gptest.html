<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallet UI Showcase</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(160deg,#0d1020,#151933 55%,#1f2750);
      font-family:Inter,system-ui,sans-serif;
    }
    .phone{
      width:390px;
      height:844px;
      border-radius:38px;
      background:linear-gradient(180deg,#11152b,#0c1020 75%);
      overflow:hidden;
      box-shadow:0 40px 100px rgba(0,0,0,.55);
      position:relative;
      display:flex;
      flex-direction:column;
    }
    .header{
      padding:28px 24px 18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .profile{display:flex;align-items:center;gap:14px;}
    .avatar{
      width:52px;height:52px;border-radius:50%;
      background:linear-gradient(135deg,#7f5cff,#4db8ff);
      display:flex;align-items:center;justify-content:center;
      font-size:20px;
    }
    .header h2{font-size:18px;font-weight:700;}
    .header p{font-size:13px;color:#8e95b8;}
    .notif{font-size:20px;color:#d7dbff;}
    .balance-card{
      margin:0 20px;
      padding:24px;
      border-radius:28px;
      background:linear-gradient(135deg,#5b46ff,#3aa7ff);
      box-shadow:0 20px 50px rgba(53,103,255,.35);
    }
    .balance-card span{font-size:14px;opacity:.85;}
    .amount{font-size:38px;font-weight:800;margin-top:8px;}
    .actions{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:14px;
      padding:24px 20px;
    }
    .action{
      background:rgba(255,255,255,.05);
      border-radius:22px;
      padding:16px 10px;
      text-align:center;
      backdrop-filter:blur(12px);
    }
    .action i{font-size:22px;margin-bottom:10px;color:#7ab8ff;}
    .action p{font-size:12px;color:#d8dcff;}
    .section{
      flex:1;
      background:rgba(255,255,255,.03);
      border-top-left-radius:30px;
      border-top-right-radius:30px;
      padding:24px 20px;
    }
    .section h3{font-size:18px;margin-bottom:18px;}
    .tx{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 0;
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .tx-left{display:flex;align-items:center;gap:14px;}
    .tx-icon{
      width:46px;height:46px;border-radius:16px;
      background:rgba(122,184,255,.12);
      display:flex;align-items:center;justify-content:center;
      color:#7ab8ff;
    }
    .tx h4{font-size:15px;}
    .tx p{font-size:12px;color:#8e95b8;}
    .price{font-weight:700;}
    .nav{
      height:76px;
      display:flex;
      justify-content:space-around;
      align-items:center;
      background:rgba(255,255,255,.04);
      border-top:1px solid rgba(255,255,255,.06);
    }
    .nav i{font-size:20px;color:#aab3e8;}
    .nav .active{color:#4db8ff;}
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <div class="profile">
        <div class="avatar"><i class="fa-solid fa-wallet"></i></div>
        <div>
          <h2>Digital Wallet</h2>
          <p>Premium Account</p>
        </div>
      </div>
      <div class="notif"><i class="fa-regular fa-bell"></i></div>
    </div><div class="balance-card">
  <span>Total Balance</span>
  <div class="amount">$12,480.90</div>
</div>

<div class="actions">
  <div class="action"><i class="fa-solid fa-paper-plane"></i><p>Send</p></div>
  <div class="action"><i class="fa-solid fa-download"></i><p>Receive</p></div>
  <div class="action"><i class="fa-solid fa-credit-card"></i><p>Cards</p></div>
  <div class="action"><i class="fa-solid fa-chart-line"></i><p>Invest</p></div>
</div>

<div class="section">
  <h3>Recent Transactions</h3>
  <div class="tx">
    <div class="tx-left"><div class="tx-icon"><i class="fa-brands fa-paypal"></i></div><div><h4>PayPal</h4><p>Today, 09:45</p></div></div>
    <div class="price">-$220</div>
  </div>
  <div class="tx">
    <div class="tx-left"><div class="tx-icon"><i class="fa-solid fa-bag-shopping"></i></div><div><h4>Shopping</h4><p>Yesterday</p></div></div>
    <div class="price">-$89</div>
  </div>
  <div class="tx">
    <div class="tx-left"><div class="tx-icon"><i class="fa-solid fa-coins"></i></div><div><h4>Crypto</h4><p>2 days ago</p></div></div>
    <div class="price">+$540</div>
  </div>
</div>

<div class="nav">
  <i class="fa-solid fa-house active"></i>
  <i class="fa-solid fa-wallet"></i>
  <i class="fa-solid fa-chart-pie"></i>
  <i class="fa-solid fa-user"></i>
</div>

  </div>
</body>
</html>
