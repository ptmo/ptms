<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Compressor (90-95KB)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg-color: #121212;
      --surface-color: #1e1e1e;
      --text-primary: #ffffff;
      --text-secondary: #aaaaaa;
      --accent-color: #4CAF50;
      --border-color: #333333;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background-color: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 { font-size: 1.5rem; margin-bottom: 10px; font-weight: 600; }
    p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 30px; }

    .upload-area {
      border: 2px dashed var(--border-color);
      border-radius: 8px;
      padding: 40px 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }
    .upload-area:hover { border-color: var(--accent-color); background: rgba(76, 175, 80, 0.05); }
    
    input[type="file"] { display: none; }
    
    .btn {
      background-color: var(--accent-color);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { background-color: #555; cursor: not-allowed; }

    #status {
      margin-top: 20px;
      font-size: 0.9rem;
      color: var(--accent-color);
      min-height: 20px;
    }

    .info-box {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      font-size: 0.85rem;
      text-align: left;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>PDF Compressor</h1>
    <p>Target Output: 90KB - 95KB</p>

    <div class="upload-area" id="drop-zone" onclick="document.getElementById('pdf-upload').click()">
      <div id="file-name">Klik atau Drop PDF di sini</div>
      <input type="file" id="pdf-upload" accept="application/pdf">
    </div>

    <button id="compress-btn" class="btn" disabled>Mulai Kompresi</button>
    <div id="status"></div>

    <div class="info-box">
      <strong>Catatan:</strong><br>
      Sistem kini dilengkapi dengan <em>Dynamic Downscaling</em>. Jika PDF berisi banyak gambar, resolusinya akan otomatis diperkecil agar bisa tembus batas maksimal 95KB.
    </div>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const uploadInput = document.getElementById('pdf-upload');
    const dropZone = document.getElementById('drop-zone');
    const fileNameDisplay = document.getElementById('file-name');
    const compressBtn = document.getElementById('compress-btn');
    const statusDisplay = document.getElementById('status');

    const MIN_SIZE = 90 * 1024; // 90 KB
    const MAX_SIZE = 95 * 1024; // 95 KB

    let currentFile = null;

    uploadInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        currentFile = e.target.files[0];
        fileNameDisplay.innerText = `${currentFile.name} (${(currentFile.size / 1024).toFixed(2)} KB)`;
        compressBtn.disabled = false;
        statusDisplay.innerText = '';
      }
    });

    compressBtn.addEventListener('click', async () => {
      if (!currentFile) return;
      compressBtn.disabled = true;
      statusDisplay.innerText = 'Membaca PDF...';

      try {
        const arrayBuffer = await currentFile.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        const numPages = pdf.numPages;
        
        const pagesData = [];
        statusDisplay.innerText = 'Merasterisasi halaman awal...';
        
        for (let i = 1; i <= numPages; i++) {
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({ scale: 1.0 }); 
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.height = viewport.height;
          canvas.width = viewport.width;

          await page.render({ canvasContext: ctx, viewport: viewport }).promise;
          pagesData.push({ canvas, width: viewport.width, height: viewport.height });
        }

        statusDisplay.innerText = 'Mencari rasio kompresi & skala optimal...';
        
        let lowFactor = 0.01;
        let highFactor = 1.0;
        let finalBlob = null;
        let bestFactor = 0.5;

        for (let attempt = 0; attempt < 8; attempt++) {
          bestFactor = (lowFactor + highFactor) / 2;
          const testBlob = await generatePDFBlob(pagesData, bestFactor);
          
          if (testBlob.size >= MIN_SIZE && testBlob.size <= MAX_SIZE) {
            finalBlob = testBlob;
            break;
          } else if (testBlob.size > MAX_SIZE) {
            highFactor = bestFactor;
          } else {
            lowFactor = bestFactor;
            finalBlob = testBlob; 
          }
        }

        if (finalBlob.size < MIN_SIZE) {
            statusDisplay.innerText = 'Menyesuaikan batas minimal (Suntik Data)...';
            finalBlob = await padPDF(finalBlob, MIN_SIZE);
        }

        if (finalBlob.size > MAX_SIZE) {
           statusDisplay.innerText = `Gagal! Terlalu banyak halaman. Terkecil didapat: ${(finalBlob.size / 1024).toFixed(2)} KB.`;
        } else {
           statusDisplay.innerText = `Berhasil! Ukuran akhir: ${(finalBlob.size / 1024).toFixed(2)} KB`;
           downloadBlob(finalBlob, `Target_90-95KB_${currentFile.name}`);
        }

      } catch (error) {
        console.error(error);
        statusDisplay.innerText = 'Terjadi kesalahan saat memproses PDF.';
      } finally {
        compressBtn.disabled = false;
      }
    });

    async function generatePDFBlob(pagesData, factor) {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: 'p', unit: 'pt', format: 'a4' });
      const pdfWidth = pdf.internal.pageSize.getWidth();
      const pdfHeight = pdf.internal.pageSize.getHeight();

      let quality = Math.max(0.1, factor); 
      let scaleMod = factor < 0.5 ? Math.max(0.2, factor * 2) : 1.0; 

      for (let i = 0; i < pagesData.length; i++) {
        if (i > 0) pdf.addPage();
        const data = pagesData[i];
        
        let targetCanvas = data.canvas;

        if (scaleMod < 1.0) {
            targetCanvas = document.createElement('canvas');
            targetCanvas.width = data.canvas.width * scaleMod;
            targetCanvas.height = data.canvas.height * scaleMod;
            const ctx = targetCanvas.getContext('2d');
            ctx.drawImage(data.canvas, 0, 0, targetCanvas.width, targetCanvas.height);
        }
        
        const imgData = targetCanvas.toDataURL('image/jpeg', quality);
        
        pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
      }
      return pdf.output('blob');
    }

    async function padPDF(blob, targetSize) {
        const arrayBuffer = await blob.arrayBuffer();
        let uint8Array = new Uint8Array(arrayBuffer);
        
        const paddingNeeded = targetSize - uint8Array.length + 500; 
        
        if (paddingNeeded > 0) {
            const dummyString = " ".repeat(paddingNeeded);
            const encoder = new TextEncoder();
            const paddingBytes = encoder.encode(`\n% PADDING DUMMY DATA\n% ${dummyString}\n%%EOF\n`);
            
            const paddedArray = new Uint8Array(uint8Array.length + paddingBytes.length);
            paddedArray.set(uint8Array);
            paddedArray.set(paddingBytes, uint8Array.length);
            
            return new Blob([paddedArray], { type: 'application/pdf' });
        }
        return blob;
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
