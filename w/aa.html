<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Gacha Dominasi 4x3 (PC Ready)</title>
  <style>
    :root {
      --bg-dark: #0f0f13;
      --glass-bg: rgba(20, 20, 25, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      --highlight: #f1c40f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at center, #1a1a24 0%, #000000 100%);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh; 
      overflow: hidden;
    }

    /* --- HEADER --- */
    header {
      padding: 20px 15px; 
      display: flex; 
      flex-direction: column;
      align-items: center; 
      gap: 15px; 
      z-index: 100;
    }

    .connection-badge {
      background: rgba(255, 193, 7, 0.2); border: 1px solid rgba(255, 193, 7, 0.5);
      color: #ffc107; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem;
      font-weight: bold; display: flex; align-items: center; gap: 8px;
    }
    .connection-badge.connected {
      background: rgba(46, 204, 113, 0.2); border: 1px solid rgba(46, 204, 113, 0.5); color: #2ecc71;
    }
    .connection-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor; }

    .title-box {
      text-align: center;
      background: var(--glass-bg); backdrop-filter: blur(10px);
      padding: 15px 30px; border-radius: 15px; border: 1px solid var(--glass-border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .title-box h1 { font-size: clamp(1.5rem, 4vw, 2.5rem); color: #fff; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 2px 10px rgba(255,255,255,0.3); }
    .rules { font-size: clamp(0.8rem, 2vw, 1rem); color: #bbb; margin-top: 5px; }

    /* --- GACHA GRID (4x3 PC LANDSCAPE) --- */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    .grid-container {
      display: grid;
      /* KUNCI PERUBAHAN: 4 Kolom, 3 Baris */
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 15px; /* Jarak antar kotak sedikit dilebarkan */
      width: 100%;
      max-width: 650px; /* Wadah dilebarkan ke samping untuk PC */
      height: 55vh; /* Tinggi disesuaikan agar tidak gepeng */
      max-height: 500px;
    }

    .cell {
      background: rgba(255, 255, 255, 0.03);
      border: 2px dashed rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      transition: all 0.2s;
      overflow: hidden;
    }

    .cell.filled {
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.3);
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .cell.filled .player-info { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; display: flex; flex-direction: column; align-items: center;}

    .player-avatar {
      width: clamp(50px, 12vw, 75px); /* Avatar dibuat sedikit lebih besar */
      height: clamp(50px, 12vw, 75px);
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      margin-bottom: 8px;
    }

    .player-name {
      font-size: clamp(0.75rem, 2.5vw, 1rem);
      font-weight: bold;
      color: #fff;
      text-align: center;
      width: 90%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }

    /* --- EFEK HIGHLIGHT ROULETTE --- */
    .cell.highlight {
      border: 4px solid var(--highlight);
      background: rgba(241, 196, 15, 0.3);
      box-shadow: 0 0 25px var(--highlight), inset 0 0 15px var(--highlight);
      transform: scale(1.05);
      z-index: 10;
    }

    .cell.winner {
      border: 4px solid #2ecc71;
      background: rgba(46, 204, 113, 0.4);
      box-shadow: 0 0 30px #2ecc71, inset 0 0 20px #2ecc71;
      transform: scale(1.1);
      z-index: 15;
      animation: pulseWin 1s infinite alternate;
    }

    @keyframes pulseWin {
      0% { box-shadow: 0 0 20px #2ecc71; }
      100% { box-shadow: 0 0 50px #2ecc71; }
    }

    /* --- POPUP PEMENANG --- */
    .winner-overlay {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.5s;
    }
    .winner-overlay.show { opacity: 1; pointer-events: all; }
    
    .winner-card {
      background: linear-gradient(135deg, #1a1a24, #0f0f13);
      border: 2px solid var(--highlight); border-radius: 20px;
      padding: 40px; text-align: center; box-shadow: 0 20px 50px rgba(241, 196, 15, 0.3);
      transform: scale(0.8); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .winner-overlay.show .winner-card { transform: scale(1); }
    
    .crown-icon { font-size: 5rem; margin-bottom: 10px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }
    .win-title { font-size: 1.5rem; color: #bbb; letter-spacing: 2px; margin-bottom: 10px; }
    .win-name { font-size: 3rem; color: var(--highlight); font-weight: 900; text-transform: uppercase; margin-bottom: 20px; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    .win-avatar { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--highlight); box-shadow: 0 10px 25px rgba(0,0,0,0.5); object-fit: cover;}
    .reset-text { margin-top: 20px; font-size: 1rem; color: #888; }
  </style>
</head>
<body>

  <header>
    <div class="connection-badge" id="api-status">
      <div class="dot"></div>
      <span id="api-text">Menunggu Webcast...</span>
    </div>
    <div class="title-box">
      <h1>GACHA DOMINASI</h1>
      <div class="rules">Kirim 1 Donat 🍩 = Isi 1 Kotak Acak</div>
    </div>
  </header>

  <main>
    <div class="grid-container" id="gacha-grid">
      </div>
  </main>

  <div class="winner-overlay" id="winner-screen">
    <div class="winner-card">
      <div class="crown-icon">👑</div>
      <div class="win-title">SANG PENGUASA ROOM</div>
      <div class="win-name" id="win-name-text">@Username</div>
      <img src="" id="win-avatar-img" class="win-avatar" alt="Winner">
      <div class="reset-text">Mereset ronde baru dalam beberapa detik...</div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>

  <script>
    // --- KONFIGURASI GAME ---
    const TOTAL_CELLS = 12; // 4 Kolom x 3 Baris = Tetap 12 Kotak
    const TARGET_GIFT = "Doughnut"; 
    const TARGET_GIFT_ALT = "Donat";
    
    let gridData = new Array(TOTAL_CELLS).fill(null);
    let isSpinning = false; 

    const gridElement = document.getElementById('gacha-grid');
    const winnerScreen = document.getElementById('winner-screen');

    function initGrid() {
        gridElement.innerHTML = '';
        for (let i = 0; i < TOTAL_CELLS; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = `cell-${i}`;
            gridElement.appendChild(cell);
        }
    }
    initGrid();

    function processGift(username, avatarUrl) {
        if (isSpinning) return;

        const emptyIndices = gridData
            .map((val, index) => val === null ? index : null)
            .filter(val => val !== null);

        if (emptyIndices.length === 0) return;

        const randomEmptyIndex = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
        
        gridData[randomEmptyIndex] = { username, avatarUrl };

        const cell = document.getElementById(`cell-${randomEmptyIndex}`);
        cell.classList.add('filled');
        cell.innerHTML = `
            <div class="player-info">
                <img src="${avatarUrl}" class="player-avatar" alt="ava">
                <div class="player-name">${username}</div>
            </div>
        `;

        if (emptyIndices.length === 1) {
            setTimeout(startGacha, 1000);
        }
    }

    function startGacha() {
        isSpinning = true; 
        
        let currentIndex = 0;
        let jumps = Math.floor(Math.random() * 15) + 35; 
        let delay = 50; 

        function jumpHighlight() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlight'));

            const currentCell = document.getElementById(`cell-${currentIndex % TOTAL_CELLS}`);
            currentCell.classList.add('highlight');

            currentIndex++;
            jumps--;

            if (jumps > 0) {
                if (jumps < 15) delay += 20; 
                if (jumps < 5) delay += 50;
                
                setTimeout(jumpHighlight, delay);
            } else {
                const winningIndex = (currentIndex - 1) % TOTAL_CELLS;
                const winnerData = gridData[winningIndex];
                
                const winningCell = document.getElementById(`cell-${winningIndex}`);
                winningCell.classList.remove('highlight');
                winningCell.classList.add('winner'); 

                setTimeout(() => showWinner(winnerData), 1000);
            }
        }

        jumpHighlight(); 
    }

    function showWinner(winnerData) {
        document.getElementById('win-name-text').innerText = `@${winnerData.username}`;
        document.getElementById('win-avatar-img').src = winnerData.avatarUrl;
        winnerScreen.classList.add('show');

        setTimeout(() => {
            winnerScreen.classList.remove('show');
            resetGame();
        }, 8000);
    }

    function resetGame() {
        gridData = new Array(TOTAL_CELLS).fill(null);
        initGrid();
        isSpinning = false; 
    }

    const socket = io("http://localhost:3000");

    socket.on("tiktok_connected", (username) => {
        const badge = document.getElementById('api-status');
        badge.classList.add('connected');
        document.getElementById('api-text').innerText = `Live Terhubung: @${username}`;
    });

    socket.on("new_gift", (data) => {
        if (data.giftName === TARGET_GIFT || data.giftName === TARGET_GIFT_ALT) {
            let fills = Math.min(data.count, TOTAL_CELLS - gridData.filter(v => v !== null).length);
            const finalAvatar = data.avatarUrl || 'https://ui-avatars.com/api/?name=' + data.username + '&background=random';
            
            for(let i = 0; i < fills; i++){
                processGift(data.username, finalAvatar);
            }
        }
    });

  </script>
</body>
</html>
