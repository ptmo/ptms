<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Gacha Dominasi 4x3 (PC Ready)</title>
  <style>
  :root {
    --bg-dark: #08080a;
    --glass-bg: rgba(15, 15, 20, 0.6);
    --glass-border: rgba(255, 255, 255, 0.06);
    --text-primary: #ffffff;
    --text-secondary: #aaaabb;
    
    /* Warna Glow Premium (Gunakan Hue Berbeda untuk Softness) */
    --h-glow-primary: 210; /* Blueish untuk terisi */
    --h-glow-active: 45;   /* Golden untuk roulette */
    --h-glow-win: 145;    /* Emerald untuk pemenang */
    
    /* Definisi lapisan glow agar soft (berlapis) */
    --soft-glow-primary: 
      0 0 10px hsla(var(--h-glow-primary), 100%, 60%, 0.3),
      0 0 25px hsla(var(--h-glow-primary), 100%, 50%, 0.1);
      
    --soft-glow-active: 
      0 0 15px hsla(var(--h-glow-active), 100%, 60%, 0.6),
      0 0 40px hsla(var(--h-glow-active), 100%, 50%, 0.2);
      
    --soft-glow-win: 
      0 0 20px hsla(var(--h-glow-win), 100%, 60%, 0.7),
      0 0 50px hsla(var(--h-glow-win), 100%, 50%, 0.3),
      0 0 80px hsla(var(--h-glow-win), 100%, 40%, 0.1);

    /* Standar Kurva Animasi Smooth (Cubic Bezier) */
    --ease-soft-out: cubic-bezier(0.23, 1, 0.32, 1); /* Sangat smooth di akhir */
    --ease-elastic-out: cubic-bezier(0.34, 1.56, 0.64, 1); /* Membal lembut */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

  body {
    background-color: var(--bg-dark);
    /* Background Radial Gradient HALUS */
    background-image: 
      radial-gradient(circle at 50% 50%, #161620 0%, #000000 100%);
    color: var(--text-primary);
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh; 
    overflow: hidden;
    letter-spacing: -0.02em; /* Standar profesional */
  }

  /* Efek Background Hidup (Scanline halus) */
  body::before {
    content: "";
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
    background-size: 100% 4px;
    z-index: 1;
    pointer-events: none;
    opacity: 0.3;
  }

  /* --- HEADER (TIDAK BERUBAH BANYAK, HANYA DIPERHALUS) --- */
  header {
    padding: 25px 15px; 
    display: flex; 
    flex-direction: column;
    align-items: center; 
    gap: 15px; 
    z-index: 100;
  }

  .connection-badge {
    background: rgba(255, 193, 7, 0.1); border: 1px solid rgba(255, 193, 7, 0.2);
    color: #ffc107; padding: 6px 18px; border-radius: 20px; font-size: 0.8rem;
    font-weight: 600; display: flex; align-items: center; gap: 8px;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .connection-badge.connected {
    background: rgba(46, 204, 113, 0.1); border: 1px solid rgba(46, 204, 113, 0.2); color: #2ecc71;
    box-shadow: 0 0 15px rgba(46, 204, 113, 0.2);
  }
  .connection-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; box-shadow: 0 0 10px currentColor; }

  .title-box {
    text-align: center;
    background: var(--glass-bg); 
    backdrop-filter: blur(20px) saturate(180%); /* Glassmorphism kuat */
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    padding: 15px 35px; border-radius: 16px; 
    border: 1px solid var(--glass-border);
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
  }
  .title-box h1 { 
    font-size: clamp(1.5rem, 4vw, 2.2rem); 
    color: #fff; text-transform: uppercase; letter-spacing: 0.15em; 
    font-weight: 800;
    background: linear-gradient(180deg, #ffffff 0%, #bbbbbb 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 8px rgba(255,255,255,0.2));
  }
  .rules { font-size: 0.95rem; color: var(--text-secondary); margin-top: 5px; font-weight: 400; }

  /* --- GACHA GRID (4x3 PC LANDSCAPE) - PREMIUM --- */
  main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px;
    position: relative;
    z-index: 2;
  }

  .grid-container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 18px; /* Gap diperlebar agar glow tidak tabrakan */
    width: 100%;
    max-width: 700px;
    height: 55vh;
    max-height: 500px;
    perspective: 1000px; /* Menambahkan kedalaman 3D halus */
  }

  .cell {
    background: rgba(255, 255, 255, 0.01);
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    /* Transisi Soft Dasar */
    transition: 
      transform 0.3s var(--ease-soft-out), 
      box-shadow 0.3s var(--ease-soft-out), 
      border-color 0.3s var(--ease-soft-out),
      background-color 0.3s var(--ease-soft-out),
      filter 0.1s var(--ease-soft-out); /* Filter untuk motion blur cepat */
    overflow: hidden;
    backdrop-filter: blur(5px);
  }

  /* --- 1. ANIMASI PREMIUM: filled (Soft Pop-in) --- */
  @keyframes softPopIn {
    0% { transform: scale(0.6) translateY(20px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  .cell.filled {
    background-color: rgba(20, 24, 35, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 
      inset 0 0 20px rgba(0,0,0,0.6),
      var(--soft-glow-primary); /* Lapisan glow soft blue */
  }

  /* Terapkan animasi softPopIn pada konten dalam kotak */
  .cell.filled .player-info { 
    animation: softPopIn 0.5s var(--ease-elastic-out) forwards; 
    display: flex; flex-direction: column; align-items: center;
    will-change: transform, opacity; /* Optimasi render */
  }

  .player-avatar {
    width: clamp(55px, 12vw, 80px);
    height: clamp(55px, 12vw, 80px);
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #fff;
    /* Lapisan shadow ganda untuk kelembutan */
    box-shadow: 0 4px 15px rgba(0,0,0,0.5), 0 0 10px rgba(255,255,255,0.1);
    margin-bottom: 10px;
  }

  .player-name {
    font-size: clamp(0.8rem, 2.5vw, 1.05rem);
    font-weight: 700;
    color: var(--text-primary);
    text-align: center;
    width: 90%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 2px 5px rgba(0,0,0,0.8);
    letter-spacing: -0.01em;
  }

  /* --- 2. ANIMASI PREMIUM: highlight (Roulette) --- */
  .cell.highlight {
    border-color: hsla(var(--h-glow-active), 100%, 70%, 0.8);
    background-color: hsla(var(--h-glow-active), 100%, 10%, 0.3);
    box-shadow: 
      inset 0 0 15px hsla(var(--h-glow-active), 100%, 60%, 0.2),
      var(--soft-glow-active); /* Soft Golden Bloom */
    transform: scale(1.06);
    z-index: 10;
    /* MENAMBAHKAN MOTION BLUR HALUS SAAT BERPUTAR */
    filter: blur(0.5px); 
  }

  /* --- 3. ANIMASI PREMIUM: winner (Pemenang) --- */
  @keyframes pulseWinSoft {
    0% { box-shadow: 0 0 20px hsla(var(--h-glow-win), 100%, 60%, 0.5), var(--soft-glow-win); transform: scale(1.1); }
    100% { box-shadow: 0 0 40px hsla(var(--h-glow-win), 100%, 70%, 0.7), var(--soft-glow-win); transform: scale(1.12); }
  }

  .cell.winner {
    border-color: hsla(var(--h-glow-win), 100%, 70%, 0.9);
    background-color: hsla(var(--h-glow-win), 100%, 10%, 0.4);
    z-index: 15;
    /* Animasi denyut sangat halus */
    animation: pulseWinSoft 1.5s var(--ease-soft-out) infinite alternate;
    filter: blur(0); /* Matikan blur roulette */
  }

  /* --- 4. ANIMASI PREMIUM: Overlay Pemenang (Soft Fade & Slide) --- */
  .winner-overlay {
    position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(0, 0, 0, 0.0); /* Mulai dari transparan */
    backdrop-filter: blur(0px); /* Mulai dari tajam */
    -webkit-backdrop-filter: blur(0px);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 200; opacity: 0; pointer-events: none;
    /* Transisi Backdrop Smooth */
    transition: 
      opacity 0.6s var(--ease-soft-out), 
      background-color 0.6s var(--ease-soft-out), 
      backdrop-filter 0.6s var(--ease-soft-out);
  }

  .winner-overlay.show { 
    opacity: 1; 
    pointer-events: all; 
    background: rgba(0, 0, 0, 0.9); 
    backdrop-filter: blur(10px); 
    -webkit-backdrop-filter: blur(10px);
  }
  
  /* Animasi Kartu Pemenang: Slide up & Elastic */
  @keyframes winnerCardSlide {
    0% { transform: scale(0.8) translateY(100px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  .winner-card {
    background: linear-gradient(135deg, #14141a 0%, #08080a 100%);
    border: 2px solid hsla(var(--h-glow-win), 100%, 60%, 0.5); 
    border-radius: 24px;
    padding: 50px; text-align: center; 
    /* Soft bloom emerald */
    box-shadow: 0 20px 60px rgba(0,0,0,0.8), var(--soft-glow-win); 
    opacity: 0;
  }

  .winner-overlay.show .winner-card { 
    animation: winnerCardSlide 0.8s var(--ease-elastic-out) 0.2s forwards; /* Delay sedikit agar backdrop blur jalan duluan */
  }
  
  .crown-icon { font-size: 6rem; margin-bottom: 15px; filter: drop-shadow(0 5px 15px rgba(241, 196, 15, 0.4)); }
  .win-title { font-size: 1.6rem; color: var(--text-secondary); letter-spacing: 0.2em; margin-bottom: 15px; font-weight: 400; text-transform: uppercase;}
  .win-name { 
    font-size: 3.5rem; 
    font-weight: 900; text-transform: uppercase; margin-bottom: 25px; 
    letter-spacing: -0.03em;
    background: linear-gradient(180deg, #ffffff 0%, #aaaaaa 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 5px 20px rgba(255,255,255,0.3));
  }
  .win-avatar { 
    width: 160px; height: 160px; border-radius: 50%; 
    border: 5px solid #fff; 
    box-shadow: 0 15px 35px rgba(0,0,0,0.6), var(--soft-glow-win);
    object-fit: cover;
  }
  .reset-text { margin-top: 30px; font-size: 1.1rem; color: #666677; font-weight: 400; }
  </style>
</head>
<body>

  <header>
    <div class="connection-badge" id="api-status">
      <div class="dot"></div>
      <span id="api-text">Menunggu Webcast...</span>
    </div>
    <div class="title-box">
      <h1>GACHA DOMINASI</h1>
      <div class="rules">Kirim 1 Donat 🍩 = Isi 1 Kotak Acak</div>
    </div>
  </header>

  <main>
    <div class="grid-container" id="gacha-grid">
      </div>
  </main>

  <div class="winner-overlay" id="winner-screen">
    <div class="winner-card">
      <div class="crown-icon">👑</div>
      <div class="win-title">SANG PENGUASA ROOM</div>
      <div class="win-name" id="win-name-text">@Username</div>
      <img src="" id="win-avatar-img" class="win-avatar" alt="Winner">
      <div class="reset-text">Mereset ronde baru dalam beberapa detik...</div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>

  <script>
    // --- KONFIGURASI GAME ---
    const TOTAL_CELLS = 12; // 4 Kolom x 3 Baris = Tetap 12 Kotak
    const TARGET_GIFT = "Doughnut"; 
    const TARGET_GIFT_ALT = "Donat";
    
    let gridData = new Array(TOTAL_CELLS).fill(null);
    let isSpinning = false; 

    const gridElement = document.getElementById('gacha-grid');
    const winnerScreen = document.getElementById('winner-screen');

    function initGrid() {
        gridElement.innerHTML = '';
        for (let i = 0; i < TOTAL_CELLS; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = `cell-${i}`;
            gridElement.appendChild(cell);
        }
    }
    initGrid();

    function processGift(username, avatarUrl) {
        if (isSpinning) return;

        const emptyIndices = gridData
            .map((val, index) => val === null ? index : null)
            .filter(val => val !== null);

        if (emptyIndices.length === 0) return;

        const randomEmptyIndex = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
        
        gridData[randomEmptyIndex] = { username, avatarUrl };

        const cell = document.getElementById(`cell-${randomEmptyIndex}`);
        cell.classList.add('filled');
        cell.innerHTML = `
            <div class="player-info">
                <img src="${avatarUrl}" class="player-avatar" alt="ava">
                <div class="player-name">${username}</div>
            </div>
        `;

        if (emptyIndices.length === 1) {
            setTimeout(startGacha, 1000);
        }
    }

    function startGacha() {
        isSpinning = true; 
        
        let currentIndex = 0;
        let jumps = Math.floor(Math.random() * 15) + 35; 
        let delay = 50; 

        function jumpHighlight() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlight'));

            const currentCell = document.getElementById(`cell-${currentIndex % TOTAL_CELLS}`);
            currentCell.classList.add('highlight');

            currentIndex++;
            jumps--;

            if (jumps > 0) {
                if (jumps < 15) delay += 20; 
                if (jumps < 5) delay += 50;
                
                setTimeout(jumpHighlight, delay);
            } else {
                const winningIndex = (currentIndex - 1) % TOTAL_CELLS;
                const winnerData = gridData[winningIndex];
                
                const winningCell = document.getElementById(`cell-${winningIndex}`);
                winningCell.classList.remove('highlight');
                winningCell.classList.add('winner'); 

                setTimeout(() => showWinner(winnerData), 1000);
            }
        }

        jumpHighlight(); 
    }

    function showWinner(winnerData) {
        document.getElementById('win-name-text').innerText = `@${winnerData.username}`;
        document.getElementById('win-avatar-img').src = winnerData.avatarUrl;
        winnerScreen.classList.add('show');

        setTimeout(() => {
            winnerScreen.classList.remove('show');
            resetGame();
        }, 8000);
    }

    function resetGame() {
        gridData = new Array(TOTAL_CELLS).fill(null);
        initGrid();
        isSpinning = false; 
    }

    const socket = io("http://localhost:3000");

    socket.on("tiktok_connected", (username) => {
        const badge = document.getElementById('api-status');
        badge.classList.add('connected');
        document.getElementById('api-text').innerText = `Live Terhubung: @${username}`;
    });

    socket.on("new_gift", (data) => {
        if (data.giftName === TARGET_GIFT || data.giftName === TARGET_GIFT_ALT) {
            let fills = Math.min(data.count, TOTAL_CELLS - gridData.filter(v => v !== null).length);
            const finalAvatar = data.avatarUrl || 'https://ui-avatars.com/api/?name=' + data.username + '&background=random';
            
            for(let i = 0; i < fills; i++){
                processGift(data.username, finalAvatar);
            }
        }
    });

  </script>
</body>
</html>
